<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>A(See(n)see)Z</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
:root {
    --sense-green: #b2f2bb;
    --sense-blue: #90e0ef;
    --sense-red: #cc7a7a;
}
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Background layers */
#vanta-bg,
#particles-stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

#vanta-bg {
    opacity: 0.35;
    filter: saturate(140%) contrast(115%);
}

/* Content */
.main-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.scene {
    perspective: 1448px;
    position: relative;
}

/* Aura */
.aura-ring {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(178,242,187,0.15), transparent 70%);
    box-shadow: 0 0 40px rgba(178,242,187,0.25);
    animation: aura-breathe 8s ease-in-out infinite alternate;
}

@keyframes aura-breathe {
    from { transform: scale(1); opacity: .4; filter: blur(2px); }
    to   { transform: scale(1.05); opacity: .8; filter: blur(5px); }
}

/* Clock */
.clock-container {
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(200,170,90,0.3);
    background: rgba(0,0,0,0.4);
    transform-style: preserve-3d;
    will-change: transform;
    box-shadow: 0 0 30px rgba(0,0,0,.5),
                inset 0 0 20px rgba(0,0,0,.4);
}

/* Glass */
.glass-cover {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg,
        rgba(255,255,255,0.12),
        transparent 60%);
    backdrop-filter: blur(3px);
    transform: translateZ(30px);
}

/* Core mark */
.clock-container::after {
    content: "81 18";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #000;
    text-shadow: 0 0 8px var(--sense-green);
    opacity: .75;
}

/* Brand */
.brand-name {
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translateX(-50%);
    color: var(--sense-green);
    font-size: 12px;
    letter-spacing: 7px;
    opacity: .5;
}

/* Center */
.center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    background: var(--sense-green);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 15px var(--sense-green);
    z-index: 10;
}

/* Numbers */
.number {
    position: absolute;
    inset: 0;
    text-align: center;
    font-size: 22px;
    padding: 20px;
    color: #f1f5f9;
}
.n12{transform:rotate(0)}
.n1{transform:rotate(-30deg)} .n1 div{transform:rotate(30deg)}
.n2{transform:rotate(-60deg)} .n2 div{transform:rotate(60deg)}
.n3{transform:rotate(-90deg)} .n3 div{transform:rotate(90deg)}
.n4{transform:rotate(-120deg)} .n4 div{transform:rotate(120deg)}
.n5{transform:rotate(-150deg)} .n5 div{transform:rotate(150deg)}
.n6{transform:rotate(-180deg)} .n6 div{transform:rotate(180deg)}
.n7{transform:rotate(-210deg)} .n7 div{transform:rotate(210deg)}
.n8{transform:rotate(-240deg)} .n8 div{transform:rotate(240deg)}
.n9{transform:rotate(-270deg)} .n9 div{transform:rotate(270deg)}
.n10{transform:rotate(-300deg)} .n10 div{transform:rotate(300deg)}
.n11{transform:rotate(-330deg)} .n11 div{transform:rotate(330deg)}

/* Hands */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%) translateZ(20px);
}

.hour   { width:6px; height:100px; background:rgba(241,245,249,.3); }
.minute { width:4px; height:140px; background:var(--sense-red); }
.second { width:2px; height:160px; background:var(--sense-blue); }

/* Tagline */
.tagline {
    margin-top: 40px;
    font-size: 13px;
    letter-spacing: 3px;
    color: #fff;
    opacity: .7;
}

/* Fade in */
body { opacity:0; transition:opacity 2s ease; }
body.loaded { opacity:1; }

/* Mobile */
@media(max-width:600px){
    .clock-container { width:280px; height:280px; }
}
</style>
</head>

<body>
<div id="vanta-bg"></div>
<div id="particles-stars"></div>
<div class="main-content">
        <div class="scene">
        <div class="aura-ring"></div>
        <div class="clock-container">
            <div class="glass-cover"></div>
            <div class="brand-name">SEENSEE</div>
            <div class="center-dot"></div>
            <div class="number n)("><div>1</div></div>
        <div class="number n1"><div>2</div></div>
        <div class="number n2"><div>3</div></div>
        <div class="number n3"><div>4</div></div>
        <div class="number n4"><div>5</div></div>
        <div class="number n5"><div>6</div></div>
        <div class="number nƐ3"><div>7</div></div>
        <div class="number n7"><div>8</div></div>
        <div class="number n8"><div>9</div></div>
        <div class="number n9"><div>10</div></div>
        <div class="number n10"><div>11</div></div>
        <div class="number n11"><div>12</div></div>
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>
    </div>
    <div class="tagline">The instinct of Sensation</div>
</div>
<script>
/* Clock logic (unchanged) */
const hour = document.getElementById('hour');
const minute = document.getElementById('minute');
const second = document.getElementById('second');

function updateClock(){
    const now = new Date();
    const s = now.getSeconds() + now.getMilliseconds()/1000;
    const m = now.getMinutes() + s/60;
    const h = (now.getHours()%12) + m/60;

    second.style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
    hour.style.transform   = `translateX(-50%) rotate(${-h*30}deg)`;

    requestAnimationFrame(updateClock);
}
updateClock();

/* 3D interaction */
const clock = document.querySelector('.clock-container');
const scene = document.querySelector('.scene');
let tx=0, ty=0, cx=0, cy=0;

scene.addEventListener('mousemove', e=>{
    const r = scene.getBoundingClientRect();
    ty = (e.clientX-(r.left+r.width/2))/(r.width/2)*6;
    tx =-(e.clientY-(r.top+r.height/2))/(r.height/2)*6;
});

(function animate(){
    cx += (tx-cx)*0.08;
    cy += (ty-cy)*0.08;
    clock.style.transform = `rotateX(${cx}deg) rotateY(${cy}deg)`;
    requestAnimationFrame(animate);
})();

/* Effects */
VANTA.FOG({
    el:"#vanta-bg",
    mouseControls:false,
    touchControls:false,
    highlightColor:0x90e0ef,
    midtoneColor:0xb2f2bb,
    lowlightColor:0x0b132b,
    baseColor:0x000000,
    blurFactor:0.25,
    speed:0.45
});

particlesJS("particles-stars",{
    particles:{
        number:{value:60},
        opacity:{value:.5,random:true},
        size:{value:1.5,random:true},
        move:{enable:true,speed:.2},
        line_linked:{enable:false}
    }
});

window.addEventListener('load',()=>document.body.classList.add('loaded'));
</script>
</body>
</html>
