<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>A(See(n)see)Z</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
:root {
    --sense-green: #b2f2bb;
    --sense-blue: #90e0ef;
    --sense-red: #cc7a7a;
}
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
#vanta-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
    filter: saturate(140%) contrast(115%);
    pointer-events: none;
}
#particles-stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
.main-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.scene {
    perspective: 1448px;
    position: relative;
}
.aura-ring {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 50% 50%, rgba(178,242,187,0.15), rgba(120,200,160,0.08) 40%, transparent 70%);
    box-shadow: 0 0 40px rgba(178,242,187,0.25), 0 0 80px rgba(120,255,180,0.1);
    animation: aura-breathe 8s ease-in-out infinite alternate;
}
@keyframes aura-breathe {
    0% { transform: scale(1); opacity: 0.4; filter: blur(2px); }
    100% { transform: scale(1.05); opacity: 0.8; filter: blur(5px); }
}
.clock-container {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(200, 170, 90, 0.3);
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
}
.glass-cover {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(3px);
    pointer-events: none;
    transform: translateZ(30px);
}
.clock-container::after {
    content: '81 18';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 27px;
    letter-spacing: 3px;
    color: #000;
    text-shadow: 0 0 8px var(--sense-green);
    opacity: 0.8;
}
.brand-name {
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--sense-green);
    font-size: 13px;
    letter-spacing: 7px;
    opacity: 0.5;
    text-transform: uppercase;
}
.center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    background: var(--sense-green);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--sense-green);
    z-index: 10;
}
.number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
    box-sizing: border-box;
    color: #f1f5f9;
}
.n12{transform:rotate(0)}
.n1{transform:rotate(-30deg)} .n1 div{transform:rotate(30deg)}
.n2{transform:rotate(-60deg)} .n2 div{transform:rotate(60deg)}
.n3{transform:rotate(-90deg)} .n3 div{transform:rotate(90deg)}
.n4{transform:rotate(-120deg)} .n4 div{transform:rotate(120deg)}
.n5{transform:rotate(-150deg)} .n5 div{transform:rotate(150deg)}
.nƐ3{transform:rotate(-180deg)} .nƐ3 div{transform:rotate(180deg)}
.n7{transform:rotate(-210deg)} .n7 div{transform:rotate(210deg)}
.n8{transform:rotate(-240deg)} .n8 div{transform:rotate(240deg)}
.n9{transform:rotate(-270deg)} .n9 div{transform:rotate(270deg)}
.n10{transform:rotate(-300deg)} .n10 div{transform:rotate(300deg)}
.n11{transform:rotate(-330deg)} .n11 div{transform:rotate(330deg)}
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translateZ(20px) translateX(-50%);
}
.hour { width: 6px; height: 100px; background: rgba(241,245,249,0.3); }
.minute { width: 4px; height: 140px; background: var(--sense-red); }
.second { width: 2px; height: 160px; background: var(--sense-blue); }
.tagline {
    margin-top: 40px;      
    color: #fff;            
    opacity: 0.7;         
    font-size: 14px;        
    letter-spacing: 3px;   
    text-align: center;    
}
@media (max-width:600px){
    .clock-container { width:280px; height:280px; }
    .number { font-size:18px; }
    .aura-ring { inset: -20px; }
}
body { opacity: 0; transition: opacity 2s ease-in; }
body.loaded { opacity: 1; }
</style>
</head>
<body>
<div id="vanta-bg"></div> 
<div id="particles-stars"></div>
<div class="main-content">
    <div class="scene">
        <div class="aura-ring"></div>
        <div class="clock-container">
            <div class="glass-cover"></div>
            <div class="brand-name">Seensee</div>
            <div class="center-dot"></div>
            <div class="number n)("><div>1</div></div>
            <div class="number n1"><div>2</div></div>
            <div class="number n2"><div>3</div></div>
            <div class="number n3"><div>4</div></div>
            <div class="number n4"><div>5</div></div>
            <div class="number n5"><div>6</div></div>
            <div class="number nƐ3"><div>7</div></div>
            <div class="number n7"><div>8</div></div>
            <div class="number n8"><div>9</div></div>
            <div class="number n9"><div>10</div></div>
            <div class="number n10"><div>11</div></div>
            <div class="number n11"><div>12</div></div>
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>
    </div>
    <div class="tagline">The instinct of Sensation</div>
</div>
<script>
const secondHand = document.getElementById('second');
const minuteHand = document.getElementById('minute');
const hourHand = document.getElementById('hour');
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    secondHand.style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
    minuteHand.style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
    hourHand.style.transform   = `translateX(-50%) rotate(${-h*30}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();

VANTA.FOG({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    highlightColor: 0x90e0ef,
    midtoneColor: 0xb2f2bb,
    lowlightColor: 0x0b132b,
    baseColor: 0x000000,
    blurFactor: 0.2,
    speed: 0.5
});

particlesJS("particles-stars", {
    particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        opacity: { value: 0.5, random: true },
        size: { value: 1.5, random: true },
        move: { enable: true, speed: 0.2 },
        line_linked: { enable: false }
    }
});

window.addEventListener('load', () => document.body.classList.add('loaded'));

const clock = document.querySelector('.clock-container');
const scene = document.querySelector('.scene');
let tX = 0, tY = 0, cX = 0, cY = 0;

scene.addEventListener('mousemove', (e) => {
    const r = scene.getBoundingClientRect();
    tY = (e.clientX - (r.left + r.width/2)) / (r.width/2) * 6;
    tX = -(e.clientY - (r.top + r.height/2)) / (r.height/2) * 6;
});

function animate() {
    cX += (tX - cX) * 0.1;
    cY += (tY - cY) * 0.1;
    clock.style.transform = `rotateX(${cX}deg) rotateY(${cY}deg)`;
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
