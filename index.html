<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A∞ZAI :: Real-Live Virtual Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00ffcc;
            z-index: 10;
            width: 250px;
        }
        h3 { margin-top: 0; color: #00ffcc; text-align: center; }
        .btn {
            display: block;
            width: 100%;
            background: #222;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #00ffcc; color: #000; }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            background: #252526;
            position: relative;
        }
        /* تمثيل الشخصية (الروبوت الافتراضي) */
        #avatar {
            width: 40px;
            height: 40px;
            background: #ff0055;
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 15px #ff0055;
            z-index: 5;
        }
        /* تصميم هيكل المحل والأقسام */
        .store-section {
            position: absolute;
            border: 2px dashed #555;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #aaa;
            transition: 0.3s;
        }
        .active-section { border-color: #00ffcc; color: #00ffcc; background: rgba(0, 255, 204, 0.05); }
        #sec-shoes { width: 25%; height: 20%; top: 10%; left: 5%; }
        #sec-jackets { width: 25%; height: 20%; top: 10%; right: 5%; }
        #sec-shirts { width: 25%; height: 20%; top: 40%; left: 5%; }
        #sec-kassa { width: 30%; height: 15%; top: 75%; left: 35%; border: 2px solid #ffcc00; color: #ffcc00; }
        
        #status-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid #00ffcc;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h3>التحكم المركزي بالشبكة</h3>
        
        <label>اختر الفرع الجغرافي:</label>
        <button class="btn" onclick="switchBranch('روتردام', 'BR-RTR-99')">فرع روتردام الرئيسي</button>
        <button class="btn" onclick="switchBranch('دبي मॉल', 'BR-DXB-01')">فرع دبي مول</button>
        <button class="btn" onclick="switchBranch('القاهرة', 'BR-CAI-07')">فرع القاهرة الجديدة</button>
        
        <hr style="border-color: #333;">
        <label>انتقال فوري للأقسام (Teleport):</label>
        <button class="btn" onclick="teleportTo('shoes')">قسم الأحذية والشنط</button>
        <button class="btn" onclick="teleportTo('jackets')">قسم الجواكيت والشتوي</button>
        <button class="btn" onclick="teleportTo('shirts')">قسم القمصان والصيفي</button>
        <button class="btn" onclick="teleportTo('kassa')">الذهاب إلى الـ Kassa 💳</button>
    </div>

    <div id="canvas-container">
        <div id="sec-shoes" class="store-section">قسم الأحذية 👟</div>
        <div id="sec-jackets" class="store-section">قسم الجواكيت 🧥</div>
        <div id="sec-shirts" class="store-section">قسم القمصان 👕</div>
        <div id="sec-kassa" class="store-section">نقطة الدفع الآمنة Kassa 💰</div>
        
        <div id="avatar"></div>
    </div>

    <div id="status-bar">
        [A∞ZAI] النشط حالياً: <span id="current-branch">فرع روتردام الرئيسي</span><br>
        معرف الجلسة الأمنية: <span id="session-hash">f1bdc5cf...ba44</span><br>
        حالة الـ Gate الخلفي: <span id="gate-status" style="color: #00ffcc;">متصل ومحمي (Secure)</span>
    </div>

    <script>
        const avatar = document.getElementById('avatar');
        const currentBranchTxt = document.getElementById('current-branch');
        const sessionHashTxt = document.getElementById('session-hash');

        // محاكاة الإحداثيات لكل قسم داخل السيرفر المدمج
        const coordinates = {
            'shoes': { top: '20%', left: '17%' },
            'jackets': { top: '20%', left: '82%' },
            'shirts': { top: '50%', left: '17%' },
            'kassa': { top: '82%', left: '50%' }
        };

        // 1. بوابة الانتقال الفوري الآمن (Teleportation Gate)
        function teleportTo(sectionId) {
            // إزالة التنشيط عن الأقسام السابقة
            document.querySelectorAll('.store-section').forEach(sec => sec.classList.remove('active-section'));
            
            // تحريك الروبوت بصرياً
            const coord = coordinates[sectionId];
            avatar.style.top = coord.top;
            avatar.style.left = coord.left;
            
            // تفعيل وتنشيط القسم المستهدف
            const targetSec = document.getElementById(`sec-${sectionId}`);
            if(targetSec) targetSec.classList.add('active-section');

            // محاكاة إرسال حزمة التحقق المشفّرة للسيرفر الخلفي لمنع التلاعب بالسعر
            console.log(`[Gate Trigger] Teleported to ${sectionId}. Validating Section Signature via Cryptographic Token.`);
            
            if(sectionId === 'kassa') {
                triggerSecureCheckout();
            }
        }

        // 2. بوابة تبديل الفروع ومزامنة المخازن (Branch Routing Gate)
        function switchBranch(branchName, branchCode) {
            currentBranchTxt.innerText = `${branchName} (${branchCode})`;
            
            // توليد الهاش المخصص للفرع لمحاكاة توقيع الـ API المركزية
            const simulatedHash = btoa(branchCode + Date.now()).substring(0, 15).toLowerCase();
            sessionHashTxt.innerText = `a0z_${simulatedHash}...sec`;
            
            alert(`جاري الانتقال الآني لـ ${branchName}.. يتم الآن سحب بيانات المخزن والأسعار المعتمدة للفرع صامتاً.`);
            teleportTo('kassa'); // إرجاع المستخدم لنقطة البداية الآمنة بعد النقل
        }

        // 3. بوابة الـ Kassa المعزولة (Isolated Checkout Sandbox)
        function triggerSecureCheckout() {
            document.getElementById('gate-status').innerText = "جاري تفعيل الحماية البنكية...";
            document.getElementById('gate-status').style.color = "#ffcc00";
            
            setTimeout(() => {
                document.getElementById('gate-status').innerText = "تم الدفع وتأكيد الشحن الفوري 📦";
                document.getElementById('gate-status').style.color = "#00ffcc";
                alert("تم التحقق من تطابق بصمات المنتجات (Product Hashes) بنجاح! تم الدفع الفوري وسيصلك الطرد لعنوان بيتك المسجل.");
            }, 1200);
        }
    </script>
</body>
</html>
