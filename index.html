<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --stone-light: #6b7a5f;
            --stone-dark: #2d3428;
            --accent: #ff4500;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000 url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* تأثير الطبقة القديمة */
        body::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* القائمة الرئيسية - شاشة الدخول */
        #auth-screen {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 100%;
        }

        .game-logo {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(40px, 8vw, 70px);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 4px 4px 0 #4a2c0f;
            color: var(--gold);
            margin-bottom: 30px;
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        /* أزرار زوما الصخرية */
        .zuma-btn-container {
            display: flex; flex-direction: column; gap: 15px; width: 280px;
        }

        .zuma-input {
            background: rgba(0,0,0,0.7);
            border: 3px solid #4a2c0f;
            border-radius: 50px;
            padding: 15px 25px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            text-align: center;
            font-size: 18px;
            box-shadow: inset 0 0 15px rgba(255,215,0,0.2);
            transition: 0.3s;
        }

        .zuma-input:focus { border-color: var(--gold); outline: none; }

        .btn-stone {
            background: linear-gradient(145deg, #8b7355, #4a2c0f);
            border: 4px solid #261a15;
            border-radius: 8px;
            padding: 15px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #000;
            position: relative;
            transform: rotate(-2deg); /* ميلة بسيطة مثل أزرار اللعبة */
            transition: 0.1s;
        }

        .btn-stone:hover { transform: rotate(0deg) scale(1.05); filter: brightness(1.2); }
        .btn-stone:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #000; }

        /* واجهة الدردشة (داخل المعبد) */
        #main-ui {
            display: none; position: relative; z-index: 20;
            width: 95%; max-width: 500px; height: 80vh;
            background: rgba(20, 20, 20, 0.85);
            border: 8px solid #3d2b1f;
            border-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50"><rect width="50" height="50" fill="none" stroke="gold" stroke-width="5"/></svg>') 30;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .temple-header {
            background: #2a1b0a;
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        #chat-container {
            height: calc(100% - 150px);
            overflow-y: auto;
            padding: 20px;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .msg-box {
            background: rgba(107, 122, 95, 0.2);
            border-left: 4px solid var(--accent);
            padding: 10px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .msg-user { color: var(--gold); font-size: 12px; display: block; margin-bottom: 4px; }
        .msg-text { font-size: 16px; color: #f1e5ac; }

        .control-panel {
            position: absolute; bottom: 0; width: 100%;
            display: flex; background: #1a1108; padding: 10px; box-sizing: border-box;
        }

        #msg-input {
            flex: 1; background: #000; border: 2px solid #4a2c0f;
            color: #fff; padding: 12px; font-family: 'Cinzel';
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

    <!-- شاشة البداية -->
    <div id="auth-screen">
        <h1 class="game-logo">ZUMA<br><span style="font-size: 20px; letter-spacing: 10px;">OPERATIONS</span></h1>
        
        <div class="zuma-btn-container">
            <input id="room-input" class="zuma-input" type="text" placeholder="CHOOSE REALM (ID)">
            <input id="nick-input" class="zuma-input" type="text" placeholder="WARRIOR NAME">
            
            <button class="btn-stone" onclick="enterRoom()">ADVENTURE</button>
            <button class="btn-stone" style="background: linear-gradient(145deg, #555, #222); font-size: 14px; opacity: 0.7;">OPTIONS</button>
        </div>
    </div>

    <!-- واجهة اللعب (الشات) -->
    <div id="main-ui">
        <div class="temple-header">
            <span style="font-size: 20px; color: var(--gold);">REALM: <span id="room-display">---</span></span>
        </div>
        
        <div id="chat-container"></div>

        <div class="control-panel">
            <input id="msg-input" type="text" placeholder="Cast your message...">
            <button class="btn-stone" style="padding: 10px 20px; transform: none; margin-left: 5px;" onclick="sendMsg()">CAST</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            
            if (!roomID || !myNick) return;

            // تلاشي شاشة الدخول وظهور اللعبة
            document.getElementById('auth-screen').style.transition = '0.5s';
            document.getElementById('auth-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('room-display').innerText = roomID;
                listenForMsgs();
            }, 500);
        };

        function listenForMsgs() {
            onChildAdded(ref(db, `rooms/${roomID}/chat`), snap => {
                const data = snap.val();
                const container = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `
                    <span class="msg-user">${data.user}</span>
                    <span class="msg-text">${data.text}</span>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            push(ref(db, `rooms/${roomID}/chat`), { user: myNick, text: input.value });
            input.value = '';
        };

        // إرسال بالضغط على Enter
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendMsg();
        });
    </script>
</body>
</html>
