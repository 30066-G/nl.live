<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOZ Systems - Sci-Fi Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-blue: #00e5ff;
            --dark-bg: #03070d;
            --panel-bg: rgba(4, 15, 30, 0.6);
            --border-color: rgba(0, 229, 255, 0.3);
            --text-main: #a0c4d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at center, #081b33 0%, var(--dark-bg) 70%),
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* حاوية الـ 3D المركزية */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* الهيكل الأساسي للواجهة */
        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            padding: 30px;
            pointer-events: none; /* للسماح بالتحكم بالـ 3D في الخلف */
        }

        .panel-container {
            pointer-events: auto; /* إعادة التفاعل للقوائم */
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 260px;
        }

        /* التصميم المشترك للوحات (الزوايا المقطوعة) */
        .sci-fi-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        /* شعار AOZ */
        .logo {
            font-size: 3rem;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        /* القائمة الجانبية اليسرى */
        .nav-menu ul {
            list-style: none;
        }

        .nav-menu li {
            padding: 15px;
            margin-bottom: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.3s;
            border-left: 2px solid transparent;
        }

        .nav-menu li:hover, .nav-menu li.active {
            color: var(--neon-blue);
            background: linear-gradient(90deg, rgba(0,229,255,0.1) 0%, transparent 100%);
            border-left: 2px solid var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .nav-menu i { width: 20px; text-align: center; }

        /* القائمة الجانبية اليمنى */
        .top-icons {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }
        .top-icons i:hover { color: var(--neon-blue); cursor: pointer; }

        /* أشرطة التقدم (Resources) */
        .resource-item { margin-bottom: 15px; }
        .resource-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; font-weight: 600;}
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 0.5s ease; }

        /* سجل النشاطات (Activity Log) */
        .activity-log { font-size: 0.9rem; }
        .activity-log p { margin-bottom: 8px; display: flex; justify-content: space-between; }
        .status-ok { color: #00ff66; text-shadow: 0 0 5px #00ff66;}
        .status-active { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue);}

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        
        <div class="panel-container">
            <div class="logo">AOZ</div>
            
            <div class="sci-fi-panel nav-menu">
                <ul>
                    <li class="active"><i class="fa-solid fa-house"></i> HOME</li>
                    <li><i class="fa-solid fa-terminal"></i> TERMINAL</li>
                    <li><i class="fa-solid fa-shapes"></i> APPS</li>
                    <li><i class="fa-regular fa-folder-open"></i> FILES</li>
                    <li><i class="fa-solid fa-gear"></i> SETTINGS</li>
                    <li><i class="fa-solid fa-network-wired"></i> NETWORK</li>
                </ul>
            </div>

            <div class="sci-fi-panel" style="margin-top: auto; font-size: 0.9rem;">
                <div style="color: var(--text-main); margin-bottom: 5px;">AOZ CORE</div>
                <div style="color: #666;">v2.6.8</div>
                <div style="color: #00ff66; margin-top: 5px; text-shadow: 0 0 5px #00ff66;">
                    <i class="fa-solid fa-circle" style="font-size: 0.5rem; vertical-align: middle;"></i> ONLINE
                </div>
            </div>
        </div>

        <div class="panel-container">
            <div class="top-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-bell"></i>
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="sci-fi-panel">
                <div style="font-weight: 600; margin-bottom: 10px; color: var(--text-main);">SYSTEM STATUS</div>
                <div style="color: #00ff66; text-shadow: 0 0 5px #00ff66; font-size: 0.9rem;">
                    ONLINE <i class="fa-solid fa-circle" style="font-size: 0.5rem; vertical-align: middle;"></i>
                </div>
            </div>

            <div class="sci-fi-panel">
                <div class="resource-item">
                    <div class="resource-header"><span>MEMORY</span> <span id="mem-val">72%</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="mem-bar" style="width: 72%;"></div></div>
                </div>
                <div class="resource-item">
                    <div class="resource-header"><span>CPU</span> <span id="cpu-val">34%</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="cpu-bar" style="width: 34%;"></div></div>
                </div>
                <div class="resource-item">
                    <div class="resource-header"><span>NET</span> <span id="net-val">68%</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="net-bar" style="width: 68%;"></div></div>
                </div>
            </div>

            <div class="sci-fi-panel activity-log">
                <div style="font-weight: 600; margin-bottom: 15px;">ACTIVITY LOG</div>
                <p><span>> SYSTEM BOOT</span> <span class="status-ok">OK</span></p>
                <p><span>> SECURITY</span> <span class="status-ok">OK</span></p>
                <p><span>> NETWORK</span> <span class="status-ok">OK</span></p>
                <p><span>> USER SESSION</span> <span class="status-active">ACTIVE</span></p>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 1. إعداد مشهد الـ 3D
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); // alpha: true لجعل الخلفية شفافة
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // إضاءة المشهد لتناسب الخيال العلمي
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0x00e5ff, 2, 100);
        pointLight.position.set(0, 0, 5);
        scene.add(pointLight);

        // ==========================================
        // 2. المجسم المؤقت (Placeholder)
        // سيتم عرضه إلى أن تقوم بتركيب ملف العنكبوت
        // ==========================================
        const geometry = new THREE.IcosahedronGeometry(2, 1);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00e5ff, 
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        const placeholderMesh = new THREE.Mesh(geometry, material);
        scene.add(placeholderMesh);

        // ==========================================
        // 3. كود استدعاء مجسم العنكبوت الحقيقي (مُعطل حالياً)
        // عند توفر ملف بصيغة .glb ضعه في نفس المجلد وقم بإزالة التعليقات أدناه
        // ==========================================
        /*
        const loader = new THREE.GLTFLoader();
        loader.load(
            'spider_model.glb', // ضع مسار واسم ملف العنكبوت هنا
            function (gltf) {
                scene.remove(placeholderMesh); // إزالة المجسم المؤقت
                const spiderModel = gltf.scene;
                
                // إضافة إضاءة نيون زرقاء للمجسم
                spiderModel.traverse((child) => {
                    if (child.isMesh) {
                        // يمكنك تعديل خامات المجسم هنا ليتماشى مع النيون
                    }
                });

                // تعديل الحجم والموقع
                spiderModel.scale.set(1.5, 1.5, 1.5); 
                spiderModel.position.set(0, -1, 0);
                scene.add(spiderModel);
            },
            undefined,
            function (error) {
                console.error('حدث خطأ أثناء تحميل المجسم', error);
            }
        );
        */

        camera.position.z = 6;

        // التفاعل مع الماوس (لجعل المجسم يتحرك مع حركة الماوس)
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // 4. حلقة التحريك (Animation Loop)
        function animate() {
            requestAnimationFrame(animate);

            // دوران المجسم المؤقت بشكل مستمر
            placeholderMesh.rotation.x += 0.005;
            placeholderMesh.rotation.y += 0.01;

            // استجابة المجسم لحركة الماوس بشكل سلس
            placeholderMesh.position.x += (mouseX * 0.5 - placeholderMesh.position.x) * 0.05;
            placeholderMesh.position.y += (mouseY * 0.5 - placeholderMesh.position.y) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        // تحديث أبعاد الـ Canvas عند تغيير حجم النافذة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. محاكاة حركة أشرطة الموارد (CPU, RAM) لتبدو وكأن النظام يعمل
        setInterval(() => {
            const cpu = Math.floor(Math.random() * (60 - 20 + 1)) + 20; // رقم عشوائي بين 20 و 60
            document.getElementById('cpu-val').innerText = cpu + '%';
            document.getElementById('cpu-bar').style.width = cpu + '%';

            const net = Math.floor(Math.random() * (90 - 40 + 1)) + 40; 
            document.getElementById('net-val').innerText = net + '%';
            document.getElementById('net-bar').style.width = net + '%';
        }, 2000); // تتحدث كل ثانيتين
    </script>
</body>
</html>
