<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>A0Z Quantum OS v23.0 - PWA Fullscreen Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A0Z OS">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const manifest = {
            "short_name": "A0Z OS",
            "name": "A0Z Quantum OS",
            "icons": [
                {
                    "src": "https://img.icons8.com/neon/96/quantum-computing.png",
                    "type": "image/png",
                    "sizes": "96x96"
                },
                {
                    "src": "https://img.icons8.com/neon/512/quantum-computing.png",
                    "type": "image/png",
                    "sizes": "512x512"
                }
            ],
            "start_url": window.location.href,
            "background_color": "#010103",
            "theme_color": "#00f2fe",
            "display": "standalone", // 👈 هذا الخيار السحري اللي يخفي صفحة جوجل تماماً!
            "orientation": "portrait"
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const relManifest = document.createElement('link');
        relManifest.setAttribute('rel', 'manifest');
        relManifest.setAttribute('href', manifestURL);
        document.head.appendChild(relManifest);
    </script>

    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff3366;
            --neon-green: #11ffbd;
            --glass-bg: rgba(10, 10, 25, 0.85);
            --glass-border: rgba(0, 242, 254, 0.3);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #08081e 0%, #010103 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            gap: 25px; color: white; padding: 15px; overflow: hidden;
        }

        /* 🛠️ لوحة التحكم الجانبية (تختفي تلقائياً على الجوالات وتظهر للآدمين بالكمبيوتر) */
        .admin-panel {
            width: 350px; height: 680px; background: var(--glass-bg);
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        @media (max-width: 850px) { .admin-panel { display: none; } }

        .admin-panel h3 { color: var(--neon-cyan); text-align: center; font-weight: 800; font-size: 1.1rem; }
        .form-group label { display: block; font-size: 0.75rem; color: #8a99ad; margin-bottom: 4px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; background: #05050f; border: 1px solid var(--glass-border); border-radius: 8px; color: white; outline: none;
        }

        .action-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, var(--neon-cyan), #4facfe);
            border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer;
        }

        .terminal-box {
            flex-grow: 1; background: #010104; border: 1px solid rgba(17, 255, 189, 0.2);
            border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.7rem; color: var(--neon-green); overflow-y: auto;
        }

        /* 📦 هيكل الجوال المستطيل المحاكي */
        .phone-container {
            width: 380px; height: 680px; background: #151518; border: 12px solid #2e2e33;
            border-radius: 50px; display: flex; justify-content: center; align-items: center; position: relative;
            box-shadow: 0 40px 90px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.1);
        }

        /* 📱 وضع ملء الشاشة الكامل عند فتحه من الأيقونة مباشرة */
        @media (max-width: 450px) {
            body { padding: 0; background: #000; }
            .phone-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
            .phone { border-radius: 0 !important; }
        }

        .phone { width: 100%; height: 100%; background: #000; border-radius: 38px; position: relative; overflow: hidden; }

        .dynamic-island {
            width: 110px; height: 28px; background: #000; border-radius: 20px;
            position: absolute; top: 11px; left: 50%; transform: translateX(-50%); z-index: 100;
            display: flex; justify-content: center; align-items: center; font-size: 0.65rem; color: var(--neon-green);
        }

        /* 🔒 شاشة القفل والتحقق الرسمي */
        .lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #050510, #020205); z-index: 95; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lock-time { font-size: 3rem; font-weight: 200; color: white; margin-bottom: 2px; }
        .lock-date { font-size: 0.85rem; color: #8a99ad; margin-bottom: 25px; }

        .phone-screen {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 50px 14px 20px 14px; background: linear-gradient(145deg, #0d0614, #03030a); position: relative;
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.7rem; color: white; z-index: 40; margin-bottom: 15px; }

        .home-screen {
            flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content; gap: 18px 12px; overflow-y: auto;
        }
        .home-screen::-webkit-scrollbar { display: none; }

        .app-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .app-icon {
            width: 52px; height: 52px; border-radius: 14px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15); display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: all 0.3s;
        }
        .app-item:hover .app-icon { transform: scale(1.08) translateY(-1px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3); }
        .app-name { font-size: 0.6rem; color: rgba(255, 255, 255, 0.9); text-align: center; }

        /* 🌗 محرك تقسيم الشاشة التيتانيوم */
        .window-instance {
            position: absolute; width: 92%; height: 58%; top: 22%; left: 4%; background: #030308; 
            border: 1px solid rgba(0, 242, 254, 0.35); border-radius: 16px; z-index: 80; 
            display: flex; flex-direction: column; overflow: hidden; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .window-instance.split-top { width: 100% !important; height: 44% !important; top: 42px !important; left: 0 !important; border-radius: 16px 16px 0 0; }
        .window-instance.split-bottom { width: 100% !important; height: 44% !important; top: calc(44% + 52px) !important; left: 0 !important; border-radius: 0 0 16px 16px; border-top: 2px dashed var(--neon-cyan); }

        .window-header-bar { background: rgba(255,255,255,0.06); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .window-title { font-size: 0.65rem; color: var(--neon-cyan); font-weight: bold; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; border: none; background: var(--neon-magenta); cursor: pointer; }
        .window-body { flex-grow: 1; width: 100%; height: 100%; overflow: auto; background: #010103; }
        .sys-msg { color: var(--neon-magenta); font-size: 0.7rem; text-align: center; margin-top: 10px; font-weight: bold; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h3>مصفوفة التحكم كوانتوم v23.0 🛸</h3>
        <div class="form-group">
            <label>اسم التطبيق السحابي:</label>
            <input type="text" id="appNameInput" placeholder="مثال: آلة كوانتوم">
        </div>
        <div class="form-group">
            <label>حقن الكود البرمجي (JS):</label>
            <textarea id="appCodeInput" rows="5" placeholder="// اكتب الكود هنا..."></textarea>
        </div>
        <button class="action-btn" onclick="addNewAppFromPanel()">رفع وحفظ سحابي ☁️🚀</button>
        <div class="terminal-box" id="systemTerminal"><div>[PWA Engine Activated]</div></div>
    </div>

    <div class="phone-container">
        <div class="phone">
            <div class="dynamic-island" id="island">A0Z Quantum</div>

            <div class="lock-screen" id="lockScreen">
                <div class="lock-time" id="lockClock">00:00</div>
                <div class="lock-date" id="lockDate">الخميس، 21 مايو</div>
                <h4 style="color: var(--neon-cyan); margin: 15px 0 10px 0; font-size: 0.85rem; text-shadow: 0 0 10px rgba(0,242,254,0.4);">بوابة التحقق الرسمي 🍏</h4>
                <div class="form-group" style="width:100%; margin-bottom:10px;">
                    <input type="email" id="loginUser" style="text-align:center; padding:12px;" placeholder="أدخل إيميلك الحقيقي والفعّال">
                </div>
                <div class="form-group" style="width:100%; margin-bottom:15px;">
                    <input type="password" id="loginPass" style="text-align:center; padding:12px;" placeholder="كلمة运行">
                </div>
                <button class="action-btn" style="padding:14px;" onclick="unlockWithOfficialEmail()">تسجيل دخول / إنشاء حساب رسمي 🔐</button>
                <div id="lockScreenFeedback" class="sys-msg"></div>
            </div>

            <div class="phone-screen" id="phoneScreen">
                <div class="status-bar">
                    <div id="liveClock">00:00</div>
                    <div>5G 🔋</div>
                </div>

                <div class="home-screen" id="homeScreen"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
            authDomain: "a0zai-56c3a.firebaseapp.com",
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "a0zai-56c3a",
            storageBucket: "a0zai-56c3a.firebasestorage.app",
            messagingSenderId: "198838438266",
            appId: "1:198838438266:web:379e782653f014a32a2ec3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let currentUserUID = null; let currentUserEmail = "";
        let globalAppsData = {};
        let openWindowsList = [];

        function printTerminal(text) {
            const term = document.getElementById('systemTerminal'); if(!term) return;
            term.innerHTML += `<div>> ${text}</div>`; term.scrollTop = term.scrollHeight;
        }

        function unlockWithOfficialEmail() {
            const email = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const feedback = document.getElementById('lockScreenFeedback');
            if(!email || !pass) { alert("أدخل الإيميل والباسورد الحقيقي!"); return; }

            feedback.innerText = "جاري الفحص السحابي... ⏳";
            feedback.style.color = "var(--neon-cyan)";

            auth.signInWithEmailAndPassword(email, pass)
            .then((u) => {
                if (u.user.emailVerified) { execLoginSuccess(u.user.uid, email); } 
                else {
                    feedback.innerText = "❌ الحساب غير مفعّل! يرجى مراجعة إيميلك والضغط على رابط التأكيد الحقيقي أولاً.";
                    feedback.style.color = "var(--neon-magenta)";
                    auth.signOut();
                }
            })
            .catch((error) => {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    auth.createUserWithEmailAndPassword(email, pass)
                    .then((u) => {
                        u.user.sendEmailVerification().then(() => {
                            feedback.innerText = "📧 تم التسجيل! أرسلنا رابط تفعيل إلى بريدك الإلكتروني الآن. فعله ثم سجل دخولك!";
                            feedback.style.color = "var(--neon-green)";
                            auth.signOut();
                        });
                    })
                    .catch((err) => { feedback.innerText = `خطأ: ${err.message}`; feedback.style.color = "var(--neon-magenta)"; });
                } else {
                    feedback.innerText = `خطأ: ${error.message}`; feedback.style.color = "var(--neon-magenta)";
                }
            });
        }

        function execLoginSuccess(uid, email) {
            currentUserUID = uid; currentUserEmail = email.split('@')[0];
            document.getElementById('lockScreen').style.transform = "translateY(-100%)";
            
            const myPresenceRef = database.ref(`chat_presence/${uid}`);
            myPresenceRef.set({ username: currentUserEmail, online: true });
            myPresenceRef.onDisconnect().remove();

            listenToUserApps(uid);
        }

        function handleAppLaunch(appKey) {
            const winId = `win_${appKey}`;
            if(document.getElementById(winId)) return;

            if(openWindowsList.length >= 2) { closeWindowInstance(openWindowsList[0]); }

            createWindowInstance(appKey);
            openWindowsList.push(appKey);

            if(openWindowsList.length === 2) {
                document.getElementById(`win_${openWindowsList[0]}`).className = "window-instance split-top";
                document.getElementById(`win_${openWindowsList[1]}`).className = "window-instance split-bottom";
                printTerminal("🌗 Split Screen Mode: ACTIVE");
            }
        }

        function createWindowInstance(key) {
            let app = globalAppsData[key];
            if(key === "global_chat_system") { app = { name: "الدردشة العامة", icon: "💬" }; }

            const win = document.createElement('div'); win.className = 'window-instance'; win.id = `win_${key}`;
            win.innerHTML = `
                <div class="window-header-bar">
                    <div class="window-title">${app.icon || '⚡'} ${app.name}</div>
                    <div class="window-controls"><button class="win-btn" onclick="closeWindowInstance('${key}')"></button></div>
                </div>
                <div class="window-body" style="padding:0; display:flex; flex-direction:column;"><div id="container_${key}" style="width:100%; height:100%; display:flex; flex-direction:column;"></div></div>
            `;
            document.getElementById('phoneScreen').appendChild(win);

            if(key === "global_chat_system") { launchGlobalChatEngine(document.getElementById(`container_${key}`)); } 
            else {
                try {
                    const appContainer = document.getElementById(`container_${key}`);
                    const appScript = new Function('container', app.code);
                    appScript(appContainer);
                } catch (err) { printTerminal(`Error: ${err.message}`); }
            }
        }

        function closeWindowInstance(key) {
            const win = document.getElementById(`win_${key}`);
            if(win) {
                win.remove();
                openWindowsList = openWindowsList.filter(k => k !== key);
                if(openWindowsList.length === 1) {
                    const remaining = document.getElementById(`win_${openWindowsList[0]}`);
                    if(remaining) remaining.className = "window-instance";
                    printTerminal("🌗 Split Screen Mode: INACTIVE");
                }
            }
        }

        function listenToUserApps(uid) { database.ref('custom_apps/' + uid).on('value', (s) => { globalAppsData = s.val() || {}; renderHomeScreen(globalAppsData); }); }
        
        function renderHomeScreen(appsList) {
            const hs = document.getElementById('homeScreen'); hs.innerHTML = '';
            
            const chatItem = document.createElement('div'); chatItem.className = 'app-item';
            chatItem.setAttribute('onclick', "handleAppLaunch('global_chat_system')");
            chatItem.innerHTML = `<div class="app-icon" style="background:linear-gradient(135deg, #00f2fe, #4facfe); border:1px solid var(--neon-cyan);">💬</div><div class="app-name" style="color:var(--neon-cyan); font-weight:bold;">الدردشة العامة</div>`;
            hs.appendChild(chatItem);

            Object.keys(appsList).forEach((k) => {
                const app = appsList[k];
                const item = document.createElement('div'); item.className = 'app-item'; item.setAttribute('onclick', `handleAppLaunch('${k}')`);
                item.innerHTML = `<div class="app-icon">${app.icon || '🛸'}</div><div class="app-name">${app.name}</div>`;
                hs.appendChild(item);
            });
        }

        function launchGlobalChatEngine(domContainer) {
            domContainer.innerHTML = `
                <div style="background:rgba(255,255,255,0.03); padding:6px 10px; font-size:0.65rem; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:between; align-items:center;">
                    <span style="color:#8a99ad;">المسار: <span style="color:var(--neon-green);">root/chat</span></span>
                    <span style="background:rgba(17,255,189,0.15); color:var(--neon-green); padding:2px 6px; border-radius:10px; font-weight:bold;" id="liveCounterLabel">المتواجدين: 1 👥</span>
                </div>
                <div id="chatMessageGrid" style="flex-grow:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; font-size:0.75rem;"></div>
                <div style="padding:8px; display:flex; gap:6px; background:#05050f; border-top:1px solid rgba(0,242,254,0.15);">
                    <input id="chatMsgInput" type="text" placeholder="اكتب رسالة حقيقية..." style="flex-grow:1; background:#000; border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px; color:white; outline:none; font-size:0.75rem;">
                    <button id="sendChatBtn" style="background:var(--neon-cyan); color:#000; border:none; border-radius:8px; padding:0 12px; font-weight:bold; font-size:0.7rem;">إرسال</button>
                </div>
            `;
            const msgGrid = domContainer.querySelector('#chatMessageGrid');
            const msgInput = domContainer.querySelector('#chatMsgInput');
            const sendBtn = domContainer.querySelector('#sendChatBtn');
            const counterLabel = domContainer.querySelector('#liveCounterLabel');

            database.ref('chat_presence').on('value', (snapshot) => { const count = snapshot.numChildren() || 1; if(counterLabel) counterLabel.innerText = `المتواجدين: ${count} 👥`; });

            database.ref('global_realtime_chat').limitToLast(40).on('value', (snapshot) => {
                msgGrid.innerHTML = ''; const data = snapshot.val() || {};
                Object.keys(data).forEach((key) => {
                    const m = data[key]; const msgRow = document.createElement('div'); const isMe = m.user === currentUserEmail;
                    msgRow.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                    msgRow.style.background = isMe ? 'linear-gradient(135deg, #00f2fe, #4facfe)' : 'rgba(255,255,255,0.07)';
                    msgRow.style.color = isMe ? '#000' : '#fff'; msgRow.style.padding = '6px 10px'; msgRow.style.borderRadius = '10px'; msgRow.style.maxWidth = '80%'; msgRow.style.wordBreak = 'break-all';
                    msgRow.innerHTML = `<b style="font-size:0.55rem; display:block; opacity:0.75; margin-bottom:2px;">${m.user}</b>${m.text}`; msgGrid.appendChild(msgRow);
                });
                msgGrid.scrollTop = msgGrid.scrollHeight;
            });

            function transmitMsg() { const text = msgInput.value.trim(); if(!text) return; database.ref('global_realtime_chat').push().set({ user: currentUserEmail, text: text }); msgInput.value = ''; }
            sendBtn.onclick = transmitMsg; msgInput.onkeydown = (e) => { if(e.key === 'Enter') transmitMsg(); };
        }

        function addNewAppFromPanel() {
            if(!currentUserUID) { alert("سجل دخولك أولاً من واجهة الجوال!"); return; }
            const name = document.getElementById('appNameInput').value.trim();
            const code = document.getElementById('appCodeInput').value.trim();
            if (!name || !code) return;
            database.ref('custom_apps/' + currentUserUID).push().set({ name, icon: "🛸", code });
            document.getElementById('appNameInput').value = ""; document.getElementById('appCodeInput').value = "";
        }

        setInterval(() => { 
            const now = new Date(); let hh = now.getHours(); let mm = now.getMinutes(); 
            const timeStr = `${hh < 10 ? '0'+hh : hh}:${mm < 10 ? '0'+mm : mm}`;
            document.getElementById('liveClock').innerText = timeStr; 
            document.getElementById('lockClock').innerText = timeStr; 
            document.getElementById('lockDate').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);

        // 🚀 تسجيل السيرفس وركر لتفعيل الـ PWA بشكل قانوني في المتصفحات
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', event => event.respondWith(fetch(event.request)));
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                const swURL = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swURL).catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
