<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z - Tactical Comms</title>
    <style>
        :root {
            --neon: #00ffa3;
            --danger: #ff3e3e;
            --bg-deep: #0a0c10;
            --panel: rgba(20, 25, 35, 0.95);
            --border: rgba(0, 255, 163, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-deep); color: white;
            font-family: 'monospace', sans-serif;
            display: flex; flex-direction: column;
        }

        /* Login Screen */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { 
            width: 90%; max-width: 320px; 
            background: var(--panel); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; text-align: center;
        }

        /* Main UI */
        #main-ui {
            display: none; flex-direction: column; height: 100vh; width: 100%;
        }

        .header {
            padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            background: radial-gradient(circle at center, #101520 0%, #0a0c10 100%);
        }

        .message {
            background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 12px;
            border-left: 3px solid var(--neon); max-width: 85%; align-self: flex-start;
            animation: fadeIn 0.3s ease;
        }
        .my-message {
            align-self: flex-end; border-left: none; border-right: 3px solid var(--neon);
            background: rgba(0, 255, 163, 0.05);
        }

        .input-area {
            padding: 15px; background: var(--panel); border-top: 1px solid var(--border);
            display: flex; gap: 10px;
        }

        input {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; color: white; font-family: inherit;
        }
        #msg-input { flex: 1; }

        button {
            background: var(--neon); border: none; padding: 10px 20px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #000;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--neon); margin-bottom: 20px;">A0Z TERMINAL</h2>
            <input id="room-input" type="text" placeholder="ROOM ID" style="width: 85%; margin-bottom: 15px;">
            <input id="nick-input" type="text" placeholder="CALLSIGN" style="width: 85%; margin-bottom: 20px;">
            <button onclick="enterRoom()" style="width: 100%;">CONNECT</button>
        </div>
    </div>

    <!-- واجهة الشات -->
    <div id="main-ui">
        <div class="header">
            <div style="color:var(--neon)">SECURE LINE: <span id="room-display">---</span></div>
            <div style="font-size: 10px; color: #555;" id="user-display">---</div>
        </div>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type message..." onkeypress="handleKey(event)">
            <button onclick="sendMsg()">SEND</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        projectId: "a0zai-56c3a", 
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myNick, roomID;

    window.enterRoom = () => {
        roomID = document.getElementById('room-input').value.trim();
        myNick = document.getElementById('nick-input').value.trim();

        if (!roomID || !myNick) return alert("Enter credentials!");

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('room-display').innerText = roomID;
        document.getElementById('user-display').innerText = myNick;

        listenForMsgs();
    };

    function listenForMsgs() {
        const chatRef = ref(db, `v9/rooms/${roomID}/chat`);
        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            displayMessage(data);
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;

        const chatRef = ref(db, `v9/rooms/${roomID}/chat`);
        push(chatRef, {
            user: myNick,
            text: input.value,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        input.value = '';
    };

    window.handleKey = (e) => { if(e.key === 'Enter') sendMsg(); };

    function displayMessage(data) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        const isMe = data.user === myNick;
        
        div.className = `message ${isMe ? 'my-message' : ''}`;
        div.innerHTML = `
            <div style="font-size:9px; color:var(--neon); margin-bottom:4px;">${data.user} • ${data.time}</div>
            <div style="font-size:14px;">${data.text}</div>
        `;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
