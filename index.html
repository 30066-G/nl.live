<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO CAD PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-user-select:none;
user-select:none
}

body{
overflow:hidden;
background:#111
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
gap:8px;
flex-wrap:wrap;
padding:10px;
background:#1b1b1b;
border-bottom:1px solid #333;
z-index:100
}

button,input{
height:42px;
border:none;
border-radius:12px;
padding:0 14px;
font-size:13px
}

button{
background:#2c2c2c;
color:#fff;
font-weight:600;
cursor:pointer
}

button:active{
background:#ff9800
}

input[type=range]{
width:120px
}

#side{
position:fixed;
right:12px;
top:90px;
display:flex;
flex-direction:column;
gap:8px;
z-index:100
}

.sym{
width:100px
}

#hud{
position:fixed;
left:12px;
bottom:12px;
background:rgba(0,0,0,.72);
padding:14px;
border-radius:16px;
color:#fff;
font-size:13px;
z-index:100;
min-width:180px;
backdrop-filter:blur(8px)
}

#cross{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
margin-left:-5px;
margin-top:-5px;
border-radius:50%;
background:#ff3b30;
pointer-events:none;
z-index:99
}

.info{
margin-top:6px;
color:#bbb
}

.active{
background:#ff9800!important
}

</style>
</head>

<body>

<div id="topbar">

<button id="pipeBtn" class="active" onclick="setTool('pipe')">Rohr</button>

<button onclick="newLine()">Neue Linie</button>

<button onclick="undo()">Undo</button>

<button onclick="clearAll()">Löschen</button>

<button onclick="resetCamera()">Reset</button>

<button onclick="exportPNG()">Export</button>

<input type="range" id="len" min="20" max="250" value="80">

</div>

<div id="side">

<button class="sym" onclick="pickSymbol('valve')">Ventil</button>

<button class="sym" onclick="pickSymbol('pump')">Pumpe</button>

<button class="sym" onclick="pickSymbol('flange')">Flansch</button>

<button class="sym" onclick="pickSymbol('gauge')">Messgerät</button>

<button class="sym" onclick="pickSymbol('elbow')">Bogen</button>

<button class="sym" onclick="pickSymbol('filter')">Filter</button>

<button class="sym" onclick="pickSymbol('tank')">Tank</button>

</div>

<div id="hud">

<div>Zoom: <span id="zoomText">100%</span></div>

<div class="info">
Gesamtlänge:
<span id="totalText">0</span> mm
</div>

<div class="info">
Elemente:
<span id="countText">0</span>
</div>

</div>

<div id="cross"></div>

<canvas id="grid"></canvas>
<canvas id="main"></canvas>

<script>

const grid=document.getElementById("grid")
const main=document.getElementById("main")

const gtx=grid.getContext("2d")
const ctx=main.getContext("2d")

let w=innerWidth
let h=innerHeight

function resize(){

w=innerWidth
h=innerHeight

grid.width=w
grid.height=h

main.width=w
main.height=h

}

addEventListener("resize",resize)

let camera={
x:0,
y:0,
zoom:1,
target:1
}

let objects=[]

let current={
x:0,
y:0
}

let total=0

let preview=null

let activeSymbol=null

let drawing=false

let freeStart=true

function worldToScreen(x,y){

return{
x:x*camera.zoom+camera.x+w/2,
y:y*camera.zoom+camera.y+h/2
}

}

function screenToWorld(x,y){

return{
x:(x-w/2-camera.x)/camera.zoom,
y:(y-h/2-camera.y)/camera.zoom
}

}

function isoAngle(dx,dy){

const a=Math.atan2(dy,dx)

const dirs=[
0,
Math.PI/3,
2*Math.PI/3,
Math.PI,
-2*Math.PI/3,
-Math.PI/3
]

let best=dirs[0]
let diff=999

dirs.forEach(d=>{

const n=Math.abs(a-d)

if(n<diff){

diff=n
best=d

}

})

return best

}

function drawGrid(){

gtx.clearRect(0,0,w,h)

gtx.fillStyle="#fff"
gtx.fillRect(0,0,w,h)

gtx.save()

gtx.translate(camera.x+w/2,camera.y+h/2)
gtx.scale(camera.zoom,camera.zoom)

const step=32
const range=5000
const a=Math.PI/6

gtx.strokeStyle="rgba(90,140,170,.23)"
gtx.lineWidth=1/camera.zoom

for(let i=-range;i<range;i+=step){

gtx.beginPath()
gtx.moveTo(i,-range)
gtx.lineTo(i+range*Math.tan(a),range)
gtx.stroke()

gtx.beginPath()
gtx.moveTo(i,-range)
gtx.lineTo(i-range*Math.tan(a),range)
gtx.stroke()

}

gtx.restore()

}

function drawSymbol(type,x,y){

ctx.save()

ctx.translate(x,y)

ctx.lineWidth=2/camera.zoom
ctx.strokeStyle="#138f4d"
ctx.fillStyle="#138f4d"

const s=12/camera.zoom

if(type==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(type==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(type==="flange"){

ctx.strokeRect(-s,-s,s*2,s*2)

}

if(type==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(type==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

if(type==="filter"){

ctx.beginPath()
ctx.moveTo(-s,-s)
ctx.lineTo(s,s)
ctx.moveTo(s,-s)
ctx.lineTo(-s,s)
ctx.stroke()

}

if(type==="tank"){

ctx.beginPath()
ctx.roundRect(-s,-s,s*2,s*2,4/camera.zoom)
ctx.stroke()

}

ctx.restore()

}

function render(){

requestAnimationFrame(render)

camera.zoom+=
(camera.target-camera.zoom)*0.15

drawGrid()

ctx.clearRect(0,0,w,h)

ctx.save()

ctx.translate(camera.x+w/2,camera.y+h/2)
ctx.scale(camera.zoom,camera.zoom)

objects.forEach(o=>{

ctx.strokeStyle="#202020"
ctx.lineWidth=4/camera.zoom
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(o.a.x,o.a.y)
ctx.lineTo(o.b.x,o.b.y)
ctx.stroke()

const mx=(o.a.x+o.b.x)/2
const my=(o.a.y+o.b.y)/2

ctx.save()

ctx.translate(mx,my)

ctx.rotate(o.angle)

ctx.font=`${13/camera.zoom}px Segoe UI`

ctx.fillStyle="#111"
ctx.textAlign="center"

ctx.fillText(o.mm,0,-10/camera.zoom)

ctx.restore()

if(o.symbol){

drawSymbol(
o.symbol,
o.b.x,
o.b.y
)

}

})

if(preview){

ctx.strokeStyle="#ff9800"
ctx.lineWidth=3/camera.zoom

ctx.beginPath()
ctx.moveTo(preview.a.x,preview.a.y)
ctx.lineTo(preview.b.x,preview.b.y)
ctx.stroke()

}

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,5/camera.zoom,0,Math.PI*2)
ctx.fill()

ctx.restore()

zoomText.innerText=
Math.round(camera.zoom*100)+"%"

countText.innerText=objects.length

}

let pointers={}

let pinch=false

let startDist=0
let startZoom=1

main.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

pinch=true

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=camera.target

return

}

drawing=true

const pos=screenToWorld(
e.clientX,
e.clientY
)

if(freeStart){

current.x=pos.x
current.y=pos.y

freeStart=false

}

})

main.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

const nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

camera.target=
Math.min(
Math.max(
startZoom*(nd/startDist),
0.35
),
5
)

return

}

if(!drawing)return

const pos=screenToWorld(
e.clientX,
e.clientY
)

const dx=pos.x-current.x
const dy=pos.y-current.y

const a=isoAngle(dx,dy)

const len=parseFloat(
document.getElementById("len").value
)

preview={

a:{
x:current.x,
y:current.y
},

b:{
x:current.x+Math.cos(a)*len,
y:current.y+Math.sin(a)*len
}

}

})

main.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

if(pinch)return

if(preview){

const dx=preview.b.x-preview.a.x
const dy=preview.b.y-preview.a.y

const mm=Math.round(
parseFloat(len.value)*5.833
)

objects.push({

a:preview.a,
b:preview.b,
mm:mm,
angle:Math.atan2(dy,dx),
symbol:activeSymbol

})

current.x=preview.b.x
current.y=preview.b.y

total+=mm

totalText.innerText=total

activeSymbol=null

preview=null

}

drawing=false

})

main.addEventListener("wheel",e=>{

e.preventDefault()

if(e.deltaY<0){

camera.target*=1.1

}else{

camera.target/=1.1

}

camera.target=
Math.max(
0.35,
Math.min(5,camera.target)
)

})

function pickSymbol(s){

activeSymbol=s

}

function setTool(t){

tool=t

}

function newLine(){

freeStart=true

}

function undo(){

if(objects.length===0)return

const last=objects.pop()

total-=last.mm

if(total<0)total=0

totalText.innerText=total

if(objects.length){

current.x=objects.at(-1).b.x
current.y=objects.at(-1).b.y

}

}

function clearAll(){

objects=[]

preview=null

total=0

totalText.innerText=0

freeStart=true

}

function resetCamera(){

camera.x=0
camera.y=0
camera.target=1

}

function exportPNG(){

const out=document.createElement("canvas")

out.width=w
out.height=h

const o=out.getContext("2d")

o.drawImage(grid,0,0)
o.drawImage(main,0,0)

const a=document.createElement("a")

a.download="ISO_CAD_PRO.png"

a.href=out.toDataURL()

a.click()

}

resize()
render()

</script>

</body>
</html>
