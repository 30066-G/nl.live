<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z Quantum WebOS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #03030c;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* 💻 لوحة التحكم الخارجية لإضافة الأيقونات وتخصيص الجوال */
        .external-admin-panel {
            width: 320px;
            background: rgba(15, 15, 35, 0.8);
            border: 2px solid #ff007f;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.2);
        }

        .external-admin-panel h3 {
            color: #ff007f;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            background: #090919;
            border: 1px solid #ff007f;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: #ff007f;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #ff3399;
            box-shadow: 0 0 15px #ff007f;
        }

        /* 📦 حاوية الصندوق */
        .box-container {
            width: 360px;
            height: 560px;
            background: linear-gradient(135deg, #12122c, #050515);
            border: 2px solid #00f2fe;
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(0, 242, 254, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        /* غطاء الصندوق */
        .box-lid {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border: 2px dashed #00f2fe;
        }

        .box-container.opened .box-lid {
            transform: translateY(-130%) scale(0.7);
            opacity: 0;
            pointer-events: none;
        }

        /* 📱 جسم الآيفون الحقيقي الحركي */
        .phone {
            width: 260px;
            height: 500px;
            background: #000;
            border: 8px solid #252525;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.7);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box-container.opened .phone {
            opacity: 1;
            transform: scale(1);
        }

        /* الجزيرة التفاعلية المتمددة */
        .dynamic-island {
            width: 90px;
            height: 24px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
            overflow: hidden;
            font-size: 0.6rem;
            color: #11ffbd;
            white-space: nowrap;
        }

        .dynamic-island.expanded {
            width: 200px;
            height: 35px;
            background: #111125;
            border: 1px solid #11ffbd;
        }

        /* الشاشة الداخلية الحية */
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            background-image: linear-gradient(135deg, #2b1055, #7597de);
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
        }

        /* بار الحالة العلوي الفعلي لايف */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
            z-index: 40;
            padding: 0 8px;
        }

        /* 📱 شبكة الأيقونات الحية القابلة للإضافة والتصفح */
        .home-screen {
            flex-grow: 1;
            margin-top: 30px;
            padding: 10px 5px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 15px 10px;
            overflow-y: auto;
            z-index: 30;
        }

        /* نمط الأيقونة التفاعلية */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            position: relative;
            animation: spawnApp 0.3s ease;
        }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .app-item:hover .app-icon {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .app-name {
            font-size: 0.55rem;
            color: white;
            text-align: center;
            max-width: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* زر حذف الأيقونة المتداخل */
        .delete-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background: #ff007f;
            color: white;
            border-radius: 50%;
            font-size: 0.55rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            visibility: hidden;
        }

        .app-item:hover .delete-badge {
            visibility: visible;
        }

        /* 🖥️ نافذة التطبيق المفتوح (المتصفح الداخلي الحقيقي) */
        .app-window {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0b16;
            border-radius: 32px;
            z-index: 45;
            transition: top 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px 15px 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .app-window.active {
            top: 0;
        }

        .window-header {
            font-size: 0.9rem;
            font-weight: bold;
            color: #00f2fe;
            text-align: center;
            margin-bottom: 15px;
        }

        .window-content {
            flex-grow: 1;
            font-size: 0.75rem;
            color: #ccc;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            align-self: center;
        }

        /* بار التحكم السفلي للآيفون */
        .phone-dock {
            height: 55px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
            z-index: 35;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes spawnApp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="external-admin-panel">
        <h3>A0Z الأيقونات الذكية 🖊️✨</h3>
        <div class="form-group">
            <label>اسم التطبيق الجديد:</label>
            <input type="text" id="appNameInput" placeholder="مثال: متجر زارا، تيكتوك...">
        </div>
        <div class="form-group">
            <label>اختر الرمز بلمستك:</label>
            <select id="appIconSelect">
                <option value="🛍️">🛍️ متجر تسوق</option>
                <option value="🎮">🎮 لعبة فضائية</option>
                <option value="🎵">🎵 مشغل موسيقى</option>
                <option value="💬">💬 دردشة لايف</option>
                <option value="📷">📷 كاميرا رقمية</option>
                <option value="👽">👽 نظام فضائي</option>
            </select>
        </div>
        <button class="add-btn" onclick="addNewAppFromPanel()">حقن التطبيق داخل الآيفون 🚀</button>
    </div>

    <div class="box-container" id="cosmicBox" onclick="openBox()">
        <div class="box-lid">
            <span style="font-size: 3rem;">🎁</span>
            <p>افتح صندوق النظام الحي</p>
        </div>

        <div class="phone" onclick="stopPropagation(event)">
            <div class="dynamic-island" id="island">A0Z OS Live</div>
            
            <div class="phone-screen" id="phoneScreen">
                <div class="status-bar">
                    <div id="liveClock">00:00</div>
                    <div style="display: flex; gap: 4px; align-items: center;">
                        <span id="liveBattery">--%</span>
                        <span>🔋</span>
                    </div>
                </div>

                <div class="home-screen" id="homeScreen">
                    <div class="app-item" onclick="openApp('إعدادات النظام ⚙️', 'مرحباً بك في لوحة تحكم عتاد A0Z المتطور. شحن جهازك ونظامك متزامن بالكامل!')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #555, #222);">⚙️</div>
                        <div class="app-name">الإعدادات</div>
                    </div>
                    <div class="app-item" onclick="openApp('متجر قلم A0Z السحري 🖊️', 'لفتح الهواتف الفضائية وحظر التسلل، قم بشراء النسخة السيادية من القلم الفسفوري بقيمة 10$.')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #ff0055, #770022);">🖊️</div>
                        <div class="app-name">المتجر</div>
                    </div>
                    <div class="app-item" onclick="openApp('فخ الهاكرز 🖕', 'تنبيه أمني صارم: تم تفعيل مصفوفة الصفر اللانهائي وعزل متصفح المهاجم الحركي!')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #00c6ff, #0072ff);">🛡️</div>
                        <div class="app-name">فخ الهكر</div>
                    </div>
                </div>

                <div class="app-window" id="appWindow">
                    <div class="window-header" id="winHeader">تطبيق</div>
                    <div class="window-content" id="winContent">محتوى التصفح الحي...</div>
                    <button class="close-btn" onclick="closeApp()">اضغط للخروج للشاشة 🏠</button>
                </div>

                <div class="phone-dock">
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.1rem;" onclick="changeWallpaper('linear-gradient(135deg, #0f2027, #203a43, #2c5364)')">🌌</div>
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.1rem;" onclick="changeWallpaper('linear-gradient(135deg, #ff9966, #ff5e62)')">🌅</div>
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.1rem;" onclick="changeWallpaper('linear-gradient(135deg, #11ffbd, #abff94)')">🍏</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. فتح الصندوق
        function openBox() {
            document.getElementById('cosmicBox').classList.add('opened');
        }

        function stopPropagation(event) {
            event.stopPropagation();
        }

        // 2. إدارة الوقت الفعلي المتزامن لايف (Real-time Clock Sync)
        function syncTime() {
            const now = new Date();
            let hh = now.getHours();
            let mm = now.getMinutes();
            hh = hh < 10 ? '0' + hh : hh;
            mm = mm < 10 ? '0' + mm : mm;
            document.getElementById('liveClock').innerText = `${hh}:${mm}`;
        }
        setInterval(syncTime, 1000);
        syncTime();

        // 3. قراءة شحن بطارية جهازك الفعلي حياً وإسقاطها داخل نظام الآيفون
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBattery() {
                    document.getElementById('liveBattery').innerText = Math.round(battery.level * 100) + '%';
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        } else {
            document.getElementById('liveBattery').innerText = "99%";
        }

        // 4. 🚀 خاصية إضافة وحقن أيقونات وتطبيقات جديدة حياً (Dynamic App Addition)
        function addNewAppFromPanel() {
            const nameInput = document.getElementById('appNameInput');
            const iconSelect = document.getElementById('appIconSelect');
            
            const appName = nameInput.value.trim();
            const appIcon = iconSelect.value;

            if (appName === "") {
                triggerIslandNotification("اكتب اسماً للتطبيق أولاً! ❌");
                return;
            }

            const homeScreen = document.getElementById('homeScreen');

            // إنشاء عناصر الـ DOM للتطبيق الجديد بالكامل حياً
            const appItem = document.createElement('div');
            appItem.className = 'app-item';
            
            // محتوى التطبيق التصفحي عند الضغط عليه
            const clickCommand = `openApp('${appName} ${appIcon}', 'لقد قمت بفتح وتصفح تطبيق (${appName}) الحي داخل نظام الماتريكس بنجاح!')`;
            appItem.setAttribute('onclick', clickCommand);

            appItem.innerHTML = `
                <div class="app-icon">${appIcon}</div>
                <div class="app-name">${appName}</div>
                <div class="delete-badge" onclick="deleteApp(event, this)">X</div>
            `;

            homeScreen.appendChild(appItem);
            triggerIslandNotification(`تم تثبيت ${appName} بنجاح! 🎉`);
            
            // تصفير حقل الإدخال
            nameInput.value = "";
        }

        // 5. تصفح وفتح التطبيقات الداخلية
        function openApp(title, content) {
            document.getElementById('winHeader').innerText = title;
            document.getElementById('winContent').innerHTML = `<p>${content}</p><span style='font-size:3rem;'>🚀</span>`;
            document.getElementById('appWindow').classList.add('active');
        }

        function closeApp() {
            document.getElementById('appWindow').classList.remove('active');
        }

        // 6. حذف الأيقونات باللمس حياً
        function deleteApp(event, element) {
            event.stopPropagation(); // منع فتح التطبيق أثناء الضغط على زر الحذف
            const appItem = element.parentElement;
            appItem.style.transform = "scale(0)";
            setTimeout(() => {
                appItem.remove();
                triggerIslandNotification("تم حذف التطبيق! 🗑️");
            }, 200);
        }

        // 7. تحريك وتغيير خلفية الشاشة
        function changeWallpaper(gradient) {
            document.getElementById('phoneScreen').style.backgroundImage = gradient;
            triggerIslandNotification("تم تحديث الخلفية 🎨");
        }

        // 8. إشعارات الجزيرة التفاعلية (Dynamic Island Notification Engine)
        function triggerIslandNotification(text) {
            const island = document.getElementById('island');
            island.innerText = text;
            island.classList.add('expanded');
            setTimeout(() => {
                island.classList.remove('expanded');
                island.innerText = "A0Z OS Live";
            }, 2500);
        }
    </script>
</body>
</html>
