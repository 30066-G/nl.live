<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z Infinite Luxury iPhone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0c0c1e 0%, #030308 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            color: white;
            padding: 30px;
            overflow: hidden;
        }

        /* 🛠️ لوحة التحكم الخارجية الفخمة */
        .external-admin-panel {
            width: 340px;
            background: rgba(10, 10, 25, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 242, 254, 0.05), inset 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .external-admin-panel h3 {
            color: #00f2fe;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #8a99ad;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(5, 5, 15, 0.8);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            font-size: 0.9rem;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        /* 📦 حاوية الصندوق الفخم */
        .box-container {
            width: 380px;
            height: 600px;
            background: linear-gradient(135deg, #111126, #04040c);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        /* غطاء الصندوق الفخم قبل الفتح */
        .box-lid {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #090914;
            border-radius: 34px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .box-lid .logo {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 15px;
        }

        .box-lid p {
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 1px;
            font-weight: 300;
            opacity: 0.8;
        }

        .box-container.opened .box-lid {
            transform: translateY(-140%) scale(0.6);
            opacity: 0;
            pointer-events: none;
        }

        /* 📱 جوال الآيفون الفخم بتصميم تيتانيوم حقيقي */
        .phone {
            width: 275px;
            height: 540px;
            background: #000;
            border: 9px solid #2e2e33; /* حافة تيتانيوم */
            border-radius: 46px;
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9), inset 0 0 12px rgba(255,255,255,0.15);
            opacity: 0;
            transform: scale(0.7);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .box-container.opened .phone {
            opacity: 1;
            transform: scale(1);
        }

        /* الأزرار الجانبية الميكانيكية للآيفون الفخم */
        .phone::before, .phone::after {
            content: "";
            position: absolute;
            background: #3a3a40;
            width: 4px;
            border-radius: 2px;
        }
        /* أزرار الصوت على اليسار */
        .phone::before {
            top: 100px;
            left: -13px;
            height: 40px;
            box-shadow: 0 15px 0 #3a3a40; /* زرين */
        }
        /* زر الطاقة على اليمين */
        .phone::after {
            top: 120px;
            right: -13px;
            height: 55px;
        }

        /* الجزيرة التفاعلية (Dynamic Island الأصلي) */
        .dynamic-island {
            width: 95px;
            height: 26px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 12px;
            overflow: hidden;
            font-size: 0.65rem;
            color: #00f2fe;
            white-space: nowrap;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .dynamic-island.expanded {
            width: 210px;
            height: 38px;
            background: #090911;
            border: 1px solid rgba(0, 242, 254, 0.4);
        }

        /* الشاشة الداخلية فائقة النقاء (OLED Emulation) */
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 16px;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
        }

        /* بار الحالة العلوي الفخم */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: white;
            font-weight: 600;
            z-index: 40;
            padding: 0 6px;
        }

        /* 📱 شبكة الأيقونات والترتيب الهندسي للأزرار */
        .home-screen {
            flex-grow: 1;
            margin-top: 35px;
            padding: 10px 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 20px 12px;
            overflow-y: auto;
            z-index: 30;
        }

        /* إلغاء شريط التمرير المزعج لجمالية الشاشة */
        .home-screen::-webkit-scrollbar {
            display: none;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            position: relative;
        }

        .app-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .app-item:hover .app-icon {
            transform: scale(1.15) translateY(-3px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3);
        }

        .app-name {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-weight: 500;
            max-width: 55px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .delete-badge {
            position: absolute;
            top: -4px;
            right: -2px;
            width: 15px;
            height: 15px;
            background: #ff3366;
            color: white;
            border-radius: 50%;
            font-size: 0.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            visibility: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .app-item:hover .delete-badge {
            visibility: visible;
        }

        /* 📸 نافذة التطبيقات المتكاملة والكاميرا الحية */
        .app-window {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #09090e;
            border-radius: 38px;
            z-index: 45;
            transition: top 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 45px 16px 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .app-window.active {
            top: 0;
        }

        .window-header {
            font-size: 0.95rem;
            font-weight: bold;
            color: #00f2fe;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .window-content {
            flex-grow: 1;
            font-size: 0.8rem;
            color: #bcbcbc;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        /* عنصر بث فيديو الكاميرا الحقيقي */
        #cameraVideo {
            width: 100%;
            height: 80%;
            background: #000;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid rgba(0, 242, 254, 0.3);
            display: none;
            transform: scaleX(-1); /* ميرور للحرب لتبدو طبيعية */
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 🎛️ صف الأزرار السفلي الثابت للآيفون الفخم (The Premium Dock) */
        .phone-dock {
            height: 60px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border-radius: 22px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 35;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="external-admin-panel">
        <h3>مصفوفة الأيقونات والكود 🚀</h3>
        <div class="form-group">
            <label>اسم التطبيق الجديد:</label>
            <input type="text" id="appNameInput" placeholder="مثال: متجر ملابس، هرم حماية...">
        </div>
        <div class="form-group">
            <label>اختر تصميم الزر (Emoji):</label>
            <select id="appIconSelect">
                <option value="🛍️">🛍️ متجر زارا الافتراضي</option>
                <option value="🕹️">🕹️ لعبة الماتريكس</option>
                <option value="🎵">🎵 بنك الصوت الفضائي</option>
                <option value="💬">💬 غرف دردشة المشرفين</option>
                <option value="👽">👽 بوابة الكائنات الفضائية</option>
            </select>
        </div>
        <div class="form-group">
            <label>اكتب الكود الحي للتطبيق (JavaScript):</label>
            <textarea id="appCodeInput" rows="4" style="resize: none;" placeholder="// اكتب كودك هنا وسينفذ باللمس لايف!&#10;alert('أحا كودك اشتغل داخل الآيفون! 😂');"></textarea>
        </div>
        <button class="add-btn" onclick="addNewAppFromPanel()">حقن وثني الأيقونة بالداخل 💎</button>
    </div>

    <div class="box-container" id="cosmicBox" onclick="openBox()">
        <div class="box-lid">
            <div class="logo">🍏</div>
            <p>إفتح صندوق الآيفون الفخم</p>
        </div>

        <div class="phone" onclick="stopPropagation(event)">
            <div class="dynamic-island" id="island">A0Z Titanium</div>
            
            <div class="phone-screen" id="phoneScreen">
                <div class="status-bar">
                    <div id="liveClock" style="letter-spacing: 0.5px;">00:00</div>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <span id="liveBattery">--%</span>
                        <span style="font-size:0.8rem;">🔋</span>
                    </div>
                </div>

                <div class="home-screen" id="homeScreen">
                    <div class="app-item" onclick="openApp('إعدادات النظام ⚙️', 'لوحة تحكم عتاد A0Z مدمجة بالكامل ومستقرة.')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #444, #111);">⚙️</div>
                        <div class="app-name">الإعدادات</div>
                    </div>
                    <div class="app-item" onclick="openCameraApp()">
                        <div class="app-icon" style="background: linear-gradient(135deg, #00b4db, #0083b0);">📷</div>
                        <div class="app-name">الكاميرا الحية</div>
                    </div>
                    <div class="app-item" onclick="openApp('متجر قلم A0Z 🖊️', 'اشترِ القلم لتفعيل الشاشة وإكمال عمليات الشراء التفاعلية الحصرية!')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #f857a6, #ff5858);">🖊️</div>
                        <div class="app-name">المتجر</div>
                    </div>
                    <div class="app-item" onclick="openApp('حلقة الـ 0 اللانهائية 🖕', 'تم حظر وتجميد متصفح المتسللين عبر مصفوفة الحفر الذكية!')">
                        <div class="app-icon" style="background: linear-gradient(135deg, #02c39a, #028090);">🛡️</div>
                        <div class="app-name">فخ الهكر</div>
                    </div>
                </div>

                <div class="app-window" id="appWindow">
                    <div class="window-header" id="winHeader">تطبيق</div>
                    <div class="window-content" id="winContent">
                        <video id="cameraVideo" autoplay playsinline></video>
                        <div id="textWindowContent">محتوى التطبيق...</div>
                    </div>
                    <button class="close-btn" onclick="closeApp()">العودة للرئيسية 🏠</button>
                </div>

                <div class="phone-dock">
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.2rem;" onclick="changeWallpaper('url(\'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop\')')">🌌</div>
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.2rem;" onclick="changeWallpaper('url(\'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=2564&auto=format&fit=crop\')')">🌈</div>
                    <div class="app-icon" style="width:38px; height:38px; font-size:1.2rem;" onclick="changeWallpaper('url(\'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=2564&auto=format&fit=crop\')')">🎨</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let videoStream = null;

        function openBox() {
            document.getElementById('cosmicBox').classList.add('opened');
        }

        function stopPropagation(event) {
            event.stopPropagation();
        }

        // تحديث الوقت الفعلي لايف بالدقيقة والبار العلوي
        function syncTime() {
            const now = new Date();
            let hh = now.getHours();
            let mm = now.getMinutes();
            hh = hh < 10 ? '0' + hh : hh;
            mm = mm < 10 ? '0' + mm : mm;
            document.getElementById('liveClock').innerText = `${hh}:${mm}`;
        }
        setInterval(syncTime, 1000);
        syncTime();

        // مزامنة شحن بطارية جهازك الفعلي
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBattery() {
                    document.getElementById('liveBattery').innerText = Math.round(battery.level * 100) + '%';
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        } else {
            document.getElementById('liveBattery').innerText = "100%";
        }

        // 📸 تشغيل الكاميرا الحقيقية الحية عبر الـ API الفعلي
        function openCameraApp() {
            openApp('الكاميرا الحية 📷', '');
            const video = document.getElementById('cameraVideo');
            const textContent = document.getElementById('textWindowContent');
            
            textContent.style.display = 'none';
            video.style.display = 'block';

            // طلب تشغيل الكاميرا الأمامية لايف
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(function(stream) {
                    videoStream = stream;
                    video.srcObject = stream;
                    triggerIslandNotification("تم تفعيل الكاميرا الأمامية 🟢");
                })
                .catch(function(error) {
                    video.style.display = 'none';
                    textContent.style.display = 'block';
                    textContent.innerHTML = `<p style='color:#ff3366;'>فشل تشغيل الكاميرا: يرجى قبول الصلاحية في متصفحك الحقيقي!</p>`;
                });
            } else {
                textContent.innerHTML = "<p>الكاميرا غير مدعومة على متصفحك الحالي.</p>";
            }
        }

        // 🚀 خاصية حقن الأزرار وتشغيل الكود المخصص الحي
        function addNewAppFromPanel() {
            const nameInput = document.getElementById('appNameInput');
            const iconSelect = document.getElementById('appIconSelect');
            const codeInput = document.getElementById('appCodeInput');
            
            const appName = nameInput.value.trim();
            const appIcon = iconSelect.value;
            let appCode = codeInput.value.trim() || `alert('مرحباً بك في تطبيق ${appName}!');`;

            if (appName === "") {
                triggerIslandNotification("يرجى كتابة اسم الزر! ❌");
                return;
            }

            const homeScreen = document.getElementById('homeScreen');
            const appItem = document.createElement('div');
            appItem.className = 'app-item';
            
            // تشفير الكود لحفظه وحقنه ديناميكياً بأمان
            const encodedCode = btoa(unescape(encodeURIComponent(appCode)));
            appItem.setAttribute('onclick', `executeCustomCode('${appName}', '${encodedCode}')`);

            appItem.innerHTML = `
                <div class="app-icon">${appIcon}</div>
                <div class="app-name">${appName}</div>
                <div class="delete-badge" onclick="deleteApp(event, this)">X</div>
            `;

            homeScreen.appendChild(appItem);
            triggerIslandNotification(`تم تثبيت ${appName} بنجاح! 💎`);
            
            nameInput.value = "";
            codeInput.value = "";
        }

        function executeCustomCode(appName, encodedCode) {
            const realCode = decodeURIComponent(escape(atob(encodedCode)));
            try {
                openApp(appName, "جاري تشغيل الكود المخصص بالخلفية... ⚡");
                // تنفيذ كود المستخدم لايف بـ Isolated Function Scope
                new Function(realCode)();
            } catch (error) {
                document.getElementById('textWindowContent').innerHTML = `<p style="color:#ff3366;">خطأ في كودك: ${error.message}</p>`;
            }
        }

        // فتح وإغلاق النوافذ التصفحية
        function openApp(title, content) {
            document.getElementById('cameraVideo').style.display = 'none';
            document.getElementById('textWindowContent').style.display = 'block';
            
            document.getElementById('winHeader').innerText = title;
            document.getElementById('textWindowContent').innerHTML = `<p>${content}</p><span style='font-size:2.5rem; margin-top:15px; display:block;'>🛸</span>`;
            document.getElementById('appWindow').classList.add('active');
        }

        function closeApp() {
            document.getElementById('appWindow').classList.remove('active');
            // إيقاف بث الكاميرا الحقيقية عند الخروج لحفظ الطاقة والخصوصية
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function deleteApp(event, element) {
            event.stopPropagation();
            const appItem = element.parentElement;
            appItem.style.transform = "scale(0)";
            setTimeout(() => {
                appItem.remove();
                triggerIslandNotification("تم حذف الزر 🗑️");
            }, 250);
        }

        function changeWallpaper(wallpaperValue) {
            document.getElementById('phoneScreen').style.backgroundImage = wallpaperValue;
            triggerIslandNotification("تم تغيير المظهر 🎨");
        }

        function triggerIslandNotification(text) {
            const island = document.getElementById('island');
            island.innerText = text;
            island.classList.add('expanded');
            setTimeout(() => {
                island.classList.remove('expanded');
                island.innerText = "A0Z Titanium";
            }, 2400);
        }
    </script>
</body>
</html>
