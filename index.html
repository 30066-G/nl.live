<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO FIELD ENGINE PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-user-select:none;
user-select:none
}

body{
overflow:hidden;
background:#181818
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
display:flex;
flex-wrap:wrap;
gap:6px;
padding:8px;
background:#232323;
border-bottom:2px solid #3a3a3a
}

.btn{
background:#2f2f2f;
color:#fff;
border:none;
padding:8px 12px;
border-radius:12px;
font-size:12px;
font-weight:700;
cursor:pointer
}

.btn:active{
background:#ff9800
}

.box{
background:#2c2c2c;
padding:6px 10px;
border-radius:10px;
display:flex;
align-items:center;
gap:6px;
color:#fff;
font-size:12px
}

input{
background:#111;
border:1px solid #555;
border-radius:6px;
padding:5px;
color:#fff
}

input[type=text]{
width:100px;
text-align:center
}

input[type=range]{
width:90px
}

#symbols{
position:fixed;
right:10px;
top:90px;
display:flex;
flex-direction:column;
gap:6px;
z-index:9999;
max-height:82vh;
overflow:auto
}

.sym{
background:#303030;
border:none;
color:#fff;
padding:9px;
border-radius:10px;
font-size:11px;
font-weight:700;
cursor:pointer;
min-width:120px
}

.sym:active{
background:#ff9800
}

#panel{
position:fixed;
left:10px;
top:90px;
width:260px;
background:rgba(15,15,15,.95);
border:2px solid #ff9800;
border-radius:16px;
padding:15px;
color:#fff;
z-index:9999;
backdrop-filter:blur(8px)
}

#panel h3{
color:#ff9800;
margin-bottom:10px
}

#panel div{
margin-top:8px
}

#zoom{
position:fixed;
bottom:18px;
left:18px;
background:rgba(0,0,0,.7);
color:#fff;
padding:8px 12px;
border-radius:12px;
z-index:9999
}

#pad{
position:fixed;
bottom:20px;
right:20px;
display:grid;
grid-template-columns:repeat(3,55px);
grid-template-rows:repeat(3,55px);
gap:6px;
z-index:9999
}

.nav{
border:none;
background:#2d89ef;
color:#fff;
border-radius:12px;
font-size:22px;
font-weight:700
}

.nav:active{
background:#ff9800
}

.center{
background:#d84315;
font-size:11px
}

#mini{
position:fixed;
bottom:20px;
right:220px;
width:160px;
height:120px;
background:rgba(0,0,0,.7);
border:2px solid #555;
border-radius:12px;
z-index:9999
}

#cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:14px;
height:14px;
border:2px solid red;
border-radius:50%;
pointer-events:none;
z-index:9999
}

.selected{
outline:2px solid #00aaff
}

</style>
</head>

<body>

<div id="ui">

<button class="btn" onclick="resetCam()">Center</button>
<button class="btn" onclick="undo()">Undo</button>
<button class="btn" onclick="redo()">Redo</button>
<button class="btn" onclick="clearAll()">Clear</button>
<button class="btn" onclick="exportPNG()">Export</button>

<div class="box">
<span>Projekt</span>
<input type="text" id="project" value="Rentschler">
</div>

<div class="box">
<span>ISO</span>
<input type="text" id="iso" value="K-Flex">
</div>

<div class="box">
<span>Rohr</span>
<input type="text" id="pipe" value="Ø220">
</div>

<div class="box">
<span>Länge</span>
<input type="range" id="len" min="20" max="250" value="60">
<span id="lenText">350 mm</span>
</div>

<div class="box">
<span>Text</span>
<input type="range" id="font" min="10" max="30" value="15">
</div>

</div>

<div id="symbols">

<button class="sym" onclick="pick('valve')">Ventil</button>
<button class="sym" onclick="pick('pump')">Pumpe</button>
<button class="sym" onclick="pick('flange')">Flansch</button>
<button class="sym" onclick="pick('gauge')">Messgerät</button>
<button class="sym" onclick="pick('elbow')">Bogen</button>
<button class="sym" onclick="pick('tee')">T-Stück</button>
<button class="sym" onclick="pick('filter')">Filter</button>
<button class="sym" onclick="pick('fan')">Lüfter</button>
<button class="sym" onclick="pick('tank')">Tank</button>
<button class="sym" onclick="pick('arrow')">Pfeil</button>
<button class="sym" onclick="pick('sensor')">Sensor</button>
<button class="sym" onclick="pick('damper')">Damper</button>

</div>

<div id="panel">

<h3>Technische Daten</h3>

<div>Gesamtlänge: <span id="sum">0</span> mm</div>
<div>Rohr: <span id="pipeInfo">Ø220</span></div>
<div>Projekt: <span id="projectInfo">Rentschler</span></div>
<div>Zoom: <span id="zoomInfo">100%</span></div>

</div>

<div id="zoom">
Zoom: <span id="zoomText">100%</span>
</div>

<div id="cross"></div>

<canvas id="mini"></canvas>

<div id="pad">

<div></div>
<button class="nav" onclick="manual('up')">↑</button>
<div></div>

<button class="nav" onclick="manual('lu')">↖</button>
<button class="nav center" onclick="resetCam()">ISO</button>
<button class="nav" onclick="manual('ru')">↗</button>

<button class="nav" onclick="manual('ld')">↙</button>
<button class="nav" onclick="manual('down')">↓</button>
<button class="nav" onclick="manual('rd')">↘</button>

</div>

<canvas id="paper"></canvas>
<canvas id="draw"></canvas>

<script>

const paper=document.getElementById("paper")
const draw=document.getElementById("draw")

const ptx=paper.getContext("2d")
const ctx=draw.getContext("2d")

const mini=document.getElementById("mini")
const mtx=mini.getContext("2d")

let w=innerWidth
let h=innerHeight

const dpr=devicePixelRatio||1

function setup(c,x){

c.width=w*dpr
c.height=h*dpr

c.style.width=w+"px"
c.style.height=h+"px"

x.scale(dpr,dpr)

}

setup(paper,ptx)
setup(draw,ctx)

mini.width=160
mini.height=120

let cam={
x:0,
y:0,
z:1,
vx:0,
vy:0,
vz:0
}

let current={
x:w/2,
y:h/2-60
}

const layers={
pipes:[],
symbols:[],
dims:[]
}

let redoStack=[]

let selectedSymbol=null

let selectedObj=null

let total=0

const ratio=5.833

function resize(){

w=innerWidth
h=innerHeight

setup(paper,ptx)
setup(draw,ctx)

render()

}

onresize=resize

function paperGrid(){

ptx.clearRect(0,0,w,h)

ptx.fillStyle="#fff"
ptx.fillRect(0,0,w,h)

ptx.save()

ptx.translate(cam.x,cam.y)
ptx.scale(cam.z,cam.z)

const step=24
const a=Math.PI/6

ptx.strokeStyle="rgba(120,160,190,.22)"
ptx.lineWidth=.7

for(let i=-10000;i<10000;i+=step){

ptx.beginPath()
ptx.moveTo(i,-10000)
ptx.lineTo(i+10000*Math.tan(a),10000)
ptx.stroke()

ptx.beginPath()
ptx.moveTo(i,-10000)
ptx.lineTo(i-10000*Math.tan(a),10000)
ptx.stroke()

}

for(let y=-10000;y<10000;y+=step){

ptx.beginPath()
ptx.moveTo(-10000,y)
ptx.lineTo(10000,y)
ptx.stroke()

}

ptx.restore()

footer()

}

function footer(){

const fy=h-120

ptx.fillStyle="#fafafa"
ptx.fillRect(0,fy,w,120)

ptx.strokeStyle="#222"
ptx.lineWidth=2

ptx.beginPath()
ptx.moveTo(0,fy)
ptx.lineTo(w,fy)
ptx.stroke()

const cols=[21,27,33,42,48,60,76,89,114,140,168,219,273,324,457]

const cw=w/(cols.length+2)

ptx.font="10px Segoe UI"
ptx.fillStyle="#111"

for(let i=0;i<cols.length;i++){

const x=(i+1)*cw

ptx.beginPath()
ptx.moveTo(x,fy)
ptx.lineTo(x,fy+40)
ptx.stroke()

ptx.fillText(cols[i],x+7,fy+15)
ptx.fillText(Math.round(cols[i]*1.37),x+4,fy+33)

}

ptx.beginPath()
ptx.moveTo(0,fy+20)
ptx.lineTo(w,fy+20)
ptx.stroke()

ptx.beginPath()
ptx.moveTo(0,fy+40)
ptx.lineTo(w,fy+40)
ptx.stroke()

ptx.fillStyle="#ff9800"
ptx.font="bold 13px Segoe UI"

ptx.fillText("Frech Dämmtechnik",w-210,fy+65)

ptx.fillStyle="#111"
ptx.font="11px Segoe UI"

ptx.fillText("Projekt: "+project.value,w-210,fy+85)
ptx.fillText("Isolierung: "+iso.value,w-210,fy+102)

}

function drawPipe(p){

ctx.save()

ctx.shadowBlur=6
ctx.shadowColor="rgba(0,0,0,.35)"

ctx.strokeStyle="#0f0f0f"
ctx.lineWidth=6
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(p.a.x,p.a.y)
ctx.lineTo(p.b.x,p.b.y)
ctx.stroke()

ctx.strokeStyle="#4e4e4e"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(p.a.x,p.a.y)
ctx.lineTo(p.b.x,p.b.y)
ctx.stroke()

const mx=(p.a.x+p.b.x)/2
const my=(p.a.y+p.b.y)/2

ctx.translate(mx,my)
ctx.rotate(p.angle)

ctx.font="bold "+font.value+"px Segoe UI"
ctx.textAlign="center"

ctx.strokeStyle="#fff"
ctx.lineWidth=5

ctx.strokeText(p.len,0,-10)

ctx.fillStyle="#111"
ctx.fillText(p.len,0,-10)

ctx.restore()

}

function drawSymbol(type,x,y,r=0){

ctx.save()

ctx.translate(x,y)
ctx.rotate(r)

ctx.strokeStyle="#0b8c4f"
ctx.fillStyle="#0b8c4f"
ctx.lineWidth=2.5

const s=14

if(type==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(type==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(type==="flange"){

ctx.beginPath()
ctx.moveTo(0,-s)
ctx.lineTo(s,0)
ctx.lineTo(0,s)
ctx.lineTo(-s,0)
ctx.closePath()
ctx.stroke()

}

if(type==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(type==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

if(type==="tee"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,0)
ctx.moveTo(0,0)
ctx.lineTo(0,-s)
ctx.stroke()

}

if(type==="filter"){

ctx.strokeRect(-s,-s,s*2,s*2)

ctx.beginPath()
ctx.moveTo(-s,-s)
ctx.lineTo(s,s)
ctx.stroke()

}

if(type==="fan"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

for(let i=0;i<3;i++){

ctx.beginPath()

ctx.moveTo(0,0)

ctx.lineTo(
Math.cos(i*2*Math.PI/3)*s,
Math.sin(i*2*Math.PI/3)*s
)

ctx.stroke()

}

}

if(type==="tank"){

ctx.strokeRect(-s,-s,s*2,s*2)

}

if(type==="arrow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,0)
ctx.lineTo(s-5,-5)
ctx.moveTo(s,0)
ctx.lineTo(s-5,5)
ctx.stroke()

}

if(type==="sensor"){

ctx.beginPath()
ctx.arc(0,0,s/2,0,Math.PI*2)
ctx.fill()

}

if(type==="damper"){

ctx.strokeRect(-s,-6,s*2,12)

ctx.beginPath()
ctx.moveTo(-s,-6)
ctx.lineTo(s,6)
ctx.stroke()

}

ctx.restore()

}

function render(){

paperGrid()

ctx.clearRect(0,0,w,h)

ctx.save()

ctx.translate(cam.x,cam.y)
ctx.scale(cam.z,cam.z)

layers.pipes.forEach(drawPipe)

layers.symbols.forEach(s=>{

drawSymbol(
s.type,
s.x,
s.y,
s.rot
)

if(selectedObj===s){

ctx.strokeStyle="#00aaff"
ctx.lineWidth=2
ctx.strokeRect(s.x-20,s.y-20,40,40)

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,6,0,Math.PI*2)
ctx.fill()

ctx.restore()

drawMini()

pipeInfo.innerText=pipe.value
projectInfo.innerText=project.value

}

function drawMini(){

mtx.clearRect(0,0,160,120)

mtx.fillStyle="#111"
mtx.fillRect(0,0,160,120)

mtx.strokeStyle="#555"

layers.pipes.forEach(p=>{

mtx.beginPath()

mtx.moveTo(
p.a.x/20,
p.a.y/20
)

mtx.lineTo(
p.b.x/20,
p.b.y/20
)

mtx.stroke()

})

mtx.fillStyle="red"

mtx.fillRect(
80+cam.x/50,
60+cam.y/50,
5,
5
)

}

function addPipe(angle){

const len=parseFloat(document.getElementById("len").value)

const nx=current.x+Math.cos(angle)*len
const ny=current.y+Math.sin(angle)*len

const mm=Math.round(len*ratio)

layers.pipes.push({

a:{x:current.x,y:current.y},
b:{x:nx,y:ny},
len:mm,
angle:angle

})

if(selectedSymbol){

layers.symbols.push({

type:selectedSymbol,
x:nx,
y:ny,
rot:0

})

}

redoStack=[]

current.x=nx
current.y=ny

total+=mm

sum.innerText=total

render()

}

function manual(d){

if(d==="up")addPipe(-Math.PI/2)
if(d==="down")addPipe(Math.PI/2)
if(d==="ru")addPipe(-Math.PI/6)
if(d==="lu")addPipe(-5*Math.PI/6)
if(d==="rd")addPipe(Math.PI/6)
if(d==="ld")addPipe(5*Math.PI/6)

}

function pick(t){

selectedSymbol=t

}

function undo(){

if(layers.pipes.length===0)return

redoStack.push({
pipe:layers.pipes.pop(),
sym:layers.symbols.pop()
})

total=0

layers.pipes.forEach(p=>total+=p.len)

sum.innerText=total

render()

}

function redo(){

if(redoStack.length===0)return

const r=redoStack.pop()

layers.pipes.push(r.pipe)

if(r.sym){
layers.symbols.push(r.sym)
}

render()

}

function clearAll(){

layers.pipes=[]
layers.symbols=[]

redoStack=[]

total=0

sum.innerText=0

render()

}

function resetCam(){

cam.x=0
cam.y=0
cam.z=1

zoomText.innerText="100%"
zoomInfo.innerText="100%"

render()

}

function exportPNG(){

const out=document.createElement("canvas")

out.width=paper.width
out.height=paper.height

const o=out.getContext("2d")

o.drawImage(paper,0,0)
o.drawImage(draw,0,0)

const a=document.createElement("a")

a.download="ISO_FIELD_ENGINE.png"

a.href=out.toDataURL()

a.click()

}

len.oninput=function(){

lenText.innerText=
Math.round(this.value*ratio)+" mm"

}

let pointers={}
let startDist=0
let startZoom=1

let sx=0
let sy=0

let ox=0
let oy=0

draw.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=cam.z

}

if(ids.length===1){

sx=e.clientX
sy=e.clientY

ox=cam.x
oy=cam.y

}

})

draw.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

const nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

const target=Math.min(
Math.max(startZoom*(nd/startDist),.35),
8
)

cam.z+=((target-cam.z)*0.18)

zoomText.innerText=Math.round(cam.z*100)+"%"
zoomInfo.innerText=Math.round(cam.z*100)+"%"

render()

}

if(ids.length===1){

cam.vx=(e.clientX-sx)*0.12
cam.vy=(e.clientY-sy)*0.12

cam.x=ox+(e.clientX-sx)
cam.y=oy+(e.clientY-sy)

render()

}

})

draw.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

})

function physics(){

cam.x+=cam.vx
cam.y+=cam.vy

cam.vx*=0.92
cam.vy*=0.92

render()

requestAnimationFrame(physics)

}

physics()

draw.addEventListener("wheel",e=>{

e.preventDefault()

const delta=e.deltaY<0?1.08:.92

cam.z*=delta

cam.z=Math.min(Math.max(cam.z,.35),8)

zoomText.innerText=Math.round(cam.z*100)+"%"
zoomInfo.innerText=Math.round(cam.z*100)+"%"

render()

},{passive:false})

render()

</script>

</body>
</html>
