<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO CAD Mobile</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-user-select:none;
user-select:none;
font-family:Segoe UI,Arial,sans-serif
}

body{
overflow:hidden;
background:#1a1a1a
}

#topbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:#1f1f1f;
padding:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
border-bottom:2px solid #333
}

.btn{
background:#2e2e2e;
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
font-size:12px;
font-weight:600
}

.btn:active{
background:#d97800
}

.group{
display:flex;
align-items:center;
gap:5px;
background:#2a2a2a;
padding:5px 8px;
border-radius:8px
}

.group input{
background:#111;
border:1px solid #555;
color:#fff;
padding:4px;
border-radius:5px
}

.group input[type=text]{
width:100px;
text-align:center
}

.group label{
font-size:11px;
color:#ccc
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#info{
position:fixed;
left:10px;
top:110px;
z-index:999;
background:rgba(25,25,25,.92);
border:2px solid #d97800;
padding:14px;
border-radius:12px;
width:240px;
color:#fff
}

#info h3{
color:#ff9800;
margin-bottom:8px;
font-size:16px
}

#symbols{
position:fixed;
right:10px;
top:110px;
z-index:999;
display:flex;
flex-direction:column;
gap:6px;
background:rgba(20,20,20,.92);
padding:8px;
border-radius:12px
}

.sym{
background:#2c2c2c;
border:none;
color:#fff;
padding:10px;
border-radius:8px;
font-size:12px
}

#zoom{
position:fixed;
bottom:20px;
left:20px;
z-index:999;
background:rgba(0,0,0,.7);
padding:6px 12px;
border-radius:8px;
color:#fff;
font-size:12px
}

</style>
</head>

<body>

<div id="topbar">

<button class="btn" onclick="resetView()">Zentrieren</button>

<div class="group">
<label>Projekt</label>
<input type="text" id="project" value="Rentschler">
</div>

<div class="group">
<label>Isolierung</label>
<input type="text" id="iso" value="K-Flex">
</div>

<div class="group">
<label>Rohr</label>
<input type="text" id="pipe" value="Ø220">
</div>

<div class="group">
<label>Länge</label>
<input type="range" id="len" min="20" max="220" value="60">
<span id="lenText">350 mm</span>
</div>

<button class="btn" onclick="undo()">Undo</button>
<button class="btn" onclick="clearAll()">Löschen</button>
<button class="btn" onclick="exportPNG()">Export</button>

</div>

<div id="info">
<h3>Technische Daten</h3>
<div style="margin-top:8px">
Gesamtlänge:
<span id="sum">0</span> mm
</div>

<div style="margin-top:6px">
Rohrdurchmesser:
<span id="pipeInfo">Ø220</span>
</div>

<div style="margin-top:6px">
Projekt:
<span id="projectInfo">Rentschler</span>
</div>
</div>

<div id="symbols">
<button class="sym" onclick="setSymbol('valve')">Ventil</button>
<button class="sym" onclick="setSymbol('flange')">Flansch</button>
<button class="sym" onclick="setSymbol('pump')">Pumpe</button>
<button class="sym" onclick="setSymbol('gauge')">Messgerät</button>
<button class="sym" onclick="setSymbol('elbow')">Bogen</button>
</div>

<div id="zoom">
Zoom:
<span id="zoomText">100%</span>
</div>

<canvas id="bg"></canvas>
<canvas id="draw"></canvas>

<script>

const bg=document.getElementById("bg")
const draw=document.getElementById("draw")

const bgx=bg.getContext("2d")
const ctx=draw.getContext("2d")

let w=window.innerWidth
let h=window.innerHeight

const dpr=window.devicePixelRatio||1

bg.width=w*dpr
bg.height=h*dpr
draw.width=w*dpr
draw.height=h*dpr

bg.style.width=w+"px"
bg.style.height=h+"px"

draw.style.width=w+"px"
draw.style.height=h+"px"

bgx.scale(dpr,dpr)
ctx.scale(dpr,dpr)

let camera={
x:0,
y:0,
zoom:1
}

let pipes=[]
let total=0

let current={
x:w/2,
y:h/2
}

let selectedSymbol=null

function resize(){

location.reload()

}

window.onresize=resize

function snap(v){

return Math.round(v/16)*16

}

function drawGrid(){

bgx.clearRect(0,0,w,h)

bgx.fillStyle="#ffffff"
bgx.fillRect(0,0,w,h)

bgx.save()

bgx.translate(camera.x,camera.y)
bgx.scale(camera.zoom,camera.zoom)

const step=32
const angle=Math.PI/6

bgx.strokeStyle="rgba(130,160,190,.22)"
bgx.lineWidth=.7

for(let i=-6000;i<6000;i+=step){

bgx.beginPath()
bgx.moveTo(i,-6000)
bgx.lineTo(i+6000*Math.tan(angle),6000)
bgx.stroke()

bgx.beginPath()
bgx.moveTo(i,-6000)
bgx.lineTo(i-6000*Math.tan(angle),6000)
bgx.stroke()

}

bgx.strokeStyle="rgba(90,110,130,.12)"

for(let y=-6000;y<6000;y+=step){

bgx.beginPath()
bgx.moveTo(-6000,y)
bgx.lineTo(6000,y)
bgx.stroke()

}

bgx.restore()

drawFooter()

}

function drawFooter(){

let y=h-110

bgx.fillStyle="#fafafa"
bgx.fillRect(0,y,w,110)

bgx.strokeStyle="#222"
bgx.lineWidth=2

bgx.beginPath()
bgx.moveTo(0,y)
bgx.lineTo(w,y)
bgx.stroke()

const cols=[21,27,33,42,48,60,76,89,114,140,168,219,273,324,457]
let cw=w/(cols.length+2)

bgx.font="10px Segoe UI"
bgx.fillStyle="#111"

for(let i=0;i<cols.length;i++){

let x=(i+1)*cw

bgx.beginPath()
bgx.moveTo(x,y)
bgx.lineTo(x,y+40)
bgx.stroke()

bgx.fillText(cols[i],x+7,y+14)
bgx.fillText(Math.round(cols[i]*1.37),x+4,y+32)

}

bgx.beginPath()
bgx.moveTo(0,y+20)
bgx.lineTo(w,y+20)
bgx.stroke()

bgx.beginPath()
bgx.moveTo(0,y+40)
bgx.lineTo(w,y+40)
bgx.stroke()

bgx.font="bold 13px Segoe UI"
bgx.fillStyle="#d97800"
bgx.fillText("Frech Dämmtechnik",w-190,y+62)

bgx.fillStyle="#111"
bgx.font="11px Segoe UI"

bgx.fillText("Projekt: "+document.getElementById("project").value,w-190,y+82)
bgx.fillText("Isolierung: "+document.getElementById("iso").value,w-190,y+100)

}

function render(){

ctx.clearRect(0,0,w,h)

drawGrid()

ctx.save()

ctx.translate(camera.x,camera.y)
ctx.scale(camera.zoom,camera.zoom)

pipes.forEach(p=>{

ctx.strokeStyle="#202020"
ctx.lineWidth=2.2
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(p.from.x,p.from.y)
ctx.lineTo(p.to.x,p.to.y)
ctx.stroke()

let mx=(p.from.x+p.to.x)/2
let my=(p.from.y+p.to.y)/2-10

ctx.save()

ctx.translate(mx,my)

let ang=Math.atan2(
p.to.y-p.from.y,
p.to.x-p.from.x
)

ctx.rotate(ang)

ctx.font="600 14px Segoe UI"
ctx.textAlign="center"

ctx.strokeStyle="#fff"
ctx.lineWidth=5

ctx.strokeText(p.len+"",0,0)

ctx.fillStyle="#111"
ctx.fillText(p.len+"",0,0)

ctx.restore()

if(p.symbol){

drawSymbol(
p.symbol,
p.to.x,
p.to.y
)

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,5,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function drawSymbol(type,x,y){

ctx.save()

ctx.translate(x,y)

ctx.strokeStyle="#178f4d"
ctx.fillStyle="#178f4d"
ctx.lineWidth=2

let s=12

if(type==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(type==="flange"){

ctx.beginPath()
ctx.moveTo(0,-s)
ctx.lineTo(s,0)
ctx.lineTo(0,s)
ctx.lineTo(-s,0)
ctx.closePath()
ctx.stroke()

}

if(type==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(type==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(type==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

ctx.restore()

}

function addPipe(dx,dy){

let len=parseFloat(document.getElementById("len").value)

let nx=current.x+dx*len
let ny=current.y+dy*len

nx=snap(nx)
ny=snap(ny)

let mm=Math.round(len*5.833)

pipes.push({
from:{x:current.x,y:current.y},
to:{x:nx,y:ny},
len:mm,
symbol:selectedSymbol
})

selectedSymbol=null

current.x=nx
current.y=ny

total+=mm

document.getElementById("sum").innerText=total

render()

}

function setSymbol(s){

selectedSymbol=s

}

draw.addEventListener("touchstart",startTouch)

let sx=0
let sy=0

function startTouch(e){

if(e.touches.length===1){

sx=e.touches[0].clientX
sy=e.touches[0].clientY

}

}

draw.addEventListener("touchend",endTouch)

function endTouch(e){

let ex=e.changedTouches[0].clientX
let ey=e.changedTouches[0].clientY

let dx=ex-sx
let dy=ey-sy

if(Math.abs(dx)>Math.abs(dy)){

if(dx>0){

if(dy<0){
addPipe(.86,-.5)
}else{
addPipe(.86,.5)
}

}else{

if(dy<0){
addPipe(-.86,-.5)
}else{
addPipe(-.86,.5)
}

}

}else{

if(dy<0){
addPipe(0,-1)
}else{
addPipe(0,1)
}

}

}

let pointers={}
let startDist=0
let startZoom=1
let pan=false
let px=0
let py=0
let ox=0
let oy=0

draw.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

let ids=Object.keys(pointers)

if(ids.length===2){

let p1=pointers[ids[0]]
let p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=camera.zoom

}

if(ids.length===1){

pan=true

px=e.clientX
py=e.clientY

ox=camera.x
oy=camera.y

}

})

draw.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

let ids=Object.keys(pointers)

if(ids.length===2){

let p1=pointers[ids[0]]
let p2=pointers[ids[1]]

let nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

camera.zoom=Math.min(
Math.max(startZoom*(nd/startDist),.3),
5
)

document.getElementById("zoomText").innerText=
Math.round(camera.zoom*100)+"%"

render()

}

if(ids.length===1&&pan){

camera.x=ox+(e.clientX-px)
camera.y=oy+(e.clientY-py)

render()

}

})

draw.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

if(Object.keys(pointers).length===0){

pan=false

}

})

function undo(){

pipes.pop()

render()

}

function clearAll(){

pipes=[]
total=0

document.getElementById("sum").innerText=0

render()

}

function resetView(){

camera={
x:0,
y:0,
zoom:1
}

document.getElementById("zoomText").innerText="100%"

render()

}

function exportPNG(){

const a=document.createElement("a")

a.download="ISO_CAD.png"

a.href=draw.toDataURL()

a.click()

}

document.getElementById("len").oninput=function(){

document.getElementById("lenText").innerText=
Math.round(this.value*5.833)+" mm"

}

render()

</script>

</body>
</html>
