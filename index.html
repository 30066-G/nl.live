<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --stone: #4a2c0f;
            --accent: #ff4500;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
        }

        /* خيوط الشمس الضوئية */
        .light-rays {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.05) 0%, transparent 5%, transparent 10%);
            pointer-events: none; z-index: 3;
            animation: raysMove 20s linear infinite;
        }

        @keyframes raysMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* الكائنات الواقعية (GIFs) */
        .wildlife-container {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
        }

        .bird {
            position: absolute; width: 120px; /* حجم الطائر */
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
            animation: flyPath 25s linear infinite;
            opacity: 0.8;
        }

        .butterfly {
            position: absolute; width: 40px;
            animation: butterflyPath 15s ease-in-out infinite;
            opacity: 0.9;
        }

        @keyframes flyPath {
            0% { transform: translate(-150px, 10vh) scaleX(1); }
            100% { transform: translate(110vw, 30vh) scaleX(1); }
        }

        @keyframes butterflyPath {
            0% { transform: translate(20vw, 80vh) rotate(0deg); }
            50% { transform: translate(50vw, 40vh) rotate(45deg); }
            100% { transform: translate(80vw, 90vh) rotate(-45deg); }
        }

        /* زر الخروج بتصميم مدمج */
        .btn-exit {
            position: absolute; top: 15px; right: 15px;
            background: rgba(139, 69, 19, 0.7);
            border: 2px solid var(--gold);
            color: var(--gold); padding: 8px 15px;
            border-radius: 5px; cursor: pointer; z-index: 1000;
            font-weight: bold; font-family: 'Cinzel';
            transition: 0.3s;
        }
        .btn-exit:hover { background: var(--accent); color: white; }

        body::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 5;
        }

        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }

        .game-logo {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(60px, 15vw, 100px);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 8px 8px 0 #000;
            margin-bottom: 40px; animation: float 4s ease-in-out infinite;
        }

        .btn-stone {
            background: linear-gradient(145deg, #8b7355, #4a2c0f);
            border: 4px solid #261a15; border-radius: 12px;
            padding: 20px; color: var(--gold); font-family: 'Cinzel';
            font-weight: 900; font-size: 22px; cursor: pointer;
            text-transform: uppercase; box-shadow: 6px 6px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-stone:active { transform: scale(0.95); box-shadow: 2px 2px 0px #000; }

        #main-ui {
            display: none; position: fixed; inset: 0; z-index: 50;
            flex-direction: column; background: rgba(0,0,0,0.85);
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg-box {
            background: rgba(255, 215, 0, 0.05); border-left: 5px solid var(--accent);
            padding: 15px; border-radius: 0 12px 12px 0;
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .control-panel { background: #1a1108; padding: 20px; display: flex; gap: 10px; border-top: 3px solid var(--stone); }
        #msg-input { flex: 1; background: #000; border: 2px solid var(--stone); color: #fff; padding: 18px; font-size: 16px; outline: none; border-radius: 8px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9) translateX(-30px); } to { opacity: 1; transform: scale(1) translateX(0); } }
    </style>
</head>
<body>

    <div class="light-rays"></div>

    <!-- حاوية الحيوانات الواقعية -->
    <div class="wildlife-container">
        <!-- طائر يطير -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF3eXN6Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/Lp8asXN2p6T5X02WpW/giphy.gif" class="bird" style="top:15%; animation-duration: 30s;">
        
        <!-- فراشات حقيقية -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF3eXN6Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" class="butterfly" style="top:60%; left:10%;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF3eXN6Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4Znd4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif" class="butterfly" style="top:20%; left:70%; animation-delay: 4s;">
    </div>

    <div id="auth-screen">
        <h1 class="game-logo">A0Z</h1>
        <div style="display:flex; flex-direction:column; gap:15px; width:320px;">
            <input id="room-input" style="background:rgba(0,0,0,0.8); border:3px solid var(--stone); border-radius:50px; padding:20px; color:var(--gold); text-align:center; font-size:20px; outline:none;" placeholder="REALM ID">
            <input id="nick-input" style="background:rgba(0,0,0,0.8); border:3px solid var(--stone); border-radius:50px; padding:20px; color:var(--gold); text-align:center; font-size:20px; outline:none;" placeholder="WARRIOR NAME">
            <button class="btn-stone" onclick="enterRoom()">START MISSION</button>
        </div>
    </div>

    <div id="main-ui">
        <button class="btn-exit" onclick="exitRoom()">LOGOUT</button>
        <div style="background:#2a1b0a; padding:20px; text-align:center; border-bottom:4px solid var(--gold);">
            <span id="room-display" style="letter-spacing:8px; font-size:22px; color:var(--gold);">---</span>
        </div>
        <div id="chat-container"></div>
        <div class="control-panel">
            <input id="msg-input" type="text" placeholder="Speak, Warrior...">
            <button class="btn-stone" style="padding:10px 25px; font-size:16px; box-shadow:3px 3px 0 #000;" onclick="sendMsg()">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID, chatRef;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            if (!roomID || !myNick) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('room-display').innerText = roomID.toUpperCase();
            listenForMsgs();
        };

        window.exitRoom = () => {
            if (chatRef) off(chatRef);
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        };

        function listenForMsgs() {
            chatRef = ref(db, `rooms/${roomID}/chat`);
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const container = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `<span style="color:var(--gold); font-size:12px; font-weight:bold;">${data.user}</span><br><span style="color:#f1e5ac; font-size:18px;">${data.text}</span>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/chat`), { user: myNick, text: input.value.trim() });
            input.value = '';
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.sendMsg(); });
    </script>
</body>
</html>
