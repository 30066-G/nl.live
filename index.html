<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO CAD v2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:#181818}

canvas{
position:absolute;
top:0;left:0;
touch-action:none;
}

#topbar{
position:fixed;
top:0;left:0;right:0;
display:flex;
gap:8px;
padding:10px;
background:#202020;
z-index:10;
}

button{
height:40px;
padding:0 12px;
border:none;
border-radius:10px;
background:#333;
color:#fff;
font-weight:600;
}

button.active{background:#ff9800}

#hud{
position:fixed;
bottom:10px;left:10px;
color:#fff;
font-size:13px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="topbar">
<button onclick="setMode('draw')" id="drawBtn">Draw</button>
<button onclick="setMode('edit')" id="editBtn">Edit</button>
<button onclick="deleteSelected()">Delete</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="hud">
<div>Mode: <span id="modeText">draw</span></div>
<div>Zoom: <span id="zoomText">100%</span></div>
</div>

<canvas id="grid"></canvas>
<canvas id="main"></canvas>

<script>
const grid=document.getElementById("grid")
const main=document.getElementById("main")
const gtx=grid.getContext("2d")
const ctx=main.getContext("2d")

let w,h

function resize(){
w=innerWidth
h=innerHeight
grid.width=w;grid.height=h
main.width=w;main.height=h
}
addEventListener("resize",resize)
resize()

// ---------------- CAMERA ----------------
let camera={x:0,y:0,zoom:1,targetZoom:1}

// ---------------- DATA ----------------
let nodes=[]
let edges=[]

// ---------------- STATE ----------------
let mode="draw"
let selectedNode=null
let dragging=false

let startNode=null
let currentPoint={x:0,y:0}

// ---------------- GRID SNAP ----------------
const gridSize=40

function snap(v){
return Math.round(v/gridSize)*gridSize
}

// world/screen
function worldToScreen(x,y){
return{
x:x*camera.zoom+camera.x+w/2,
y:y*camera.zoom+camera.y+h/2
}
}

function screenToWorld(x,y){
return{
x:(x-w/2-camera.x)/camera.zoom,
y:(y-h/2-camera.y)/camera.zoom
}
}

// ---------------- DRAW GRID ----------------
function drawGrid(){
gtx.clearRect(0,0,w,h)
gtx.save()
gtx.translate(camera.x+w/2,camera.y+h/2)
gtx.scale(camera.zoom,camera.zoom)

gtx.strokeStyle="rgba(120,120,120,0.15)"
gtx.lineWidth=1/camera.zoom

for(let i=-2000;i<2000;i+=gridSize){
gtx.beginPath()
gtx.moveTo(i,-2000)
gtx.lineTo(i,2000)
gtx.stroke()

gtx.beginPath()
gtx.moveTo(-2000,i)
gtx.lineTo(2000,i)
gtx.stroke()
}

gtx.restore()
}

// ---------------- RENDER ----------------
function render(){
camera.zoom+=(camera.targetZoom-camera.zoom)*0.15

drawGrid()
ctx.clearRect(0,0,w,h)

ctx.save()
ctx.translate(camera.x+w/2,camera.y+h/2)
ctx.scale(camera.zoom,camera.zoom)

// edges
ctx.strokeStyle="#4caf50"
ctx.lineWidth=3/camera.zoom
ctx.lineCap="round"

edges.forEach(e=>{
const a=nodes.find(n=>n.id===e.a)
const b=nodes.find(n=>n.id===e.b)
if(!a||!b)return

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()
})

// nodes
nodes.forEach(n=>{
ctx.fillStyle=(n===selectedNode)?"#ff9800":"#2196f3"
ctx.beginPath()
ctx.arc(n.x,n.y,6/camera.zoom,0,Math.PI*2)
ctx.fill()
})

ctx.restore()

zoomText.innerText=Math.round(camera.zoom*100)+"%"
requestAnimationFrame(render)
}

// ---------------- NODE HELPERS ----------------
function getNodeAt(pos){
return nodes.find(n=>{
return Math.hypot(n.x-pos.x,n.y-pos.y)<15/camera.zoom
})
}

function createNode(x,y){
const n={id:Math.random().toString(36),x,y}
nodes.push(n)
return n
}

// ---------------- INPUT ----------------
main.addEventListener("pointerdown",e=>{
const pos=screenToWorld(e.clientX,e.clientY)
pos.x=snap(pos.x)
pos.y=snap(pos.y)

if(mode==="draw"){
const hit=getNodeAt(pos)

if(!startNode){
startNode=hit||createNode(pos.x,pos.y)
}
else{
const endNode=hit||createNode(pos.x,pos.y)

edges.push({a:startNode.id,b:endNode.id})
startNode=null
}
}

if(mode==="edit"){
selectedNode=getNodeAt(pos)
dragging=!!selectedNode
}
})

main.addEventListener("pointermove",e=>{
if(mode!=="edit"||!dragging||!selectedNode)return

const pos=screenToWorld(e.clientX,e.clientY)
selectedNode.x=snap(pos.x)
selectedNode.y=snap(pos.y)
})

main.addEventListener("pointerup",()=>{
dragging=false
})

// ---------------- MODE ----------------
function setMode(m){
mode=m
document.getElementById("modeText").innerText=m
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"))
if(m==="draw")drawBtn.classList.add("active")
if(m==="edit")editBtn.classList.add("active")
}

// ---------------- DELETE ----------------
function deleteSelected(){
if(!selectedNode)return

edges=edges.filter(e=>e.a!==selectedNode.id&&e.b!==selectedNode.id)
nodes=nodes.filter(n=>n!==selectedNode)
selectedNode=null
}

// ---------------- CLEAR ----------------
function clearAll(){
nodes=[]
edges=[]
selectedNode=null
startNode=null
}

// ---------------- ZOOM ----------------
main.addEventListener("wheel",e=>{
e.preventDefault()
camera.targetZoom*=e.deltaY<0?1.1:0.9
camera.targetZoom=Math.max(0.4,Math.min(5,camera.targetZoom))
})

setMode("draw")
render()
</script>

</body>
</html>
