<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z - Private Rooms</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --neon: #00ffa3;
            --danger: #ff3e3e;
            --bg-deep: #05070a;
            --panel: rgba(10, 15, 20, 0.95);
            --border: rgba(0, 255, 163, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-deep); color: white;
            font-family: 'monospace', sans-serif;
            overflow: hidden;
        }

        #map { 
            position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; 
            filter: brightness(0.6) contrast(1.2) saturate(0.8);
        }

        /* UI Screens */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }

        .floating-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 400px;
            z-index: 100; display: none; flex-direction: column; gap: 12px;
        }

        .glass-box {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .status-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 10px;
        }

        #chat-container {
            height: 130px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: none; margin-bottom: 10px;
        }

        .message {
            background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px;
            border-left: 3px solid var(--neon); font-size: 11px; word-break: break-all;
        }

        .input-row { display: flex; gap: 8px; }
        input {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: white; font-size: 14px;
        }

        button {
            background: var(--neon); border: none; padding: 12px; 
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        .btn-sos {
            background: rgba(255, 62, 62, 0.1); border: 1px solid var(--danger);
            color: var(--danger); margin-top: 10px; font-size: 11px;
        }

        .tactical-label {
            background: rgba(0,0,0,0.9) !important; border: 1px solid var(--neon) !important;
            color: var(--neon) !important; font-size: 10px !important;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--neon); text-align:center; letter-spacing:2px;">JOIN OPERATIONS</h2>
            <input id="room-input" type="text" placeholder="Room ID (e.g. 777)">
            <input id="nick-input" type="text" placeholder="Your Name">
            <button onclick="enterRoom()">ENTER ROOM</button>
        </div>
    </div>

    <div id="map"></div>

    <!-- واجهة التحكم -->
    <div class="floating-ui" id="main-ui">
        <div class="glass-box">
            <div class="status-header">
                <div style="color:var(--neon); font-size:12px;">ROOM: <span id="room-display">---</span></div>
                <div id="coords-display" style="font-size:10px; color:#555;">0.000, 0.000</div>
            </div>
            <div id="chat-container"></div>
            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Message...">
                <button onclick="sendMsg()">➤</button>
            </div>
            <button class="btn-sos" style="width:100%" onclick="sendSOS()">SIGNAL EMERGENCY (SOS)</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, push, onChildAdded, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.app.js";

    // ✅ نفس الإعدادات الخاصة بك
    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        projectId: "a0zai-56c3a", 
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myID = "U-" + Math.floor(Math.random() * 10000);
    let myNick, roomID, map, myMarker;
    let otherMarkers = {};

    // ✅ وظيفة الدخول
    window.enterRoom = () => {
        roomID = document.getElementById('room-input').value.trim();
        myNick = document.getElementById('nick-input').value.trim();

        if (!roomID || !myNick) return alert("Fill all fields!");

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('room-display').innerText = roomID;

        startSystem();
    };

    function startSystem() {
        // تهيئة الخريطة
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // مراقبة الموقع
        navigator.geolocation.watchPosition(p => {
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            
            document.getElementById('coords-display').innerText = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;

            if (!myMarker) {
                myMarker = L.circleMarker([lat, lon], { radius: 8, color: '#fff', fillColor: '#00ffa3', fillOpacity: 1 }).addTo(map);
                map.setView([lat, lon], 15);
            } else {
                myMarker.setLatLng([lat, lon]);
            }

            // تحديث الموقع في الداتابيز
            const userRef = ref(db, `rooms/${roomID}/users/${myID}`);
            set(userRef, { name: myNick, lat: lat, lon: lon, lastSeen: Date.now() });
            onDisconnect(userRef).remove();
        });

        // متابعة المستخدمين الآخرين
        onValue(ref(db, `rooms/${roomID}/users`), snap => {
            const data = snap.val() || {};
            for (let id in data) {
                if (id === myID) continue;
                const u = data[id];
                if (otherMarkers[id]) {
                    otherMarkers[id].setLatLng([u.lat, u.lon]);
                } else {
                    otherMarkers[id] = L.circleMarker([u.lat, u.lon], { radius: 6, color: '#00ffa3' })
                        .addTo(map)
                        .bindTooltip(u.name, { permanent: true, className: 'tactical-label', direction: 'top' });
                }
            }
        });

        // استقبال الرسائل
        onChildAdded(ref(db, `rooms/${roomID}/chat`), snap => {
            const msg = snap.val();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });
    }


    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if (!input.value) return;
        push(ref(db, `rooms/${roomID}/chat`), { user: myNick, text: input.value });
        input.value = '';
    };

    window.sendSOS = () => {
        push(ref(db, `rooms/${roomID}/chat`), { user: "⚠️ " + myNick, text: "MAYDAY! SOS AT MY LOCATION!" });
    };
</script>
</body>
</html>
