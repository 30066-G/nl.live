<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAFT - BLACKLISH EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --sea: #0077be;
            --wood: #c19a6b;
            --wood-dark: #5d4037;
            --gold: #ffd700;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #004d7a; font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden; color: white;
        }

        /* --- El Ba7r --- */
        .ocean-bg {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=2000') no-repeat center center;
            background-size: cover;
            animation: oceanSway 20s ease-in-out infinite alternate;
        }
        @keyframes oceanSway { 0% { transform: scale(1.1) rotate(-1deg); } 100% { transform: scale(1.2) rotate(1deg); } }

        /* --- Stats Bar --- */
        .stats-bar {
            position: fixed; top: 10px; right: 10px; z-index: 60;
            display: flex; gap: 10px;
        }
        .stat-item {
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 5px;
            border: 2px solid var(--wood); font-size: 14px; color: var(--gold);
        }

        /* --- El Radar --- */
        .radar {
            position: fixed; top: 65px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center;
        }
        .distance-card {
            background: var(--wood-dark); padding: 10px 20px; border-radius: 0;
            box-shadow: 0 5px 0 #211512; font-family: 'Permanent Marker'; font-size: 18px;
        }

        /* --- El Raft Container --- */
        .raft-frame {
            height: 100%; display: flex; flex-direction: column;
            animation: raftFloat 6s ease-in-out infinite;
        }
        @keyframes raftFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* --- Wood Buttons --- */
        .wood-btn {
            background: var(--wood) url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            border: 3px solid var(--wood-dark); box-shadow: 0 6px #3e2723;
            color: #3e2723; font-family: 'Permanent Marker'; cursor: pointer;
            text-transform: uppercase; transition: 0.1s;
        }
        .wood-btn:active { transform: translateY(4px); box-shadow: 0 2px #3e2723; }

        /* --- Chat area --- */
        #chat-log { flex: 1; overflow-y: auto; padding: 120px 20px 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-plank {
            background: #fdf5e6 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 12px; border-bottom: 5px solid #d2b48c; color: #5d4037;
            align-self: flex-start; max-width: 85%; box-shadow: 5px 5px 0 rgba(0,0,0,0.1);
        }

        .controls { 
            padding: 20px; background: rgba(0,0,0,0.4); 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            backdrop-filter: blur(5px);
        }

        #landing-page {
            position: fixed; inset: 0; z-index: 150; 
            background: rgba(0,77,122,0.95); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>

    <!-- El Mawarid -->
    <div class="stats-bar">
        <div class="stat-item">🪵 <span id="wood-count">0</span></div>
        <div class="stat-item">🥤 <span id="plastic-count">0</span></div>
    </div>

    <!-- El Jazirah Distance -->
    <div class="radar">
        <div class="distance-card">
            EL JAZIRAH: <span id="km-left">500</span>m
        </div>
    </div>

    <!-- Login Screen -->
    <div id="landing-page">
        <h1 class="animate__animated animate__rubberBand" style="font-family:'Permanent Marker'; font-size:65px; text-shadow:5px 5px #3e2723; margin:0;">A0Z RAFT</h1>
        <p style="color:var(--gold); margin-bottom:30px;">Survival bel Blacklish yalla!</p>
        <input id="user-name" style="padding:15px; width:260px; margin-bottom:15px; border:4px solid #3e2723; font-family:'Permanent Marker';" placeholder="ESM EL SURVIVOR..">
        <button class="wood-btn" style="padding:15px 50px; font-size:22px;" onclick="startVoyage()">YALLAH BENA</button>
    </div>

    <!-- El Game UI -->
    <div id="game-ui" class="raft-frame" style="display:none;">
        <div id="chat-log"></div>
        
        <div class="controls">
            <button class="wood-btn" style="grid-column: span 2; height: 55px; background:var(--gold); font-size:20px;" onclick="useHook()">🪝 ERMI EL KHATTAF</button>
            <button class="wood-btn" style="height: 50px;" onclick="moveRaft()">⛵ HARRIK EL RAFT</button>
            <input id="chat-input" style="padding:10px; border:3px solid var(--wood-dark); font-weight:bold;" placeholder="Ekteb ay shi..">
        </div>
    </div>

    <!-- Island Win Screen -->
    <div id="win-screen" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:200;">
        <h1 style="font-family:'Permanent Marker'; font-size:50px; color:var(--gold);">LAND AHOY! 🏝️</h1>
        <p>Hamdullah 3ala el Salama, wasalt el Jazirah!</p>
        <button class="wood-btn" style="padding:15px 30px;" onclick="location.reload()">ERJA3 EL BA7R TANI</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, distance = 500, khashab = 0, plastik = 0;

        window.startVoyage = () => {
            myNick = document.getElementById('user-name').value.trim() || "Survivor";
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            initSeaSync();
        };

        // Hook Logic
        window.useHook = () => {
            const chance = Math.random();
            let itemFound = "Wala shi";
            
            if(chance > 0.7) { 
                khashab++; 
                document.getElementById('wood-count').innerText = khashab;
                itemFound = "Khashab 🪵";
            } else if(chance > 0.4) {
                plastik++;
                document.getElementById('plastic-count').innerText = plastik;
                itemFound = "Plastik 🥤";
            }

            const statusMsg = itemFound === "Wala shi" ? "Ramma el khattaf wa ma jebsh 7aga! 🌊" : `Lamma l2at ${itemFound} mel ba7r!`;
            push(ref(db, `rooms/raft_live/chat`), { user: myNick, text: statusMsg, isAction: true });
        };

        // Move Raft
        window.moveRaft = () => {
            if(distance <= 0) return;
            distance -= 25;
            document.getElementById('km-left').innerText = distance;
            if(distance <= 0) document.getElementById('win-screen').style.display = 'flex';
            
            push(ref(db, `rooms/raft_live/chat`), { user: myNick, text: "Shadd el shera3.. El Jazirah bet2arrab! ⛵", isAction: true });
        };

        function initSeaSync() {
            onChildAdded(ref(db, `rooms/raft_live/chat`), (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = 'msg-plank animate__animated animate__fadeInLeft';
                if(data.isAction) div.style.background = '#e3f2fd';
                
                div.innerHTML = `<small style="font-size:10px; color:var(--wood-dark);">${data.user}:</small> <div style="font-size:15px;">${data.text}</div>`;
                document.getElementById('chat-log').appendChild(div);
                document.getElementById('chat-log').scrollTop = document.getElementById('chat-log').scrollHeight;
            });
        }

        window.sendChat = () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            push(ref(db, `rooms/raft_live/chat`), { user: myNick, text: input.value.trim() });
            input.value = '';
        };
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') window.sendChat(); });
    </script>
</body>
</html>
