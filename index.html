<!DOCTYPE html>
<html lang="nl" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>A0Z Quantum OS v26.7 - Dutch Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A0Z OS">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const manifest = {
            "short_name": "A0Z OS",
            "name": "A0Z Quantum OS",
            "icons": [
                { "src": "https://img.icons8.com/neon/96/quantum-computing.png", "type": "image/png", "sizes": "96x96" },
                { "src": "https://img.icons8.com/neon/512/quantum-computing.png", "type": "image/png", "sizes": "512x512" }
            ],
            "start_url": window.location.href,
            "background_color": "#010103",
            "theme_color": "#00f2fe",
            "display": "standalone",
            "orientation": "portrait"
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const relManifest = document.createElement('link');
        relManifest.setAttribute('rel', 'manifest');
        relManifest.setAttribute('href', manifestURL);
        document.head.appendChild(relManifest);
    </script>

    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff3366;
            --neon-green: #11ffbd;
            --glass-bg: rgba(5, 5, 15, 0.85);
            --glass-border: rgba(0, 242, 254, 0.3);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        }

        body {
            background: #000;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        .phone-container {
            width: 100vw; height: 100vh; background: #000; position: relative;
        }

        @media (min-width: 450px) {
            body { background: radial-gradient(circle at center, #0c0c28 0%, #010105 100%); }
            .phone-container { width: 380px; height: 680px; border: 12px solid #2e2e33; border-radius: 50px; box-shadow: 0 40px 90px rgba(0,0,0,0.8); }
        }

        .phone { width: 100%; height: 100%; position: relative; overflow: hidden; border-radius: inherit; }

        .dynamic-island {
            width: 110px; height: 28px; background: #000; border-radius: 20px;
            position: absolute; top: 11px; left: 50%; transform: translateX(-50%); z-index: 100;
            display: flex; justify-content: center; align-items: center; font-size: 0.65rem; color: var(--neon-green); pointer-events: none;
        }

        /* 🔒 Lockscreen met N.png achtergrond */
        .lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('N.png') center center / cover no-repeat, #03030a;
            z-index: 95; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; transition: transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .lock-time { font-size: 3rem; font-weight: 200; color: white; margin-bottom: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
        .lock-date { font-size: 0.85rem; color: #fff; margin-bottom: 25px; text-shadow: 0 1px 5px rgba(0,0,0,0.9); }

        .lock-blur-box {
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        /* 📱 Homescreen met N.png */
        .phone-screen {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 50px 14px 20px 14px;
            background: url('N.png') center center / cover no-repeat, #03030a;
            position: relative; z-index: 5;
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.7rem; color: white; z-index: 40; margin-bottom: 25px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); pointer-events: none; }

        .home-screen {
            position: relative; z-index: 10; flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content; gap: 20px 12px; overflow-y: auto;
        }

        /* App Items & Logo Engine */
        .app-item { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .app-icon {
            width: 55px; height: 55px; border-radius: 15px; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; box-shadow: 0 6px 12px rgba(0,0,0,0.6); pointer-events: none;
        }
        
        .app-icon-custom {
            width: 55px; height: 55px; border-radius: 15px; 
            background: url('N.png') center center / cover no-repeat, rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6); pointer-events: none;
        }

        .app-name { font-size: 0.65rem; color: #ffffff; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,1); font-weight: bold; pointer-events: none; padding: 0 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Verwijderknop ❌ */
        .delete-app-btn {
            position: absolute; top: -4px; right: -4px; width: 20px; height: 20px;
            background: var(--neon-magenta); border: 1px solid rgba(255,255,255,0.4);
            color: white; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 0.55rem; font-weight: bold; z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); cursor: pointer;
        }

        /* 🌗 Windowing Systeem */
        .window-instance {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: #000; 
            z-index: 80; display: flex; flex-direction: column; overflow: hidden; 
            padding-top: 40px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .window-instance.open { transform: translateY(0); }

        .window-header-bar { background: #0d0d18; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .window-title { font-size: 0.75rem; color: var(--neon-cyan); font-weight: bold; font-family: monospace; }
        .win-btn { padding: 5px 14px; border-radius: 6px; border: none; background: var(--neon-magenta); color: white; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        
        .window-body { flex-grow: 1; width: 100%; height: 100%; overflow: auto; background: #010103; display: flex; flex-direction: column; }
        
        /* 💻 CMD Panel */
        .cmd-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .terminal-box { flex-grow: 1; background: #000; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 0.7rem; color: var(--neon-green); overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .cmd-inputs { background: #070714; border: 1px solid var(--glass-border); padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        .cmd-line { display: flex; align-items: center; gap: 6px; }
        .cmd-label { font-family: monospace; font-size: 0.7rem; color: var(--neon-cyan); white-space: nowrap; }
        .cmd-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 0.75rem; outline: none; }
        .cmd-text { width: 100%; height: 80px; background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: var(--neon-green); font-family: monospace; font-size: 0.7rem; padding: 6px; resize: none; outline: none; }
        
        .action-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--neon-cyan), #4facfe); border: none; border-radius: 6px; color: #000; font-weight: bold; font-size: 0.75rem; cursor: pointer; font-family: monospace; }
        .info-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan); border-radius: 6px; color: var(--neon-cyan); font-size: 0.7rem; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .sys-msg { color: var(--neon-magenta); font-size: 0.7rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="phone">
            <div class="dynamic-island" id="island">A0Z Quantum</div>

            <div class="lock-screen" id="lockScreen">
                <div class="lock-time" id="lockClock">00:00</div>
                <div class="lock-date" id="lockDate">Donderdag, 21 mei</div>
                
                <div class="lock-blur-box">
                    <h4 style="color: var(--neon-cyan); margin-bottom: 15px; font-size: 0.85rem; font-weight: 800;">Cloud Authenticatie v26.7 🔐</h4>
                    <input type="email" id="loginUser" style="width:100%; padding:12px; background:#000; border:1px solid var(--glass-border); border-radius:8px; color:#fff; text-align:center; outline:none; margin-bottom:10px;" placeholder="Voer uw e-mailadres in">
                    <input type="password" id="loginPass" style="width:100%; padding:12px; background:#000; border:1px solid var(--glass-border); border-radius:8px; color:#fff; text-align:center; outline:none; margin-bottom:15px;" placeholder="Wachtwoord">
                    <button class="action-btn" style="color:#000;" onclick="unlockWithOfficialEmail()">Inloggen / Registreren 🍏</button>
                    
                    <button class="info-btn" onclick="showAboutUs()">Over ons ℹ️</button>
                    
                    <div id="lockScreenFeedback" class="sys-msg" style="margin-top:10px;"></div>
                </div>
            </div>

            <div class="phone-screen" id="phoneScreen">
                <div class="status-bar">
                    <div id="liveClock">00:00</div>
                    <div>5G 🔋</div>
                </div>

                <div class="home-screen" id="homeScreen"></div>
            </div>

            <div class="window-instance" id="win_cmd_system">
                <div class="window-header-bar">
                    <div class="window-title">⚡ A0Z_OS:\System32\cmd.exe</div>
                    <button class="win-btn" onclick="closeAppWindow('cmd_system')">Sluiten</button>
                </div>
                <div class="window-body">
                    <div class="cmd-body">
                        <div class="terminal-box" id="systemTerminal">
                            <div>A0Z Quantum OS [Version 26.7]</div>
                            <div>Systeemtaal ingesteld op Nederlands.</div>
                        </div>
                        <div class="cmd-inputs">
                            <div class="cmd-line">
                                <span class="cmd-label">app_name=</span>
                                <input type="text" id="appNameInput" class="cmd-input" placeholder="App Naam">
                            </div>
                            <span class="cmd-label" style="margin-top:4px; display:block;">inject_code=</span>
                            <textarea id="appCodeInput" class="cmd-text" placeholder="// Typ hier uw JavaScript code..."></textarea>
                        </div>
                        <button class="action-btn" style="color:#000;" onclick="addNewAppFromPanel()">EXECUTE & INJECT 🚀</button>
                        <button class="info-btn" onclick="showAboutUs()" style="border-color: var(--neon-green); color: var(--neon-green);">Over ons Systeem ℹ️</button>
                    </div>
                </div>
            </div>

            <div class="window-instance" id="win_global_chat">
                <div class="window-header-bar">
                    <div class="window-title">💬 Wereldwijde Live Chat</div>
                    <button class="win-btn" onclick="closeAppWindow('global_chat')">Sluiten</button>
                </div>
                <div class="window-body" id="chatContainer"></div>
            </div>

            <div class="window-instance" id="win_custom_runtime">
                <div class="window-header-bar">
                    <div class="window-title" id="customWinTitle">🛸 Custom App</div>
                    <button class="win-btn" onclick="closeAppWindow('custom_runtime')">Sluiten</button>
                </div>
                <div class="window-body" id="customContainer" style="padding:15px; color:#fff;"></div>
            </div>

        </div>
    </div>

    <script>
        // Firebase Configuratie
        const firebaseConfig = {
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
            authDomain: "a0zai-56c3a.firebaseapp.com",
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "a0zai-56c3a",
            storageBucket: "a0zai-56c3a.firebasestorage.app",
            messagingSenderId: "198838438266",
            appId: "1:198838438266:web:379e782653f014a32a2ec3"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        
        let currentUserUID = null; let currentUserEmail = "";
        let globalAppsData = {};

        // ℹ️ Over Ons Functie
        function showAboutUs() {
            alert(
                "ℹ️ OVER A0Z QUANTUM OS (v26.7)\n\n" +
                "Dit is een geavanceerd web-gebaseerd cloud-besturingssysteem ontwikkeld voor mobiele apparaten.\n\n" +
                "✨ Belangrijkste Kenmerken:\n" +
                "1. Realtime Cloud Injectie: Programmeer en start direct uw eigen apps via de ingebouwde CMD terminal.\n" +
                "2. Custom Logo Engine: Elke geïnjecteerde app krijgt automatisch uw persoonlijke 'N.png' logo.\n" +
                "3. Cloud Verwijderaar: Verwijder ongewenste externe apps permanent met één klik op de ❌ knop.\n" +
                "4. Live Chat: Communiceer direct en realtime met andere actieve gebruikers via Firebase.\n\n" +
                "Ontwikkeld door en voor professionele ontwikkelaars! 🚀"
            );
        }

        function printTerminal(text) {
            const term = document.getElementById('systemTerminal'); if(!term) return;
            term.innerHTML += `<div>A0Z:\> ${text}</div>`; term.scrollTop = term.scrollHeight;
        }

        function unlockWithOfficialEmail() {
            const email = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const feedback = document.getElementById('lockScreenFeedback');
            if(!email || !pass) { alert("Vul alle velden correct in!"); return; }

            feedback.innerText = "Controleren in de cloud... ⏳";

            auth.signInWithEmailAndPassword(email, pass)
            .then((u) => {
                if (u.user.emailVerified) { execLoginSuccess(u.user.uid, email); } 
                else {
                    feedback.innerText = "❌ E-mail niet geverifieerd! Controleer uw inbox.";
                    auth.signOut();
                }
            })
            .catch((error) => {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    auth.createUserWithEmailAndPassword(email, pass)
                    .then((u) => {
                        u.user.sendEmailVerification().then(() => {
                            feedback.innerText = "📧 Account aangemaakt! Activeer uw account via de link in uw e-mail en log opnieuw in.";
                            auth.signOut();
                        });
                    })
                    .catch((err) => { feedback.innerText = `Fout: ${err.message}`; });
                } else {
                    feedback.innerText = `Fout: ${error.message}`;
                }
            });
        }

        function execLoginSuccess(uid, email) {
            currentUserUID = uid; currentUserEmail = email.split('@')[0];
            document.getElementById('lockScreen').style.transform = "translateY(-100%)";
            
            const myPresenceRef = database.ref(`chat_presence/${uid}`);
            myPresenceRef.set({ username: currentUserEmail, online: true });
            myPresenceRef.onDisconnect().remove();

            listenToUserApps(uid);
        }

        function openAppWindow(id) { document.getElementById(`win_${id}`).classList.add('open'); }
        function closeAppWindow(id) { document.getElementById(`win_${id}`).classList.remove('open'); }

        function listenToUserApps(uid) { 
            database.ref('custom_apps/' + uid).on('value', (s) => { 
                globalAppsData = s.val() || {}; 
                renderHomeScreen(globalAppsData); 
            }); 
        }
        
        function renderHomeScreen(appsList) {
            const hs = document.getElementById('homeScreen'); hs.innerHTML = '';
            
            // 1. Systeem CMD App (Beveiligd)
            const cmdItem = document.createElement('div'); cmdItem.className = 'app-item';
            cmdItem.onclick = () => openAppWindow('cmd_system');
            cmdItem.innerHTML = `<div class="app-icon" style="background:#000; border:1px solid var(--neon-green); color:var(--neon-green); font-family:monospace; font-size:1.1rem; font-weight:bold;">&gt;_</div><div class="app-name">CMD Control</div>`;
            hs.appendChild(cmdItem);

            // 2. Systeem Live Chat App (Beveiligd)
            const chatItem = document.createElement('div'); chatItem.className = 'app-item';
            chatItem.onclick = () => { openAppWindow('global_chat'); launchGlobalChatEngine(); };
            chatItem.innerHTML = `<div class="app-icon" style="background:linear-gradient(135deg, #00f2fe, #4facfe);">💬</div><div class="app-name">Live Chat</div>`;
            hs.appendChild(chatItem);

            // 3. Custom Geïnjecteerde Apps met N.png Logo en ❌ knop
            Object.keys(appsList).forEach((k) => {
                const app = appsList[k];
                const item = document.createElement('div'); item.className = 'app-item';
                
                item.onclick = (e) => {
                    if (e.target.classList.contains('delete-app-btn')) return; 
                    launchCustomApp(k);
                };

                item.innerHTML = `
                    <div class="delete-app-btn" onclick="deleteCustomApp('${k}', '${app.name}')">❌</div>
                    <div class="app-icon-custom"></div>
                    <div class="app-name">${app.name}</div>
                `;
                hs.appendChild(item);
            });
        }

        function deleteCustomApp(appKey, appName) {
            if (!currentUserUID) return;
            const confirmDelete = confirm(`Weet u zeker dat u de app [ ${appName} ] permanent wilt verwijderen uit de cloud?`);
            if (confirmDelete) {
                printTerminal(`Bezig met verwijderen van [${appName}]...`);
                database.ref(`custom_apps/${currentUserUID}/${appKey}`).remove()
                .then(() => {
                    printTerminal(`SUCCES: [${appName}] succesvol gedeïnstalleerd.`);
                })
                .catch((err) => {
                    printTerminal(`FOUT BIJ VERWIJDEREN: ${err.message}`);
                });
            }
        }

        function launchCustomApp(key) {
            const app = globalAppsData[key];
            if (!app) return;
            document.getElementById('customWinTitle').innerText = `🛸 ${app.name}`;
            const container = document.getElementById('customContainer');
            container.innerHTML = '';
            openAppWindow('custom_runtime');
            try {
                const appScript = new Function('container', app.code);
                appScript(container);
            } catch (err) {
                container.innerHTML = `<div style="color:var(--neon-magenta); font-family:monospace; padding:10px;">Runtime Error: ${err.message}</div>`;
            }
        }

        function launchGlobalChatEngine() {
            const domContainer = document.getElementById('chatContainer');
            domContainer.innerHTML = `
                <div style="background:rgba(255,255,255,0.03); padding:8px; font-size:0.65rem; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between;">
                    <span style="color:#8a99ad;">Pad: <span style="color:var(--neon-green);">root/chat</span></span>
                    <span style="color:var(--neon-green); font-weight:bold;" id="liveCounterLabel">Online: 1 👥</span>
                </div>
                <div id="chatMessageGrid" style="flex-grow:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; font-size:0.75rem;"></div>
                <div style="padding:10px; display:flex; gap:6px; background:#05050f; border-top:1px solid rgba(0,242,254,0.15);">
                    <input id="chatMsgInput" type="text" placeholder="Typ een bericht..." style="flex-grow:1; background:#000; border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:10px; color:white; outline:none;">
                    <button id="sendChatBtn" style="background:var(--neon-cyan); color:#000; border:none; border-radius:8px; padding:0 15px; font-weight:bold;">Verzenden</button>
                </div>
            `;
            const msgGrid = domContainer.querySelector('#chatMessageGrid');
            const msgInput = domContainer.querySelector('#chatMsgInput');
            const sendBtn = domContainer.querySelector('#sendChatBtn');
            const counterLabel = domContainer.querySelector('#liveCounterLabel');

            database.ref('chat_presence').on('value', (s) => { const count = s.numChildren() || 1; if(counterLabel) counterLabel.innerText = `Online: ${count} 👥`; });

            database.ref('global_realtime_chat').limitToLast(30).on('value', (s) => {
                msgGrid.innerHTML = ''; const data = s.val() || {};
                Object.keys(data).forEach((key) => {
                    const m = data[key]; const msgRow = document.createElement('div'); const isMe = m.user === currentUserEmail;
                    msgRow.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                    msgRow.style.background = isMe ? 'linear-gradient(135deg, #00f2fe, #4facfe)' : 'rgba(255,255,255,0.1)';
                    msgRow.style.color = isMe ? '#000' : '#fff'; msgRow.style.padding = '8px 12px'; msgRow.style.borderRadius = '10px'; msgRow.style.maxWidth = '80%'; msgRow.style.wordBreak = 'break-all';
                    msgRow.innerHTML = `<b style="font-size:0.55rem; display:block; opacity:0.7; margin-bottom:2px;">${m.user}</b>${m.text}`; msgGrid.appendChild(msgRow);
                });
                msgGrid.scrollTop = msgGrid.scrollHeight;
            });

            function transmitMsg() { const text = msgInput.value.trim(); if(!text) return; database.ref('global_realtime_chat').push().set({ user: currentUserEmail, text: text }); msgInput.value = ''; }
            sendBtn.onclick = transmitMsg;
        }

        function addNewAppFromPanel() {
            const name = document.getElementById('appNameInput').value.trim();
            const code = document.getElementById('appCodeInput').value.trim();
            if (!name || !code) { alert("Vul de naam en code in!"); return; }

            printTerminal(`Bezig met uploaden van [${name}] naar de cloud...`);
            database.ref('custom_apps/' + currentUserUID).push().set({ name, code })
            .then(() => {
                printTerminal(`SUCCES: App '${name}' is succesvol geïnjecteerd.`);
                document.getElementById('appNameInput').value = "";
                document.getElementById('appCodeInput').value = "";
            });
        }

        // Realtime Klok & Datum Systeem (Nederlandse formats)
        setInterval(() => { 
            const now = new Date(); let hh = now.getHours(); let mm = now.getMinutes(); 
            const timeStr = `${hh < 10 ? '0'+hh : hh}:${mm < 10 ? '0'+mm : mm}`;
            document.getElementById('liveClock').innerText = timeStr; 
            document.getElementById('lockClock').innerText = timeStr; 
            document.getElementById('lockDate').innerText = now.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
