<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z_OS Core v2.6</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-green: #11ffbd;
            --neon-magenta: #ff0055;
            --bg-main: #050a15;
            --text-main: #e0e0e0;
            --border-color: rgba(0, 229, 255, 0.2);
            --glass-bg: rgba(5, 10, 21, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        #canvas-container, #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        
        /* شاشة القفل */
        #lockScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1); }
        .login-box { background: var(--glass-bg); padding: 40px; border: 1px solid var(--neon-cyan); border-radius: 10px; text-align: center; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); backdrop-filter: blur(10px); }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--border-color); color: var(--neon-cyan); outline: none; text-align: center; }
        .action-btn { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 10px; }
        .action-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        
        /* الواجهة الرئيسية HUD */
        #hudMessage { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: var(--neon-cyan); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon-cyan); transition: opacity 0.25s; z-index: 100; pointer-events: none;}
        .top-bar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--glass-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 50; }
        .stats { display: flex; gap: 20px; font-size: 0.8rem; }
        .stat-bar-container { width: 100px; height: 8px; background: #222; border: 1px solid #444; margin-top: 4px; }
        .stat-bar { height: 100%; background: var(--neon-cyan); transition: width 0.5s; }
        .high-load { background: var(--neon-magenta) !important; }

        /* شريط التنقل */
        .sidebar { position: fixed; left: 0; top: 60px; width: 80px; height: calc(100vh - 60px); background: var(--glass-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 50; }
        .nav-menu li { list-style: none; margin-bottom: 30px; font-size: 1.5rem; color: #555; cursor: pointer; transition: 0.3s; }
        .nav-menu li:hover, .nav-menu li.active { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }

        /* منطقة العمل الرئيسية */
        #center-console { margin-left: 80px; margin-top: 60px; padding: 20px; height: calc(100vh - 60px); position: relative; }
        #homeScreen { display: flex; flex-wrap: wrap; gap: 20px; }
        .app-item { width: 100px; text-align: center; cursor: pointer; position: relative; }
        .app-icon { width: 70px; height: 70px; margin: 0 auto 10px auto; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 2rem; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .app-item:hover .app-icon { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .app-name { font-size: 0.8rem; }

        /* النوافذ (Windows) */
        .app-window { position: absolute; top: 20px; left: 20px; width: calc(100% - 40px); height: calc(100% - 40px); background: #0a101d; border: 1px solid var(--border-color); box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; flex-direction: column; z-index: 10; border-radius: 8px; overflow: hidden; }
        .app-window.open { display: flex; }
        .window-header { background: #111a2e; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); font-weight: bold; color: var(--neon-cyan); }
        .close-btn { color: var(--neon-magenta); cursor: pointer; font-size: 1.2rem; }
        .window-body { flex-grow: 1; padding: 15px; overflow-y: auto; position: relative; }

        /* Terminal Style */
        #systemTerminal { background: #000; height: 100%; color: var(--text-main); font-family: monospace; overflow-y: auto; padding-bottom: 40px; }
        .terminal-input-container { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; background: #050a15; border-top: 1px solid var(--border-color); }
        .terminal-input-container input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: monospace; padding: 10px; outline: none; }

        /* الذكاء الاصطناعي والكاميرا */
        #visionVideo { display: none; }
        #visionCanvas { width: 100%; height: 100%; object-fit: contain; background: #000; }
        #liveActivityLogger { position: fixed; bottom: 10px; right: 10px; width: 300px; height: 150px; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 10px; font-size: 0.7rem; overflow-y: auto; z-index: 100; color: #888; }
        
        /* عناصر مطورين التطبيقات */
        .delete-app-btn { position: absolute; top: -5px; right: 5px; color: var(--neon-magenta); background: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 0.8rem; line-height: 20px; z-index: 5; display: none; }
        .app-item:hover .delete-app-btn { display: block; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="particles-js"></div>

    <div id="lockScreen">
        <div class="login-box">
            <h2 style="color:var(--neon-cyan); margin-bottom: 10px;">A0Z_OS CORE</h2>
            <p id="lockDate" style="font-size:0.8rem; margin-bottom: 20px; color:#aaa;"></p>
            <input type="text" id="loginUser" placeholder="IDENTIFIER / EMAIL">
            <input type="password" id="loginPass" placeholder="DECRYPTION KEY">
            <button class="action-btn" onclick="unlockWithOfficialEmail()">INITIALIZE</button>
            <p id="lockScreenFeedback" style="margin-top:15px; font-size:0.8rem; color:var(--neon-magenta);"></p>
            <p style="margin-top:10px; font-size:0.6rem; color:#555;">[Bypass: admin / admin]</p>
        </div>
    </div>

    <div class="top-bar">
        <div style="font-weight:bold; color:var(--neon-cyan); font-size:1.2rem;">A0Z // SYS</div>
        <div id="hudMessage">SYSTEM BOOTING...</div>
        <div class="stats">
            <div>
                <div>CPU: <span id="cpu-val">0%</span></div>
                <div class="stat-bar-container"><div id="cpu-bar" class="stat-bar" style="width:0%"></div></div>
            </div>
            <div>
                <div>MEM: <span id="mem-val">0%</span></div>
                <div class="stat-bar-container"><div id="mem-bar" class="stat-bar" style="width:0%"></div></div>
            </div>
            <div id="liveClock" style="font-size:1.5rem; color:var(--neon-green); margin-left:15px;">00:00</div>
        </div>
    </div>

    <div class="sidebar">
        <ul class="nav-menu">
            <li id="nav-home" class="active" onclick="handleNav('home')"><i class="fa-solid fa-house"></i></li>
            <li id="nav-terminal" onclick="handleNav('terminal')"><i class="fa-solid fa-terminal"></i></li>
            <li id="nav-network" onclick="handleNav('network')"><i class="fa-solid fa-globe"></i></li>
        </ul>
    </div>

    <div id="liveActivityLogger"></div>

    <div id="center-console">
        <div id="homeScreen"></div>

        <div id="win_cmd_system" class="app-window">
            <div class="window-header"><span>>_ TERMINAL</span><i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('cmd_system')"></i></div>
            <div class="window-body" style="padding:0;">
                <div id="systemTerminal" style="padding:15px;">A0Z OS Terminal. Type 'help'.<br></div>
                <div class="terminal-input-container">
                    <span style="padding:10px; color:var(--neon-green);">root@a0z:~#</span>
                    <input type="text" id="cmdLineInput" onkeypress="if(event.key==='Enter') executeTerminalCmd()">
                </div>
            </div>
        </div>

        <div id="win_global_chat" class="app-window">
            <div class="window-header"><span><i class="fa-solid fa-comments"></i> ZULU NETWORK</span><i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('global_chat')"></i></div>
            <div class="window-body" id="chatContainer" style="padding:0; display:flex; flex-direction:column;"></div>
        </div>

        <div id="win_official_ai_bot" class="app-window">
            <div class="window-header"><span><i class="fa-solid fa-brain"></i> AI CORE</span><i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('official_ai_bot')"></i></div>
            <div class="window-body" style="display:flex; flex-direction:column; padding:0;">
                <div id="coreAiChatGrid" style="flex-grow:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
                <div style="display:flex; border-top:1px solid var(--border-color); background:#000;">
                    <input type="text" id="coreAiInput" style="flex-grow:1; padding:10px; background:transparent; color:#fff; border:none; outline:none;" placeholder="Query AI Core...">
                    <button id="coreAiSendBtn" class="action-btn" style="width:auto; margin:0; border:none; border-left:1px solid var(--border-color);">SUBMIT</button>
                </div>
            </div>
        </div>

        <div id="win_vision_ai_scanner" class="app-window">
            <div class="window-header">
                <span><i class="fa-solid fa-eye"></i> VISION AI SCANNER - <span id="visionStatus" style="font-size:0.8rem; color:var(--neon-green);">Loading...</span></span>
                <i class="fa-solid fa-xmark close-btn" onclick="stopVisionAiScanner()"></i>
            </div>
            <div class="window-body" style="padding:0; position:relative;">
                <video id="visionVideo" autoplay muted playsinline></video>
                <canvas id="visionCanvas"></canvas>
            </div>
        </div>

        <div id="win_web_browser" class="app-window">
            <div class="window-header" style="display:flex; gap:10px;">
                <input type="text" id="browserUrl" style="flex-grow:1; background:#000; color:#fff; border:1px solid #333; padding:5px 10px;" placeholder="Enter URL (e.g. example.com)" onkeypress="if(event.key==='Enter') loadBrowserUrl()">
                <button class="action-btn" style="margin:0; width:auto; padding:5px 15px;" onclick="loadBrowserUrl()">GO</button>
                <button id="vpnToggleBtn" class="action-btn" style="margin:0; width:auto; padding:5px 15px; border-color:var(--neon-magenta); color:var(--neon-magenta);" onclick="toggleQuantumVPN()">VPN: OFF</button>
                <i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('web_browser')"></i>
            </div>
            <div class="window-body" style="padding:0;">
                <iframe id="browserFrame" style="width:100%; height:100%; border:none; background:#fff;"></iframe>
            </div>
        </div>

        <div id="win_data_stream" class="app-window">
            <div class="window-header"><span><i class="fa-solid fa-chart-line"></i> FLUX STREAM</span><i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('data_stream')"></i></div>
            <div class="window-body" style="padding:0; overflow:hidden;">
                <canvas id="streamCanvas" style="width:100%; height:100%;"></canvas>
            </div>
        </div>

        <div id="win_custom_runtime" class="app-window">
            <div class="window-header"><span id="customWinTitle">🛸 Custom Runtime</span><i class="fa-solid fa-xmark close-btn" onclick="closeAppWindow('custom_runtime')"></i></div>
            <div class="window-body" id="customContainer" style="padding:0;"></div>
        </div>
    </div>

    <div id="destinationChoiceOverlay" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999; justify-content:center; align-items:center;">
        <div style="background:var(--glass-bg); padding:30px; border:1px solid var(--neon-cyan); border-radius:10px; width:400px; text-align:center;">
            <h3 style="color:var(--neon-cyan); margin-bottom:15px;">Deploy Node</h3>
            <select id="appSelector" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--border-color); margin-bottom:10px;" onchange="loadSelectedAppCode()">
                <option value="new">-- Construct New Node --</option>
            </select>
            <input type="text" id="appNameInput" placeholder="App Name" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--border-color); margin-bottom:10px;">
            <textarea id="appCodeInput" placeholder="JS Payload..." style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--border-color); margin-bottom:10px; height:100px; font-family:monospace;"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="action-btn" onclick="confirmDeployDestination()">Deploy</button>
                <button class="action-btn" style="border-color:var(--neon-magenta); color:var(--neon-magenta);" onclick="hideDeployChoiceBox()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // نظام الإشعارات
        const hudMessages = ["SYSTEM READY", "QUANTUM LINK ACTIVE", "AI CORE ONLINE", "NETWORK SYNCHRONIZED", "VISION MODULE READY", "SECURE CHANNEL ESTABLISHED"];
        let hudIndex = 0;
        function updateHud(message, color = "#00e5ff") {
            const msg = document.getElementById("hudMessage");
            if (!msg) return;
            msg.style.opacity = "0";
            setTimeout(() => { msg.textContent = message; msg.style.color = color; msg.style.opacity = "1"; }, 250);
        }
        setInterval(() => { hudIndex++; if (hudIndex >= hudMessages.length) { hudIndex = 0; } updateHud(hudMessages[hudIndex]); }, 4000);

        // سجل الأحداث
        function logCoreEvent(message, color = "var(--text-main)") {
            const logger = document.getElementById("liveActivityLogger");
            if(logger) { logger.innerHTML += `<p style="color:${color}">> ${message}</p>`; logger.scrollTop = logger.scrollHeight; }
            const hud = document.getElementById("hudMessage");
            if(hud) { hud.textContent = message; }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
            authDomain: "a0zai-56c3a.firebaseapp.com",
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "a0zai-56c3a",
            storageBucket: "a0zai-56c3a.firebasestorage.app",
            messagingSenderId: "198838438266",
            appId: "1:198838438266:web:379e782653f014a32a2ec3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); 
        const auth = firebase.auth();
        let currentUserUID = null; let currentUserEmail = ""; let globalAppsData = {};
        let objectDetectorModel = null; let visionStream = null;

        function handleNav(menuId) {
            document.querySelectorAll('.nav-menu li').forEach(li => li.classList.remove('active'));
            document.getElementById('nav-' + menuId).classList.add('active');
            logCoreEvent(`Navigation changed to node: ${menuId.toUpperCase()}`, "var(--neon-cyan)");
            
            if (currentUserUID) {
                ['cmd_system', 'global_chat', 'official_ai_bot', 'custom_runtime', 'vision_ai_scanner', 'data_stream', 'web_browser'].forEach(closeAppWindow);
                if (menuId === 'terminal') openAppWindow('cmd_system');
                if (menuId === 'network') { openAppWindow('global_chat'); renderChatInterface(); }
            }
        }

        function openAppWindow(id) { 
            if(!currentUserUID) { logCoreEvent(`[ERROR] Auth required to open ${id}`, "var(--neon-magenta)"); return; }
            document.getElementById(`win_${id}`).classList.add('open'); 
            logCoreEvent(`Launched window: ${id.toUpperCase()}`, "var(--neon-green)");
            if(id === 'data_stream') drawStream();
        }
        function closeAppWindow(id) { 
            document.getElementById(`win_${id}`).classList.remove('open'); 
            logCoreEvent(`Terminated window: ${id.toUpperCase()}`, "var(--neon-magenta)");
        }

        function unlockWithOfficialEmail() {
            const email = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const feedback = document.getElementById('lockScreenFeedback');
            if(!email || !pass) { feedback.innerText = "Null entries. Access denied."; return; }
            
            if(email === "admin" && pass === "admin") {
                currentUserUID = "dev_admin_001"; currentUserEmail = "Admin";
                document.getElementById('lockScreen').style.transform = "translateY(-100%)";
                logCoreEvent(`Developer Mode Activated`, "var(--neon-green)");
                renderHomeScreen(); setupOfficialAiEngine(); preloadCocoSsdModel();
                return;
            }

            feedback.innerText = "Decrypting token... ⏳";
            auth.signInWithEmailAndPassword(email, pass).then((u) => {
                currentUserUID = u.user.uid; currentUserEmail = email.split('@')[0];
                document.getElementById('lockScreen').style.transform = "translateY(-100%)";
                database.ref(`presence/${currentUserUID}`).set({ username: currentUserEmail, online: true });
                logCoreEvent(`Authenticated: @${currentUserEmail}`, "var(--neon-green)");
                listenToUserApps(); setupOfficialAiEngine(); preloadCocoSsdModel(); 
            }).catch((err) => { 
                feedback.innerText = `Token Reject: ${err.message}`; 
                logCoreEvent(`Auth failed: ${err.message}`, "var(--neon-magenta)");
            });
        }

        function executeTerminalCmd() {
            const input = document.getElementById("cmdLineInput");
            const terminal = document.getElementById("systemTerminal");
            const cmd = input.value.trim().toLowerCase();
            if (cmd === "") return;
            terminal.innerHTML += `<div style='color:#fff; margin-top:5px;'>A0Z_OS > ${input.value}</div>`;
            logCoreEvent(`Cmd: '${cmd}'`);
            
            if(cmd === 'help') terminal.innerHTML += `<div style='color:var(--neon-cyan)'>Available:<br>- help, sysinfo, status, deploy, clear</div>`;
            else if (cmd === 'sysinfo') terminal.innerHTML += `<div style='color:#fff'>Platform: A0Z Core v2.6<br>Runtime: Quantum V8</div>`;
            else if (cmd === 'status') terminal.innerHTML += `<div style='color:var(--neon-green)'>Firebase: CONNECTED</div>`;
            else if (cmd === 'deploy') openDeployChoiceBox();
            else if (cmd === 'clear') terminal.innerHTML = `<div>A0Z Terminal Flushed.</div>`;
            else terminal.innerHTML += `<div style='color:var(--neon-magenta)'>[ERROR] Unrecognized command.</div>`;
            
            input.value = ""; terminal.scrollTop = terminal.scrollHeight;
        }

        function listenToUserApps() { 
            if(!currentUserUID || currentUserUID === "dev_admin_001") return;
            database.ref('custom_apps/' + currentUserUID).on('value', (s) => { 
                globalAppsData = s.val() || {}; updateAppSelectorOptions(); renderHomeScreen(); 
            }); 
        }

        function renderHomeScreen() {
            const hs = document.getElementById('homeScreen'); hs.innerHTML = '';
            const systemApps = [
                { id: 'cmd_system', icon: '&gt;_', name: 'Terminal', bg: '#000', color: 'var(--neon-green)' },
                { id: 'global_chat', icon: '<i class="fa-solid fa-comments"></i>', name: 'Zulu Chat', bg: 'linear-gradient(135deg, #ffcc00, #ff3366)', color: '#fff' },
                { id: 'official_ai_bot', icon: '<i class="fa-solid fa-brain"></i>', name: 'AI Core', bg: 'rgba(5, 12, 35, 0.9)', color: 'var(--neon-cyan)' },
                { id: 'vision_ai_scanner', icon: '<i class="fa-solid fa-eye"></i>', name: 'AI Vision', bg: '#03140a', color: 'var(--neon-green)' },
                { id: 'data_stream', icon: '<i class="fa-solid fa-chart-line"></i>', name: 'Stream', bg: '#1a1f35', color: 'var(--neon-green)' },
                { id: 'web_browser', icon: '<i class="fa-solid fa-globe"></i>', name: 'Browser', bg: '#1a1f35', color: 'var(--neon-cyan)' }
            ];
            systemApps.forEach(a => {
                const item = document.createElement('div'); item.className = 'app-item';
                item.onclick = () => { if(a.id === 'vision_ai_scanner') startVisionAiScanner(); else openAppWindow(a.id); if(a.id === 'global_chat') renderChatInterface(); };
                item.innerHTML = `<div class="app-icon" style="background:${a.bg}; color:${a.color};">${a.icon}</div><div class="app-name">${a.name}</div>`;
                hs.appendChild(item);
            });
            Object.keys(globalAppsData).forEach((k) => {
                const app = globalAppsData[k]; const item = document.createElement('div'); item.className = 'app-item';
                item.onclick = (e) => { if(e.target.closest('.delete-app-btn')) return; launchCustomApp(k); };
                item.innerHTML = `<div class="delete-app-btn" onclick="deleteCustomApp('${k}', '${app.name}')"><i class="fa-solid fa-xmark"></i></div>
                    <div class="app-icon" style="background:rgba(0, 229, 255, 0.1); border-color:var(--neon-cyan); color:var(--neon-cyan); font-size:1.2rem;"><i class="fa-solid fa-cubes"></i></div>
                    <div class="app-name">${app.name}</div>`;
                hs.appendChild(item);
            });
        }

        // إعدادات التطبيقات (مطورين)
        function openDeployChoiceBox() { document.getElementById('destinationChoiceOverlay').style.display = 'flex'; }
        function hideDeployChoiceBox() { document.getElementById('destinationChoiceOverlay').style.display = 'none'; }
        function confirmDeployDestination() { hideDeployChoiceBox(); addNewAppFromPanel(); }
        
        function addNewAppFromPanel() {
            if (!currentUserUID || currentUserUID === "dev_admin_001") { alert("Cannot push code to Firebase in Developer Bypass mode."); return; }
            const sel = document.getElementById('appSelector').value; const name = document.getElementById('appNameInput').value.trim(); const code = document.getElementById('appCodeInput').value.trim();
            if (!name || !code) return;
            const appId = (sel === 'new') ? 'app_' + Date.now() : sel;
            database.ref(`custom_apps/${currentUserUID}/${appId}`).set({ name: name, code: code, timestamp: Date.now() }).then(() => {
                logCoreEvent(`Injected app payload: ${name}`, "var(--neon-green)");
                document.getElementById('appNameInput').value = ""; document.getElementById('appCodeInput').value = ""; document.getElementById('appSelector').value = "new";
            });
        }
        function deleteCustomApp(appId, appName) { if(confirm(`Purge Application: ${appName}?`)) { database.ref(`custom_apps/${currentUserUID}/${appId}`).remove(); } }
        function updateAppSelectorOptions() {
            const selector = document.getElementById('appSelector'); selector.innerHTML = '<option value="new">-- Construct New Node --</option>';
            Object.keys(globalAppsData).forEach((k) => { const opt = document.createElement('option'); opt.value = k; opt.innerText = globalAppsData[k].name; selector.appendChild(opt); });
        }
        function loadSelectedAppCode() {
            const id = document.getElementById('appSelector').value;
            if(id === 'new') { document.getElementById('appNameInput').value = ""; document.getElementById('appCodeInput').value = ""; } 
            else { document.getElementById('appNameInput').value = globalAppsData[id].name; document.getElementById('appCodeInput').value = globalAppsData[id].code; }
        }
        function launchCustomApp(key) {
            const app = globalAppsData[key]; if (!app) return;
            document.getElementById('customWinTitle').innerText = `🛸 Runtime: ${app.name}`;
            document.getElementById('customContainer').innerHTML = `<iframe sandbox="allow-scripts allow-same-origin" style="width:100%;height:100%;border:none;background:transparent;" srcdoc="
                <!DOCTYPE html><html><body style='color:#fff; font-family:sans-serif; padding:15px;'><div id='root'></div><script>
                try { const appFunc = new Function('return (' + ${JSON.stringify(app.code)} + ')')(); appFunc(document.getElementById('root')); } 
                catch(e){ document.body.innerHTML = '<div style=\\'color:red;\\'>Runtime Exception:<br>' + e.message + '</div>'; } <\/script></body></html>"></iframe>`;
            openAppWindow('custom_runtime');
        }

        // ======== تحسينات الذكاء الاصطناعي والكاميرا ========
        let lastLoggedCar = { id: null, timestamp: 0 };
        window.simulatedSpeeds = {}; // سجل لتخزين السرعات الوهمية المستقرة

        function logTrafficData(prediction, speed) {
            const now = Date.now();
            if (lastLoggedCar.id === prediction.class && (now - lastLoggedCar.timestamp < 5000)) return;
            lastLoggedCar = { id: prediction.class, timestamp: now };
            if(currentUserUID !== "dev_admin_001") {
                database.ref('traffic_logs').push({ object: prediction.class, speed: speed, timestamp: firebase.database.ServerValue.TIMESTAMP });
            }
            logCoreEvent(`Target Locked: ${prediction.class.toUpperCase()} - ${speed} KM/H`, "var(--neon-green)");
        }

        async function preloadCocoSsdModel() {
            try { objectDetectorModel = await cocoSsd.load(); document.getElementById('visionStatus').innerText = "AI Vision Ready."; } 
            catch (e) { document.getElementById('visionStatus').innerText = "Model config failed."; }
        }

        async function startVisionAiScanner() {
            openAppWindow('vision_ai_scanner');
            const video = document.getElementById('visionVideo');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    visionStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                    video.srcObject = visionStream; document.getElementById('visionStatus').innerText = "Analyzing Live Flux Matrix...";
                    video.onloadedmetadata = () => { video.play(); runVisionObjectDetectionLoop(); };
                } catch (err) { document.getElementById('visionStatus').innerText = "Camera permission missing."; }
            }
        }

        async function runVisionObjectDetectionLoop() {
            const video = document.getElementById('visionVideo'); const canvas = document.getElementById('visionCanvas');
            if(!canvas || !video || !visionStream || !objectDetectorModel || video.readyState !== 4) return;
            const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const predictions = await objectDetectorModel.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach((p) => {
                // تحديد إذا كان الجسم من المركبات
                const isVehicle = ['car', 'truck', 'bus', 'motorcycle'].includes(p.class);
                const boxColor = isVehicle ? "#11ffbd" : "#00e5ff"; // أخضر للمركبات، سماوي لغيرها
                let speedText = "";

                if (isVehicle) {
                    // توليد معرف (ID) تقريبي بناءً على الفئة وموقع X للحفاظ على استقرار السرعة للشخصية المعروضة
                    let objId = p.class + "_" + Math.floor(p.bbox[0] / 100); 
                    if (!window.simulatedSpeeds[objId]) {
                        window.simulatedSpeeds[objId] = Math.floor(Math.random() * 40) + 40; // سرعة أساسية بين 40-80
                    }
                    // تذبذب طفيف جداً للواقعية
                    let currentSpeed = window.simulatedSpeeds[objId] + (Math.floor(Math.random() * 3) - 1);
                    speedText = ` | SPD: ${currentSpeed} KM/H`;
                    logTrafficData(p, currentSpeed);
                }

                // 1. رسم المربع الخارجي
                ctx.strokeStyle = boxColor; 
                ctx.lineWidth = 3; 
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                
                // 2. رسم خلفية داكنة للنص لجعله واضحاً جداً
                const textY = p.bbox[1] > 20 ? p.bbox[1] - 25 : 0;
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(p.bbox[0], textY, p.bbox[2], 25);

                // 3. رسم النص (الاسم + الدقة + السرعة إن وجدت)
                ctx.fillStyle = boxColor; 
                ctx.font = "bold 14px monospace"; 
                const displayText = `${p.class.toUpperCase()} [${Math.round(p.score * 100)}%]${speedText}`;
                ctx.fillText(displayText, p.bbox[0] + 5, textY + 18);
            });

            if(document.getElementById('win_vision_ai_scanner').classList.contains('open')) requestAnimationFrame(runVisionObjectDetectionLoop);
        }

        function stopVisionAiScanner() { closeAppWindow('vision_ai_scanner'); if(visionStream) { visionStream.getTracks().forEach(t => t.stop()); visionStream = null; } }
        // ====================================================

        function renderChatInterface() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = `
                <div id="zuluChatMessages" style="flex-grow:1; overflow-y:auto; padding:15px; font-size:0.75rem; color:#fff; display:flex; flex-direction:column; gap:8px;">
                    <div style="color:var(--neon-cyan); text-align:center;">Handshaking with gateway... ⏳</div>
                </div>
                <div style="padding:10px; background:#000; display:flex; gap:5px; border-top:1px solid var(--border-color);">
                    <input type="text" id="zuluMsgInput" style="flex-grow:1; padding:10px; border-radius:5px; background:#090e1a; color:#fff; border:1px solid #1a2c4c; outline:none;" placeholder="Transmit packet..." onkeypress="if(event.key==='Enter') sendZuluMessage()">
                    <button class="action-btn" style="width:auto; padding:0 20px;" onclick="sendZuluMessage()">SEND</button>
                </div>
            `;
            if (currentUserUID === "dev_admin_001") { document.getElementById('zuluChatMessages').innerHTML = `<div style="color:var(--neon-magenta); text-align:center;">Firebase chat disabled in Developer Mode.</div>`; return; }
            database.ref('global_chat').limitToLast(30).on('value', (snapshot) => {
                const msgsBox = document.getElementById('zuluChatMessages'); if(!msgsBox) return; msgsBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const data = child.val(); const isMe = data.sender === currentUserEmail;
                    msgsBox.innerHTML += `<div style="align-self: ${isMe ? 'flex-end' : 'flex-start'}; background: ${isMe ? 'var(--neon-magenta)' : '#0a1224'}; padding:10px 14px; border-radius:12px; max-width:85%; border: 1px solid rgba(0,229,255,0.15);"><div style="font-size:0.6rem; color: var(--neon-cyan); margin-bottom:4px; font-weight:bold;">@${data.sender}</div><div style="word-wrap: break-word; font-family:monospace; font-size:0.7rem;">${data.text}</div></div>`;
                });
                msgsBox.scrollTop = msgsBox.scrollHeight;
            });
        }
        window.sendZuluMessage = function() { const input = document.getElementById('zuluMsgInput'); const text = input.value.trim(); if(!text || !currentUserUID || currentUserUID === "dev_admin_001") return; database.ref('global_chat').push({ sender: currentUserEmail, text: text, timestamp: Date.now() }); input.value = ''; }

        function setupOfficialAiEngine() {
            const input = document.getElementById('coreAiInput'); const btn = document.getElementById('coreAiSendBtn'); const grid = document.getElementById('coreAiChatGrid');
            btn.onclick = async () => {
                const text = input.value.trim(); if(!text) return;
                grid.innerHTML += `<div style="align-self:flex-end; background:var(--neon-cyan); color:#000; padding:10px; border-radius:10px; font-weight:bold; font-family:monospace;">${text}</div>`;
                input.value = ''; grid.scrollTop = grid.scrollHeight;
                try {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}`); const reply = await res.text();
                    grid.innerHTML += `<div style="align-self:flex-start; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; border:1px solid #1c2e4a; font-family:monospace;">${reply}</div>`;
                    grid.scrollTop = grid.scrollHeight;
                } catch(e) { grid.innerHTML += `<div style="align-self:flex-start; color:red;">Pipeline Disrupted.</div>`; }
            };
        }

        function drawStream() {
            const canvas = document.getElementById('streamCanvas');
            if (!canvas || !document.getElementById('win_data_stream').classList.contains('open')) return;
            const ctx = canvas.getContext('2d'); canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = '#11ffbd'; ctx.beginPath();
            for (let i = 0; i < canvas.width; i++) { ctx.lineTo(i, canvas.height / 2 + Math.sin(i * 0.05 + Date.now() * 0.01) * 50); }
            ctx.stroke(); requestAnimationFrame(drawStream);
        }

        setInterval(() => {
            const now = new Date(); 
            document.getElementById('liveClock').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            if(document.getElementById('lockDate')) document.getElementById('lockDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
            const c = Math.floor(Math.random() * 35 + 15), m = Math.floor(Math.random() * 20 + 55);
            document.getElementById('cpu-val').innerText = c + '%'; document.getElementById('mem-val').innerText = m + '%';
            const cpuBar = document.getElementById('cpu-bar'); const memBar = document.getElementById('mem-bar');
            cpuBar.style.width = c + '%'; memBar.style.width = m + '%';
            if(c > 40) { cpuBar.classList.add('high-load'); } else { cpuBar.classList.remove('high-load'); }
            if(m > 70) { memBar.classList.add('high-load'); } else { memBar.classList.remove('high-load'); }
        }, 2000);

        let isVpnActive = false;
        function toggleQuantumVPN() {
            isVpnActive = !isVpnActive; const btn = document.getElementById('vpnToggleBtn');
            if (isVpnActive) {
                btn.innerText = "VPN: ON"; btn.style.background = "var(--neon-green)"; btn.style.color = "#000"; btn.style.borderColor = "var(--neon-green)";
                updateHud("VPN TUNNEL ACTIVE", "var(--neon-green)");
            } else {
                btn.innerText = "VPN: OFF"; btn.style.background = "transparent"; btn.style.color = "var(--neon-magenta)"; btn.style.borderColor = "var(--neon-magenta)";
                updateHud("VPN DISCONNECTED", "var(--neon-magenta)");
            }
        }
        function loadBrowserUrl() {
            let url = document.getElementById('browserUrl').value.trim(); if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
            const frame = document.getElementById('browserFrame');
            if (isVpnActive) { frame.src = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); } 
            else { frame.src = url; }
        }

        // تأثير الكرة الثلاثية الأبعاد
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const pointLight = new THREE.PointLight(0x00e5ff, 2.5, 120); pointLight.position.set(2, 3, 6); scene.add(pointLight);
        
        const sphereGeometry = new THREE.SphereGeometry(12, 32, 16);
        const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.15 });
        const cyberSphere = new THREE.Mesh(sphereGeometry, sphereMaterial); scene.add(cyberSphere);

        const ringGeometry = new THREE.RingGeometry(14, 14.2, 64);
        const ringMaterial = new THREE.MeshBasicMaterial({ color: 0x11ffbd, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
        const cyberRing = new THREE.Mesh(ringGeometry, ringMaterial); cyberRing.rotation.x = Math.PI / 2; scene.add(cyberRing);

        camera.position.z = 25; 
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX / window.innerWidth) * 2 - 1; mouseY = -(e.clientY / window.innerHeight) * 2 + 1; });
        
        function animate3D() { 
            requestAnimationFrame(animate3D); 
            cyberSphere.rotation.x += 0.002; cyberSphere.rotation.y += 0.005; cyberRing.rotation.z -= 0.005;
            cyberSphere.position.x += (mouseX * 2 - cyberSphere.position.x) * 0.05;
            cyberSphere.position.y += (mouseY * 2 - cyberSphere.position.y) * 0.05;
            cyberRing.position.x = cyberSphere.position.x; cyberRing.position.y = cyberSphere.position.y;
            renderer.render(scene, camera); 
        }
        animate3D();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        // Particles.js 
        particlesJS("particles-js", {
            particles: { number: { value: 35, density: { enable: true, value_area: 1200 } }, color: { value: "#00e5ff" }, shape: { type: "circle" }, opacity: { value: 0.5, random: true }, size: { value: 1.5, random: true }, line_linked: { enable: true, distance: 150, color: "#00e5ff", opacity: 0.2, width: 1 }, move: { enable: true, speed: 1, random: true, straight: false, out_mode: "out" } },
            interactivity: { detect_on: "canvas", events: { onhover: { enable: false }, onclick: { enable: false } } }, retina_detect: true
        });
    </script>
</body>
