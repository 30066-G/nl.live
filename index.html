<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ISO FIELD ENGINE PRO - FULL SYSTEM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
    :root { --bg: #121212; --panel: #1e1e1e; --accent: #ff9800; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #toolbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 20px; gap: 10px; border-bottom: 2px solid var(--accent); z-index: 1000; }
    #canvas-zone { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); cursor: crosshair; }
    .sidebar { position: fixed; right: 0; top: 60px; width: 300px; height: calc(100vh - 60px); background: var(--panel); padding: 20px; border-left: 2px solid #333; overflow-y: auto; }
    .btn { background: #333; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    .sym-btn { background: #444; border: 1px solid #555; color: white; padding: 10px; margin: 5px; width: 130px; cursor: pointer; }
    .sym-btn:hover { background: var(--accent); }
    input { width: 100%; padding: 8px; margin: 5px 0; background: #2a2a2a; border: 1px solid #444; color: white; }
</style>
</head>
<body>

<div id="toolbar">
    <button class="btn" onclick="undo()">Undo</button>
    <button class="btn" onclick="generateReport()" style="background: var(--accent);">PDF Export</button>
    <span id="status" style="margin-left: 20px;">System bereit</span>
</div>

<div class="sidebar">
    <h3>Symbole</h3>
    <button class="sym-btn" onclick="selectSymbol('Ventil')">Ventil</button>
    <button class="sym-btn" onclick="selectSymbol('Flansch')">Flansch</button>
    <button class="sym-btn" onclick="selectSymbol('Bogen')">Bogen</button>
    <button class="sym-btn" onclick="selectSymbol('Pumpe')">Pumpe</button>
    <hr style="margin: 20px 0;">
    <h3>Projekt</h3>
    <input type="text" id="pName" placeholder="Projektname">
    <input type="number" id="pDN" value="200" placeholder="DN">
    <div id="resultList"></div>
    <strong>Fläche:</strong> <span id="totalM2">0.00</span> m²
</div>

<div id="canvas-zone">
    <canvas id="engine"></canvas>
</div>

<script>
    const canvas = document.getElementById('engine');
    const ctx = canvas.getContext('2d');
    let elements = [], symbols = [], currentSymbol = null;
    
    function init() {
        canvas.width = window.innerWidth - 300;
        canvas.height = window.innerHeight - 60;
        render();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // رسم الخطوط
        ctx.strokeStyle = "#ff9800"; ctx.lineWidth = 6;
        elements.forEach(el => {
            ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
        });
        // رسم الرموز
        ctx.fillStyle = "#fff";
        symbols.forEach(s => {
            ctx.font = "20px Arial";
            ctx.fillText(s.type === 'Ventil' ? '⨂' : s.type === 'Flansch' ? '⧖' : '⊚', s.x, s.y);
        });
    }

    function selectSymbol(type) { currentSymbol = type; }

    canvas.addEventListener('mousedown', (e) => {
        const x = e.clientX, y = e.clientY - 60;
        if(currentSymbol) {
            symbols.push({type: currentSymbol, x: x, y: y});
            currentSymbol = null;
        } else {
            if(elements.length > 0) {
                let last = elements[elements.length - 1];
                elements.push({x1: last.x2, y1: last.y2, x2: x, y2: y});
            } else {
                elements.push({x1: x, y1: y, x2: x + 100, y2: y});
            }
        }
        render();
    });

    function generateReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("ISO Dämmtechnik Protokoll", 20, 20);
        doc.text("Projekt: " + document.getElementById('pName').value, 20, 30);
        doc.text("Anzahl Symbole: " + symbols.length, 20, 40);
        doc.save("Report.pdf");
    }

    function undo() { if(symbols.length > 0) symbols.pop(); else elements.pop(); render(); }
    window.onresize = init;
    init();
</script>
</body>
</html>
