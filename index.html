<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z Secure Quantum OS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* 🛠️ لوحة التحكم الخارجية */
        .external-admin-panel {
            width: 340px;
            background: rgba(10, 10, 25, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .external-admin-panel h3 {
            color: #00f2fe;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #8a99ad;
            margin-bottom: 4px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 0.8rem;
        }

        .add-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .add-btn:hover {
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
        }

        /* 📦 الصندوق والآيفون */
        .box-container {
            width: 380px;
            height: 600px;
            background: #050510;
            border-radius: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
        }

        .phone {
            width: 280px;
            height: 550px;
            background: #000;
            border: 9px solid #2e2e33;
            border-radius: 44px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .dynamic-island {
            width: 95px;
            height: 25px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.6rem;
            color: #11ffbd;
        }

        .dynamic-island.expanded { width: 210px; height: 36px; background: #090911; }

        .phone-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 16px;
            background: linear-gradient(135deg, #15002a, #050f26);
        }

        /* 🔐 شاشة تسجيل الدخول المتداخلة (Lock Screen) */
        .lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #070714;
            z-index: 90;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transition: all 0.5s ease;
        }

        .lock-screen h4 {
            color: #00f2fe;
            margin-bottom: 20px;
            font-size: 1rem;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        /* 📱 الواجهة الرئيسية وتنسيق التطبيقات */
        .home-screen {
            flex-grow: 1;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content;
            gap: 20px 12px;
            overflow-y: auto;
        }
        .home-screen::-webkit-scrollbar { display: none; }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            position: relative;
        }

        .app-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .app-item:hover .app-icon {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
        }

        .app-name {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        .delete-badge {
            position: absolute;
            top: -4px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #ff3366;
            color: white;
            border-radius: 50%;
            font-size: 0.55rem;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
        }
        .app-item:hover .delete-badge { visibility: visible; }

        /* نافذة التطبيق المعزول */
        .app-window {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05050b;
            z-index: 85;
            transition: top 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 45px 16px 20px 16px;
            display: flex;
            flex-direction: column;
        }
        .app-window.active { top: 0; }

        #winContent {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            align-self: center;
            margin-top: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: white;
            z-index: 40;
        }
    </style>
</head>
<body>

    <div class="external-admin-panel">
        <h3>مصفوفة الأيقونات والذاكرة 🚀</h3>
        <div class="form-group">
            <label>اسم التطبيق:</label>
            <input type="text" id="appNameInput" placeholder="مثال: الحاسبة الخارقة">
        </div>
        <div class="form-group">
            <label>أيقونة التطبيق (Emoji):</label>
            <select id="appIconSelect">
                <option value="🧮">🧮 آلة حاسبة</option>
                <option value="🛍️">🛍️ متجر إلكتروني</option>
                <option value="🕹️">🕹️ لعبة الماتريكس</option>
            </select>
        </div>
        <div class="form-group">
            <label>كود الـ JavaScript (تم إصلاح معالج الأخطاء):</label>
            <textarea id="appCodeInput" rows="5" placeholder="// الصق كود التشغيل هنا الحين..."></textarea>
        </div>
        <button class="add-btn" onclick="addNewAppFromPanel()">حقن وحفظ في ذاكرة الجهاز 💾</button>
    </div>

    <div class="box-container">
        <div class="phone">
            <div class="dynamic-island" id="island">A0Z Secure</div>

            <div class="lock-screen" id="lockScreen">
                <h4>تسجيل دخول سيادي 🍏</h4>
                <div class="form-group" style="width:100%;">
                    <input type="text" id="loginUser" placeholder="اسم المستخدم أو الإيميل" style="text-align:center;">
                </div>
                <div class="form-group" style="width:100%;">
                    <input type="password" id="loginPass" placeholder="كلمة المرور" style="text-align:center;">
                </div>
                <button class="add-btn" onclick="unlockPhone()">فتح قفل الآيفون 🔓</button>
                <p id="loginError" style="color:#ff3366; font-size:0.65rem; margin-top:10px;"></p>
            </div>

            <div class="phone-screen">
                <div class="status-bar">
                    <div id="liveClock">00:00</div>
                    <div><span id="liveBattery">--%</span> 🔋</div>
                </div>

                <div class="home-screen" id="homeScreen">
                    </div>

                <div class="app-window" id="appWindow">
                    <div class="window-header" id="winHeader" style="text-align:center; font-weight:bold; color:#00f2fe; margin-bottom:10px;">التطبيق</div>
                    <div id="winContent"></div>
                    <button class="close-btn" onclick="closeApp()">الخروج للشاشة الرئيسية 🏠</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // حساب افتراضي آمن لتسجيل الدخول (تقدر تعدله للإيميل والباسورد تبعك)
        const SECURE_USER = "admin";
        const SECURE_PASS = "1234";

        // 1. نظام تشفير وفتح القفل
        function unlockPhone() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errorLabel = document.getElementById('loginError');

            if (user === SECURE_USER && pass === SECURE_PASS) {
                document.getElementById('lockScreen').style.top = "-100%"; // إزاحة الشاشة للأعلى بنجاح
                triggerIslandNotification("مرحباً بك يا كينج! 🔓");
                loadAppsFromStorage(); // تحميل التطبيقات من ذاكرة الجهاز فوراً
            } else {
                errorLabel.innerText = "خطأ في البيانات! السكيورتي يراقبك 👮‍♂️";
                document.getElementById('lockScreen').style.animation = "shake 0.3s 3";
            }
        }

        // 2. إدارة الوقت والشحن لايف
        function syncSystem() {
            const now = new Date();
            let hh = now.getHours(); let mm = now.getMinutes();
            document.getElementById('liveClock').innerText = `${hh < 10 ? '0'+hh : hh}:${mm < 10 ? '0'+mm : mm}`;
        }
        setInterval(syncSystem, 1000); syncSystem();

        if ('getBattery' in navigator) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('liveBattery').innerText = Math.round(b.level * 100) + '%';
                update(); b.addEventListener('levelchange', update);
            });
        }

        // 3. 💾 حفظ التطبيقات والأكواد بداخل ذاكرة الجوال الحقيقية (LocalStorage)
        function addNewAppFromPanel() {
            const nameInput = document.getElementById('appNameInput');
            const iconSelect = document.getElementById('appIconSelect');
            const codeInput = document.getElementById('appCodeInput');

            const name = nameInput.value.trim();
            const icon = iconSelect.value;
            const code = codeInput.value.trim();

            if (!name || !code) {
                triggerIslandNotification("املا خانات الاسم والكود! ❌");
                return;
            }

            // سحب التطبيقات القديمة المخزنة في الذاكرة
            let savedApps = JSON.parse(localStorage.getItem('A0Z_OS_APPS')) || [];
            
            // إضافة التطبيق الجديد في المصفوفة
            savedApps.push({ name, icon, code });
            
            // حفظ المصفوفة كاملة بداخل ذاكرة المتصفح للكمبيوتر/الجوال الحقيقي
            localStorage.setItem('A0Z_OS_APPS', JSON.stringify(savedApps));

            triggerIslandNotification(`تم الحفظ بالذاكرة وتثبيت ${name}! 💾`);
            
            // إعادة تحميل الأيقونات على الشاشة
            loadAppsFromStorage();

            nameInput.value = ""; codeInput.value = "";
        }

        // 4. 📂 سحب وتحميل التطبيقات والأكواد من الذاكرة لايف عند الإقلاع
        function loadAppsFromStorage() {
            const homeScreen = document.getElementById('homeScreen');
            // تنظيف الشاشة أولاً لتجنب التكرار
            homeScreen.innerHTML = '';

            const savedApps = JSON.parse(localStorage.getItem('A0Z_OS_APPS')) || [];

            savedApps.forEach((app, index) => {
                const appItem = document.createElement('div');
                appItem.className = 'app-item';
                
                // حل ثغرة الأخطاء: بنمرر الاندكس (index) تبع الذاكرة بدل حقن الكود مباشرة كـ String يتعارض مع المتصفح!
                appItem.setAttribute('onclick', `runAppFromStorage(${index})`);

                appItem.innerHTML = `
                    <div class="app-icon">${app.icon}</div>
                    <div class="app-name">${app.name}</div>
                    <div class="delete-badge" onclick="deleteApp(event, ${index})">X</div>
                `;
                homeScreen.appendChild(appItem);
            });
        }

        // 5. 🔮 تشغيل الكاميرا أو الحاسبة أو أي كود من الذاكرة بدون غلتشات أو أخطاء
        function runAppFromStorage(index) {
            const savedApps = JSON.parse(localStorage.getItem('A0Z_OS_APPS')) || [];
            const app = savedApps[index];
            
            if (!app) return;

            // فتح النافذة المخصصة للتطبيق بداخل الآيفون
            document.getElementById('winHeader').innerText = app.name;
            const winContent = document.getElementById('winContent');
            winContent.innerHTML = `<div id="appContainer" style="width:100%; height:100%;"></div>`;
            document.getElementById('appWindow').classList.add('active');

            try {
                // تنفيذ الكود المخصص بأعلى كفاءة وأمان
                // نمرر الـ Container بداخل الـ Scope عشان الكود الحسابي أو البصري ينبني داخل الجوال الصغير بالملي!
                const appContainer = document.getElementById('appContainer');
                
                // تشغيل كود الـ JavaScript المرفوع لايف
                const dynamicFunction = new Function('container', app.code);
                dynamicFunction(appContainer);

            } catch (error) {
                winContent.innerHTML = `<p style="color:#ff3366; font-size:0.75rem; padding:10px;">خطأ داخلي في كودك: ${error.message}</p>`;
            }
        }

        // 6. حذف التطبيق وتدميره من الذاكرة الصلبة للجهاز
        function deleteApp(event, index) {
            event.stopPropagation();
            let savedApps = JSON.parse(localStorage.getItem('A0Z_OS_APPS')) || [];
            savedApps.splice(index, 1); // مسح العنصر من المصفوفة
            localStorage.setItem('A0Z_OS_APPS', JSON.stringify(savedApps));
            triggerIslandNotification("تم تدمير التطبيق من الذاكرة 🗑️");
            loadAppsFromStorage(); // تحديث فوري للشاشة
        }

        function closeApp() {
            document.getElementById('appWindow').classList.remove('active');
        }

        function triggerIslandNotification(text) {
            const island = document.getElementById('island');
            island.innerText = text; island.classList.add('expanded');
            setTimeout(() => { island.classList.remove('expanded'); island.innerText = "A0Z Secure"; }, 2500);
        }

        function stopPropagation(e) { e.stopPropagation(); }
    </script>
</body>
</html>
