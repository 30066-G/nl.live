<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUTUR-ISO PLANUNGS-SYSTEM</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* شريط الأدوات الألماني */
        #toolbar { position: absolute; top: 0; width: 100%; height: 120px; background: #2c3e50; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; z-index: 1000; }
        .btn { background: #34495e; border: 1px solid #455a64; color: #fff; padding: 5px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .btn.main { background: #e67e22; }

        /* حاوية الرسم */
        #container { width: 100vw; height: 100vh; position: relative; background: #fff; }
        #paper { width: 100%; height: 100%; position: absolute; z-index: 1; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="btn main" onclick="drawPipe()">FUTUR-ROHR ZEICHNEN</button>
        <button class="btn" onclick="addText()">TEXT HINZUFÜGEN</button>
        <button class="btn" onclick="exportPlan()">PLAN SPEICHERN (PNG)</button>
        <div style="grid-column: span 3; display: flex; align-items: center; gap: 10px; font-size: 12px;">
            <span>LÄNGE:</span><input type="range" id="len" min="10" max="200" value="50">
            <span id="lenVal">50mm</span>
        </div>
    </div>

    <div id="container">
        <canvas id="paper"></canvas>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const pCanvas = document.getElementById('paper');
        const cCanvas = document.getElementById('canvas');
        const pCtx = pCanvas.getContext('2d');
        const cCtx = cCanvas.getContext('2d');

        function resize() {
            pCanvas.width = cCanvas.width = window.innerWidth;
            pCanvas.height = cCanvas.height = window.innerHeight;
            drawGrid();
        }

        function drawGrid() {
            pCtx.fillStyle = "#fff"; pCtx.fillRect(0,0, pCanvas.width, pCanvas.height);
            // رسم الشبكة المائلة (Isometric Grid)
            pCtx.strokeStyle = "#e0e0e0"; pCtx.lineWidth = 1;
            for(let i=0; i<pCanvas.width; i+=20) {
                pCtx.beginPath(); pCtx.moveTo(i, 0); pCtx.lineTo(i, pCanvas.height); pCtx.stroke();
            }
            // رسم الجدول السفلي (المواصفات الألمانية)
            pCtx.fillStyle = "#f0f0f0"; pCtx.fillRect(0, pCanvas.height - 150, pCanvas.width, 150);
            pCtx.strokeStyle = "#333"; pCtx.strokeRect(0, pCanvas.height - 150, pCanvas.width, 150);
            pCtx.fillStyle = "#000"; pCtx.font = "12px Arial";
            pCtx.fillText("FUTUR-STAHL SPEZIFIKATION", 20, pCanvas.height - 130);
        }

        window.onresize = resize;
        resize();

        // منطق الرسم والتحكم المستقبلي
        function drawPipe() {
            alert("FUTUR-ROHR MODUS AKTIVIERT. BITTE AUF DAS FUTUR-BLATT KLICKEN.");
        }

        function addText() {
            const txt = prompt("TEXT EINGEBEN:");
            if(txt) cCtx.fillText(txt, 100, 100);
        }

        function exportPlan() {
            const link = document.createElement('a');
            link.download = 'FUTUR-PLAN.png';
            link.href = cCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
