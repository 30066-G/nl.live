<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z Cosmic Showcase</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a16;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* 📦 حاوية الصندوق الافتراضي */
        .box-container {
            width: 320px;
            height: 450px;
            background: linear-gradient(135deg, #1e1e38, #0f0f26);
            border: 3px solid #4facfe;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(79, 172, 254, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* غطاء الصندوق النصي قبل الفتح */
        .box-lid {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #11112a;
            border-radius: 17px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.6s ease;
            border: 2px dashed #00f2fe;
        }

        .box-lid p {
            font-size: 1.2rem;
            color: #00f2fe;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        /* تأثير فتح الصندوق وانزلاق الغطاء */
        .box-container.opened .box-lid {
            transform: translateY(-110%) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        /* 📱 مجسم الجوال الرقمي بالداخل */
        .phone {
            width: 200px;
            height: 400px;
            background: #000;
            border: 4px solid #333;
            border-radius: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s;
        }

        .box-container.opened .phone {
            opacity: 1;
            transform: scale(1);
        }

        /* شاشة الجوال الداخلية المعزولة (الواجهة المتداخلة) */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px 10px;
            user-select: none;
            transition: background 0.5s ease;
        }

        /* خلفيات الهاتف الافتراضي */
        .bg-cosmic-1 { background: linear-gradient(45deg, #ff007f, #7f00ff); }
        .bg-cosmic-2 { background: linear-gradient(45deg, #00f2fe, #4facfe); }
        .bg-cosmic-3 { background: linear-gradient(45deg, #11ffbd, #abff94); }

        /* الكاميرا العلوية (الـ Notch) */
        .notch {
            width: 60px;
            height: 15px;
            background: #000;
            border-radius: 10px;
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        /* محتويات الشاشة التفاعلية */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.8);
            padding: 0 5px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
            justify-items: center;
        }

        /* الأيقونات اللمسية المتداخلة */
        .app-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .app-icon:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.5);
        }

        .phone-footer {
            text-align: center;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.4);
            padding: 5px;
            border-radius: 8px;
            color: #fff;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <h2>صندوق الماتريكس المتداخل 📱✨</h2>

    <div class="box-container" id="cosmicBox" onclick="openBox()">
        
        <div class="box-lid">
            <span style="font-size: 3rem; margin-bottom: 10px;">🎁</span>
            <p>إفتح الصندوق الفضائي</p>
        </div>

        <div class="phone" onclick="stopPropagation(event)">
            <div class="notch"></div>
            
            <div class="phone-screen bg-cosmic-1" id="phoneScreen">
                
                <div class="status-bar">
                    <span>A0Z OS</span>
                    <span>11:26 🔋</span>
                </div>

                <div class="app-grid">
                    <div class="app-icon" onclick="changeTheme('bg-cosmic-1')">🌌</div>
                    <div class="app-icon" onclick="changeTheme('bg-cosmic-2')">💎</div>
                    <div class="app-icon" onclick="changeTheme('bg-cosmic-3')">🟢</div>
                    <div class="app-icon" onclick="triggerAlert('🤖 تم تشغيل نظام الـ BOT الافتراضي!')">💬</div>
                    <div class="app-icon" onclick="triggerAlert('🖊️ يرجى شراء قلم A0Z لتفعيل الميزة!')">🎨</div>
                    <div class="app-icon" onclick="triggerAlert('🖕 تم إرسال حركة دفاعية للهكرز!')">🛡️</div>
                </div>

                <div class="phone-footer" id="phoneStatus">
                    المس الأيقونات للتحكم
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. فتح الصندوق عند الضغط عليه
        function openBox() {
            const box = document.getElementById('cosmicBox');
            box.classList.add('opened');
        }

        // 2. منع تسريب الأحداث (Event Isolation Gate)
        // يمنع المتصفح الكبير من إغلاق الصندوق أو التداخل عند لمس شاشة الجوال الصغير
        function stopPropagation(event) {
            event.stopPropagation();
        }

        // 3. التحكم باللمس داخل الشاشة المتداخلة (تغيير المظهر)
        function changeTheme(className) {
            const screen = document.getElementById('phoneScreen');
            const status = document.getElementById('phoneStatus');
            
            // إزالة الخلفيات السابقة وتطبيق الجديدة
            screen.className = 'phone-screen ' + className;
            status.innerText = "تم تغيير الواجهة بنجاح! ✨";
        }

        // 4. محاكاة تشغيل الأوامر الداخلية
        function triggerAlert(message) {
            const status = document.getElementById('phoneStatus');
            status.innerText = message;
            
            // اهتزاز بصري خفيف كاستجابة للمس
            const phone = document.querySelector('.phone');
            phone.style.transform = "scale(1.03)";
            setTimeout(() => { phone.style.transform = "scale(1)"; }, 100);
        }
    </script>
</body>
</html>
