<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>test AR</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #toolbar {
            position: absolute; top: 0; width: 100%; z-index: 200;
            background: rgba(44, 62, 80, 0.95); padding: 10px; display: flex; gap: 5px;
            flex-wrap: wrap; color: white; justify-content: center;
        }
        
        .tool-btn { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .tool-btn.active { background: #e67e22; }
        .tool-btn.camera { background: #27ae60; }

        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; width: 100%; height: 100%; }

        #dpad { position: fixed; bottom: 20px; right: 20px; z-index: 300; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; }
        .btn { height: 60px; background: #3498db; color: white; border: none; border-radius: 12px; font-size: 20px; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tool-btn camera" onclick="toggleCam()" id="btn-cam">📷 كاميرا</button>
        <button class="tool-btn" onclick="setTool('pipe')">🖊️ خط</button>
        <button class="tool-btn" onclick="stamp('cube')">📦 مكعب</button>
        <button class="tool-btn" onclick="clearAll()">🗑️ مسح</button>
    </div>

    <div id="canvas-container">
        <video id="v" autoplay playsinline></video>
        <canvas id="c"></canvas>
    </div>

    <div id="dpad">
        <div class="grid">
            <button class="btn" style="visibility:hidden"></button>
            <button class="btn" onclick="draw('o')">↑</button>
            <button class="btn" style="visibility:hidden"></button>
            <button class="btn" onclick="draw('h')">↖</button>
            <button class="btn" style="background:red">●</button>
            <button class="btn" onclick="draw('r')">↗</button>
            <button class="btn" onclick="draw('l')">↙</button>
            <button class="btn" onclick="draw('u')">↓</button>
            <button class="btn" onclick="draw('v')">↘</button>
        </div>
    </div>

    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const v = document.getElementById('v');
        let tap = {x: window.innerWidth/2, y: window.innerHeight/2}, elements = [];

        function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.onresize = resize; resize();

        async function toggleCam() {
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            v.srcObject = stream;
        }

        c.addEventListener('pointerdown', (e) => {
            tap = {x: e.clientX, y: e.clientY};
            render();
        });

        function draw(dir) {
            const L = 80;
            let target = {x: tap.x, y: tap.y};
            const angle = 30 * Math.PI / 180;
            
            if(dir=='o') target.y -= L;
            else if(dir=='u') target.y += L;
            else if(dir=='r') { target.x += L * Math.cos(angle); target.y -= L * Math.sin(angle); }
            else if(dir=='l') { target.x -= L * Math.cos(angle); target.y += L * Math.sin(angle); }
            else if(dir=='h') { target.x -= L * Math.cos(angle); target.y -= L * Math.sin(angle); }
            else if(dir=='v') { target.x += L * Math.cos(angle); target.y += L * Math.sin(angle); }
            
            elements.push({from: {...tap}, to: {...target}});
            tap = target;
            render();
        }

        function stamp(type) { elements.push({type, x: tap.x, y: tap.y}); render(); }

        function render() {
            ctx.clearRect(0,0, c.width, c.height);
            ctx.strokeStyle = "#F1C40F"; ctx.lineWidth = 5;
            elements.forEach(el => {
                if(el.type == 'cube') {
                    ctx.strokeRect(el.x-30, el.y-30, 60, 60);
                } else {
                    ctx.beginPath(); ctx.moveTo(el.from.x, el.from.y); ctx.lineTo(el.to.x, el.to.y); ctx.stroke();
                }
            });
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(tap.x, tap.y, 12, 0, 7); ctx.fill();
        }
        
        function clearAll() { elements = []; render(); }
    </script>
</body>
</html>
