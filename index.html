<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mo style</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
    font-family:Arial,Helvetica,sans-serif
}

body{
    overflow:hidden;
    background:#1a1a1a;
    color:#fff
}

#toolbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:#222;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    padding:6px;
    border-bottom:2px solid #444
}

.btn{
    background:#333;
    color:#fff;
    border:none;
    padding:7px 10px;
    border-radius:4px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer
}

.btn:active{
    background:#d87a00
}

.group{
    display:flex;
    align-items:center;
    gap:4px;
    background:#2d2d2d;
    padding:4px 6px;
    border-radius:4px
}

.group label{
    font-size:10px;
    color:#ccc
}

.group input[type=text]{
    width:90px;
    background:#111;
    color:#fff;
    border:1px solid #555;
    border-radius:4px;
    padding:3px;
    text-align:center
}

.group input[type=range]{
    width:70px
}

#canvasBox{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative
}

canvas{
    width:100%;
    height:100%;
    display:block
}

#side{
    position:fixed;
    right:10px;
    top:110px;
    z-index:999;
    background:rgba(20,20,20,.9);
    border:1px solid #444;
    border-radius:8px;
    padding:6px;
    display:flex;
    flex-direction:column;
    gap:5px
}

.sbtn{
    background:#2d2d2d;
    color:#fff;
    border:none;
    padding:7px;
    border-radius:4px;
    font-size:10px;
    cursor:pointer
}

.sbtn:active{
    background:#d87a00
}

#pad{
    position:fixed;
    bottom:15px;
    right:15px;
    z-index:999
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,50px);
    grid-template-rows:repeat(3,50px);
    gap:5px
}

.pbtn{
    border:none;
    background:#2d89ef;
    color:#fff;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold
}

.pbtn:active{
    background:#d87a00
}

.center{
    background:#c0392b;
    font-size:11px
}

#info{
    position:fixed;
    left:10px;
    top:110px;
    z-index:999;
    background:rgba(0,0,0,.85);
    border:2px solid #d87a00;
    border-radius:8px;
    padding:10px;
    width:210px;
    font-size:11px
}

#info h3{
    color:#d87a00;
    margin-bottom:8px;
    border-bottom:1px solid #d87a00;
    padding-bottom:5px
}

#zoom{
    position:fixed;
    bottom:20px;
    left:20px;
    z-index:999;
    background:rgba(0,0,0,.7);
    padding:5px 10px;
    border-radius:5px;
    font-size:11px
}
</style>
</head>

<body>

<div id="toolbar">

<button class="btn" onclick="resetView()">Zentrieren</button>

<div class="group">
<label>Projekt</label>
<input type="text" id="projekt" value="Rentschler">
</div>

<div class="group">
<label>Isolierung</label>
<input type="text" id="isolierung" value="K-Flex">
</div>

<div class="group">
<label>Länge</label>
<input type="range" id="len" min="20" max="180" value="60">
<span id="lenText">350 mm</span>
</div>

<div class="group">
<label>Text</label>
<input type="range" id="font" min="10" max="28" value="16">
</div>

<button class="btn" onclick="clearAll()">Löschen</button>
<button class="btn" onclick="download()">Exportieren</button>

</div>

<div id="side">
<button class="sbtn" onclick="symbol('valve')">Ventil</button>
<button class="sbtn" onclick="symbol('pump')">Pumpe</button>
<button class="sbtn" onclick="symbol('flange')">Flansch</button>
<button class="sbtn" onclick="symbol('gauge')">Messgerät</button>
<button class="sbtn" onclick="symbol('cube')">Behälter</button>
<button class="sbtn" onclick="symbol('elbow')">Bogen</button>
</div>

<div id="info">
<h3>Technische Daten</h3>
<div>Gesamtlänge: <span id="sum">0</span> mm</div>
<div style="margin-top:5px">Rohrdurchmesser: Ø220</div>
</div>

<div id="zoom">Zoom: <span id="zoomVal">100%</span></div>

<div id="canvasBox">
<canvas id="cv"></canvas>
</div>

<div id="pad">
<div class="grid">
<div></div>
<button class="pbtn" onclick="draw('up')">↑</button>
<div></div>

<button class="pbtn" onclick="draw('leftUp')">↖</button>
<button class="pbtn center" onclick="resetView()">ISO</button>
<button class="pbtn" onclick="draw('rightUp')">↗</button>

<button class="pbtn" onclick="draw('leftDown')">↙</button>
<button class="pbtn" onclick="draw('down')">↓</button>
<button class="pbtn" onclick="draw('rightDown')">↘</button>
</div>
</div>

<script>

const canvas=document.getElementById('cv')
const ctx=canvas.getContext('2d')

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let transform={x:0,y:0,scale:1}
let start={x:window.innerWidth/2,y:window.innerHeight/2-70}
let total=0
let objects=[]

const ratio=5.833

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
render()
}

window.onresize=resize

function isoPaper(){

ctx.fillStyle="#fff"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(transform.x,transform.y)
ctx.scale(transform.scale,transform.scale)

ctx.strokeStyle="rgba(130,170,190,.45)"
ctx.lineWidth=.5

let space=24
let a=Math.PI/6

for(let i=-4000;i<4000;i+=space){

ctx.beginPath()
ctx.moveTo(i,-4000)
ctx.lineTo(i+4000*Math.tan(a),4000)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(i,-4000)
ctx.lineTo(i-4000*Math.tan(a),4000)
ctx.stroke()

}

ctx.restore()

footer()
}

function footer(){

let y=canvas.height-120

ctx.fillStyle="#fafafa"
ctx.fillRect(0,y,canvas.width,120)

ctx.strokeStyle="#222"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

ctx.font="10px Arial"
ctx.fillStyle="#222"

const cols=[21,27,33,42,48,60,76,89,114,140,168,219,273,324,457]
let w=canvas.width/(cols.length+2)

for(let i=0;i<cols.length;i++){

let x=(i+1)*w

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x,y+40)
ctx.stroke()

ctx.fillText(cols[i],x+8,y+15)
ctx.fillText(Math.round(cols[i]*1.37),x+4,y+33)

}

ctx.beginPath()
ctx.moveTo(0,y+20)
ctx.lineTo(canvas.width,y+20)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,y+40)
ctx.lineTo(canvas.width,y+40)
ctx.stroke()

ctx.font="bold 12px Arial"
ctx.fillStyle="#d87a00"
ctx.fillText("Frech Dämmtechnik",canvas.width-180,y+60)

ctx.fillStyle="#333"
ctx.font="10px Arial"

ctx.fillText("Projekt: "+document.getElementById('projekt').value,canvas.width-180,y+80)
ctx.fillText("Isolierung: "+document.getElementById('isolierung').value,canvas.width-180,y+98)

}

function draw(dir){

let len=parseFloat(document.getElementById('len').value)
let a=Math.PI/6

let target={x:start.x,y:start.y}

if(dir==="up")target.y-=len
if(dir==="down")target.y+=len

if(dir==="rightUp"){
target.x+=len*Math.cos(a)
target.y-=len*Math.sin(a)
}

if(dir==="leftUp"){
target.x-=len*Math.cos(a)
target.y-=len*Math.sin(a)
}

if(dir==="rightDown"){
target.x+=len*Math.cos(a)
target.y+=len*Math.sin(a)
}

if(dir==="leftDown"){
target.x-=len*Math.cos(a)
target.y+=len*Math.sin(a)
}

let mm=Math.round(len*ratio)

objects.push({
type:"pipe",
from:{...start},
to:{...target},
label:mm
})

total+=mm

document.getElementById('sum').innerText=total

start=target

render()

}

function symbol(t){

objects.push({
type:"symbol",
symbol:t,
x:start.x,
y:start.y
})

render()

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

isoPaper()

ctx.save()

ctx.translate(transform.x,transform.y)
ctx.scale(transform.scale,transform.scale)

let fs=parseInt(document.getElementById('font').value)

objects.forEach(o=>{

if(o.type==="pipe"){

ctx.strokeStyle="#333"
ctx.lineWidth=5
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(o.from.x,o.from.y)
ctx.lineTo(o.to.x,o.to.y)
ctx.stroke()

let mx=(o.from.x+o.to.x)/2
let my=(o.from.y+o.to.y)/2-8

ctx.font="bold "+fs+"px Arial"
ctx.textAlign="center"

ctx.strokeStyle="#fff"
ctx.lineWidth=4

ctx.strokeText(o.label,mx,my)

ctx.fillStyle="#d87a00"
ctx.fillText(o.label,mx,my)

}

if(o.type==="symbol"){

ctx.save()

ctx.translate(o.x,o.y)

ctx.strokeStyle="#1e8449"
ctx.fillStyle="#1e8449"
ctx.lineWidth=3

let s=18

if(o.symbol==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(o.symbol==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(o.symbol==="flange"){

ctx.beginPath()
ctx.moveTo(0,-s)
ctx.lineTo(s,0)
ctx.lineTo(0,s)
ctx.lineTo(-s,0)
ctx.closePath()
ctx.stroke()

}

if(o.symbol==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(o.symbol==="cube"){

ctx.strokeRect(-s,-s,s*2,s*2)

}

if(o.symbol==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

ctx.restore()

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(start.x,start.y,7,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function clearAll(){

objects=[]
total=0
document.getElementById('sum').innerText=0
resetView()

}

function resetView(){

transform={x:0,y:0,scale:1}
start={x:window.innerWidth/2,y:window.innerHeight/2-70}

document.getElementById('zoomVal').innerText="100%"

render()

}

document.getElementById('len').oninput=function(){

document.getElementById('lenText').innerText=
Math.round(this.value*ratio)+" mm"

}

let pointers={}
let dist=0
let baseScale=1
let pan=false
let sx=0
let sy=0
let tx=0
let ty=0

canvas.addEventListener('pointerdown',e=>{

pointers[e.pointerId]=e

let ids=Object.keys(pointers)

if(ids.length===2){

let p1=pointers[ids[0]]
let p2=pointers[ids[1]]

dist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

baseScale=transform.scale

}

if(ids.length===1){

pan=true

sx=e.clientX
sy=e.clientY

tx=transform.x
ty=transform.y

}

})

canvas.addEventListener('pointermove',e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

let ids=Object.keys(pointers)

if(ids.length===2){

let p1=pointers[ids[0]]
let p2=pointers[ids[1]]

let nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

transform.scale=Math.min(Math.max(baseScale*(nd/dist),0.4),4)

document.getElementById('zoomVal').innerText=
Math.round(transform.scale*100)+"%"

render()

}

if(ids.length===1&&pan){

transform.x=tx+(e.clientX-sx)
transform.y=ty+(e.clientY-sy)

render()

}

})

canvas.addEventListener('pointerup',e=>{

delete pointers[e.pointerId]

if(Object.keys(pointers).length===0)pan=false

})

canvas.addEventListener('wheel',e=>{

e.preventDefault()

if(e.deltaY<0){
transform.scale*=1.1
}else{
transform.scale/=1.1
}

transform.scale=Math.min(Math.max(transform.scale,0.4),4)

document.getElementById('zoomVal').innerText=
Math.round(transform.scale*100)+"%"

render()

},{passive:false})

function download(){

let a=document.createElement('a')

a.download='Isometrie.png'
a.href=canvas.toDataURL()

a.click()

}

render()

</script>

</body>
</html>
