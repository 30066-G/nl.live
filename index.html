<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO CAD PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-user-select:none;
user-select:none
}

body{
overflow:hidden;
background:#161616
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
padding:8px;
display:flex;
gap:6px;
flex-wrap:wrap;
z-index:1000;
background:#1f1f1f;
border-bottom:2px solid #333
}

.box{
background:#2a2a2a;
padding:6px 8px;
border-radius:10px;
display:flex;
align-items:center;
gap:6px;
color:#fff;
font-size:12px
}

input{
background:#111;
border:1px solid #555;
color:#fff;
padding:5px;
border-radius:6px
}

input[type=text]{
width:100px;
text-align:center
}

button{
background:#2e2e2e;
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
font-weight:600
}

button:active{
background:#d87b00
}

#side{
position:fixed;
right:10px;
top:100px;
display:flex;
flex-direction:column;
gap:6px;
z-index:999
}

.sym{
width:90px
}

#panel{
position:fixed;
left:10px;
top:100px;
background:rgba(25,25,25,.93);
border:2px solid #d87b00;
border-radius:14px;
padding:14px;
color:#fff;
width:240px;
z-index:999
}

#panel h3{
color:#ff9800;
margin-bottom:10px
}

#zoom{
position:fixed;
bottom:18px;
left:18px;
background:rgba(0,0,0,.7);
color:#fff;
padding:7px 12px;
border-radius:10px;
z-index:999
}

</style>
</head>

<body>

<div id="ui">

<button onclick="resetCam()">Zentrieren</button>

<div class="box">
<span>Projekt</span>
<input type="text" id="project" value="Rentschler">
</div>

<div class="box">
<span>Isolierung</span>
<input type="text" id="iso" value="K-Flex">
</div>

<div class="box">
<span>Rohr</span>
<input type="text" id="pipe" value="Ø220">
</div>

<div class="box">
<span>Länge</span>
<input type="range" id="len" min="20" max="250" value="60">
<span id="lenText">350 mm</span>
</div>

<button onclick="undo()">Undo</button>
<button onclick="clearAll()">Löschen</button>
<button onclick="exportPNG()">Export</button>

</div>

<div id="side">

<button class="sym" onclick="pick('valve')">Ventil</button>
<button class="sym" onclick="pick('flange')">Flansch</button>
<button class="sym" onclick="pick('pump')">Pumpe</button>
<button class="sym" onclick="pick('gauge')">Messgerät</button>
<button class="sym" onclick="pick('elbow')">Bogen</button>

</div>

<div id="panel">

<h3>Technische Daten</h3>

<div style="margin-top:8px">
Gesamtlänge:
<span id="sum">0</span> mm
</div>

<div style="margin-top:8px">
Rohr:
<span id="pipeInfo">Ø220</span>
</div>

<div style="margin-top:8px">
Projekt:
<span id="projectInfo">Rentschler</span>
</div>

</div>

<div id="zoom">
Zoom:
<span id="zoomText">100%</span>
</div>

<canvas id="grid"></canvas>
<canvas id="draw"></canvas>

<script>

const grid=document.getElementById("grid")
const draw=document.getElementById("draw")

const gtx=grid.getContext("2d")
const ctx=draw.getContext("2d")

let w=innerWidth
let h=innerHeight

const dpr=devicePixelRatio||1

function setupCanvas(c,x){

c.width=w*dpr
c.height=h*dpr

c.style.width=w+"px"
c.style.height=h+"px"

x.scale(dpr,dpr)

}

setupCanvas(grid,gtx)
setupCanvas(draw,ctx)

let cam={
x:0,
y:0,
z:1
}

let pipes=[]
let total=0

let current={
x:w/2,
y:h/2
}

let mode="draw"
let selected=null

function snap(v){

return Math.round(v/16)*16

}

function isoDir(dx,dy){

const a=Math.atan2(dy,dx)

const dirs=[
0,
Math.PI/3,
2*Math.PI/3,
Math.PI,
-2*Math.PI/3,
-Math.PI/3
]

let best=dirs[0]
let diff=999

dirs.forEach(d=>{

let n=Math.abs(a-d)

if(n<diff){
diff=n
best=d
}

})

return best

}

function drawGrid(){

gtx.clearRect(0,0,w,h)

gtx.fillStyle="#fff"
gtx.fillRect(0,0,w,h)

gtx.save()

gtx.translate(cam.x,cam.y)
gtx.scale(cam.z,cam.z)

const step=32
const angle=Math.PI/6

gtx.strokeStyle="rgba(120,150,180,.20)"
gtx.lineWidth=.7

for(let i=-6000;i<6000;i+=step){

gtx.beginPath()
gtx.moveTo(i,-6000)
gtx.lineTo(i+6000*Math.tan(angle),6000)
gtx.stroke()

gtx.beginPath()
gtx.moveTo(i,-6000)
gtx.lineTo(i-6000*Math.tan(angle),6000)
gtx.stroke()

}

gtx.restore()

drawFooter()

}

function drawFooter(){

const y=h-110

gtx.fillStyle="#fafafa"
gtx.fillRect(0,y,w,110)

gtx.strokeStyle="#222"
gtx.lineWidth=2

gtx.beginPath()
gtx.moveTo(0,y)
gtx.lineTo(w,y)
gtx.stroke()

const cols=[21,27,33,42,48,60,76,89,114,140,168,219,273,324,457]

const cw=w/(cols.length+2)

gtx.font="10px Segoe UI"
gtx.fillStyle="#111"

for(let i=0;i<cols.length;i++){

const x=(i+1)*cw

gtx.beginPath()
gtx.moveTo(x,y)
gtx.lineTo(x,y+40)
gtx.stroke()

gtx.fillText(cols[i],x+7,y+14)
gtx.fillText(Math.round(cols[i]*1.37),x+5,y+32)

}

gtx.beginPath()
gtx.moveTo(0,y+20)
gtx.lineTo(w,y+20)
gtx.stroke()

gtx.beginPath()
gtx.moveTo(0,y+40)
gtx.lineTo(w,y+40)
gtx.stroke()

gtx.font="bold 13px Segoe UI"
gtx.fillStyle="#d87b00"

gtx.fillText("Frech Dämmtechnik",w-190,y+65)

gtx.fillStyle="#111"
gtx.font="11px Segoe UI"

gtx.fillText("Projekt: "+project.value,w-190,y+85)
gtx.fillText("Isolierung: "+iso.value,w-190,y+102)

}

function render(){

drawGrid()

ctx.clearRect(0,0,w,h)

ctx.save()

ctx.translate(cam.x,cam.y)
ctx.scale(cam.z,cam.z)

pipes.forEach(p=>{

ctx.strokeStyle="#202020"
ctx.lineWidth=2.2
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(p.a.x,p.a.y)
ctx.lineTo(p.b.x,p.b.y)
ctx.stroke()

const mx=(p.a.x+p.b.x)/2
const my=(p.a.y+p.b.y)/2

ctx.save()

ctx.translate(mx,my)

ctx.rotate(p.angle)

ctx.font="600 14px Segoe UI"

ctx.textAlign="center"

ctx.strokeStyle="#fff"
ctx.lineWidth=5

ctx.strokeText(p.len,0,-8)

ctx.fillStyle="#111"
ctx.fillText(p.len,0,-8)

ctx.restore()

if(p.sym){

symbol(
p.sym,
p.b.x,
p.b.y
)

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,5,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function symbol(type,x,y){

ctx.save()

ctx.translate(x,y)

ctx.strokeStyle="#16874b"
ctx.fillStyle="#16874b"
ctx.lineWidth=2

const s=12

if(type==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(type==="flange"){

ctx.beginPath()
ctx.moveTo(0,-s)
ctx.lineTo(s,0)
ctx.lineTo(0,s)
ctx.lineTo(-s,0)
ctx.closePath()
ctx.stroke()

}

if(type==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(type==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(type==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

ctx.restore()

}

let sx=0
let sy=0

draw.addEventListener("touchstart",e=>{

if(e.touches.length===1){

sx=e.touches[0].clientX
sy=e.touches[0].clientY

mode="draw"

}

if(e.touches.length===2){

mode="pan"

}

})

draw.addEventListener("touchend",e=>{

if(mode!=="draw")return

const ex=e.changedTouches[0].clientX
const ey=e.changedTouches[0].clientY

const dx=ex-sx
const dy=ey-sy

const ang=isoDir(dx,dy)

const len=parseFloat(document.getElementById("len").value)

let nx=current.x+Math.cos(ang)*len
let ny=current.y+Math.sin(ang)*len

nx=snap(nx)
ny=snap(ny)

const mm=Math.round(len*5.833)

pipes.push({

a:{x:current.x,y:current.y},
b:{x:nx,y:ny},
len:mm,
angle:ang,
sym:selected

})

selected=null

current.x=nx
current.y=ny

total+=mm

sum.innerText=total

render()

})

let pointers={}
let startDist=0
let startZoom=1

let px=0
let py=0

let ox=0
let oy=0

draw.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=cam.z

}

if(ids.length===1){

px=e.clientX
py=e.clientY

ox=cam.x
oy=cam.y

}

})

draw.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

const nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

cam.z=Math.min(
Math.max(startZoom*(nd/startDist),.35),
6
)

zoomText.innerText=Math.round(cam.z*100)+"%"

render()

}

if(ids.length===1&&mode==="pan"){

cam.x=ox+(e.clientX-px)
cam.y=oy+(e.clientY-py)

render()

}

})

draw.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

})

function pick(s){

selected=s

}

function undo(){

pipes.pop()

render()

}

function clearAll(){

pipes=[]

total=0

sum.innerText=0

render()

}

function resetCam(){

cam={
x:0,
y:0,
z:1
}

zoomText.innerText="100%"

render()

}

function exportPNG(){

const out=document.createElement("canvas")

out.width=grid.width
out.height=grid.height

const o=out.getContext("2d")

o.drawImage(grid,0,0)
o.drawImage(draw,0,0)

const a=document.createElement("a")

a.download="ISO_CAD_PRO.png"

a.href=out.toDataURL()

a.click()

}

len.oninput=function(){

lenText.innerText=
Math.round(this.value*5.833)+" mm"

}

render()

</script>

</body>
</html>
