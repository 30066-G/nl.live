<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مساعد رسم الأنابيب الذكي للموبايل</title>
    <style>
        /* إعدادات التهيئة العامة للجوال */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            display: flex; flex-direction: column; height: 100vh;
            user-select: none;
        }

        /* شريط الأدوات العلوي المتجاوب */
        #toolbar {
            background-color: #2c3e50; color: white; padding: 8px;
            display: flex; gap: 6px; align-items: center; z-index: 10;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
            flex-wrap: wrap;
        }

        .tool-btn {
            background-color: #34495e; color: white; border: 1px solid #7f8c8d;
            padding: 10px 12px; border-radius: 6px; cursor: pointer; 
            font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 4px;
        }

        .tool-btn:active, .tool-btn.active { 
            background-color: #2980b9; border-color: #3498db; 
        }
        
        .tool-btn.danger { background-color: #e74c3c; border-color: #c0392b; }
        .tool-btn.danger:active { background-color: #c0392b; }

        .control-group {
            display: flex; align-items: center; gap: 8px;
            background: #34495e; padding: 4px 8px; border-radius: 6px;
            border: 1px solid #7f8c8d;
        }

        label { color: white; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        input[type="range"] { width: 70px; accent-color: #3498db; }

        /* حاوية لوحة الرسم القابلة للتمرير */
        #canvas-container { 
            flex: 1; position: relative; overflow: auto; 
            background-color: #718093; -webkit-overflow-scrolling: touch; 
        }
        
        canvas { 
            display: block; background-color: white; 
            margin: 10px auto; box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            touch-action: none; 
        }

        /* لوحة التحكم بالاتجاهات (D-Pad) المطورة للجوال */
        #dpad-container {
            position: fixed; bottom: 15px; left: 15px;
            background-color: rgba(44, 62, 80, 0.96);
            border: 2px solid #3498db; padding: 12px; border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5); z-index: 100;
        }

        .dpad-title { 
            color: #3498db; font-size: 11px; font-weight: bold; 
            text-align: center; margin-bottom: 8px; text-transform: uppercase;
        }
        
        /* تصميم أزرار الاتجاهات بنظام الشبكة المتناسق */
        .dpad-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 55px); 
            grid-template-rows: repeat(3, 55px); 
            gap: 8px; 
        }

        .dpad-btn {
            background-color: #34495e; color: white;
            border: 1px solid #7f8c8d; border-radius: 10px; 
            font-size: 15px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.1s;
        }
        
        .dpad-btn:active { 
            background-color: #e67e22; border-color: #d35400; color: white; 
        }
        
        /* زر نقطة الصفر المركزية */
        .dpad-btn.center-node { 
            background-color: #e74c3c; border-color: #c0392b; font-size: 11px; 
        }
        .dpad-btn.center-node:active { background-color: #c0392b; }
        
        .dpad-btn.empty { background: transparent; border: none; cursor: default; pointer-events: none; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tool-btn active" onclick="setTool('pipe')" id="btn-pipe">🖊️ أنبوب</button>
        <button class="tool-btn" onclick="setTool('arrow')" id="btn-arrow">🏹 سهم</button>
        <button class="tool-btn" onclick="setTool('valve')" id="btn-valve">⏳ محبس</button>
        <button class="tool-btn" onclick="setTool('text')" id="btn-text">🔤 نص</button>
        
        <div class="control-group">
            <label>🎨 <input type="color" id="colorPicker" value="#2c3e50" style="width:25px; height:25px; border:none; padding:0;"></label>
            <label>📏 <input type="range" id="sizeSlider" min="2" max="12" value="6"></label>
            <label>↕️ الطول <input type="range" id="lengthSlider" min="40" max="150" value="75"></label>
        </div>
        
        <button class="tool-btn danger" onclick="clearCanvas()" style="margin-right: auto;">🗑️ مسح</button>
    </div>

    <div id="canvas-container">
        <canvas id="isoCanvas" width="1300" height="1000"></canvas>
    </div>

    <div id="dpad-container">
        <div class="dpad-title">لوحة التوجيه الفوري</div>
        <div class="dpad-grid">
            <button class="dpad-btn empty"></button>
            <button class="dpad-btn" onclick="drawInDirection('o')">↑<br>o</button>
            <button class="dpad-btn empty"></button>
            
            <button class="dpad-btn" onclick="drawInDirection('h')">↖<br>h</button>
            <button class="dpad-btn center-node" id="status-node">نقطة<br>الارتكاز</button>
            <button class="dpad-btn" onclick="drawInDirection('r')">↗<br>r</button>
            
            <button class="dpad-btn" onclick="drawInDirection('l')">↙<br>l</button>
            <button class="dpad-btn" onclick="drawInDirection('u')">↓<br>u</button>
            <button class="dpad-btn" onclick="drawInDirection('v')">↘<br>v</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('isoCanvas');
        const ctx = canvas.getContext('2d');

        let currentTool = 'pipe';
        let snapshot;
        
        // نقطة الارتكاز (الصفر) الافتراضية
        let tapPoint = { x: 650, y: 500 }; 
        const gridSpacing = 25;
        const isoAngle = 30 * Math.PI / 180;

        init();

        function init() {
            drawGrid();
            saveSnapshot();
            drawTapPointMarker();
        }

        // بناء خلفية شبكة خطوط الورق الهندسي بدقة
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#d1e1e9';
            ctx.lineWidth = 0.8;

            for (let i = -canvas.height; i < canvas.width; i += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(i, 0);
                ctx.lineTo(i + canvas.height * Math.tan(isoAngle), canvas.height); ctx.stroke();
            }
            for (let i = 0; i < canvas.width + canvas.height; i += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(i, 0);
                ctx.lineTo(i - canvas.height * Math.tan(isoAngle), canvas.height); ctx.stroke();
            }
        }

        function saveSnapshot() {
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        // رسم مؤشر نقطة الصفر التفاعلية بلون أحمر بارز ليوضح مكان بدء الرسم القادم
        function drawTapPointMarker() {
            ctx.putImageData(snapshot, 0, 0);
            ctx.beginPath();
            ctx.arc(tapPoint.x, tapPoint.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }

        // دعم دقة اللمس والنقر على المتصفحات والجوالات لتحديث نقطة الصفر
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            tapPoint.x = e.clientX - rect.left;
            tapPoint.y = e.clientY - rect.top;
            drawTapPointMarker();
        });

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${tool}`).classList.add('active');
        }

        // معالجة الرسم والحسابات الرياضية المتقدمة لجميع المحاور الستة
        function drawInDirection(direction) {
            const length = parseInt(document.getElementById('lengthSlider').value);
            let targetX = tapPoint.x;
            let targetY = tapPoint.y;

            switch (direction) {
                case 'o': // أعلى عمودي
                    targetY -= length; break;
                case 'u': // أسفل عمودي
                    targetY += length; break;
                case 'r': // يمين للأعلى (زاوية 30 مائلة)
                    targetX += length * Math.cos(-Math.PI / 6);
                    targetY += length * Math.sin(-Math.PI / 6); break;
                case 'l': // يسار للأسفل
                    targetX += length * Math.cos(5 * Math.PI / 6);
                    targetY += length * Math.sin(5 * Math.PI / 6); break;
                case 'h': // يسار للأعلى
                    targetX += length * Math.cos(-5 * Math.PI / 6);
                    targetY += length * Math.sin(-5 * Math.PI / 6); break;
                case 'v': // يمين للأسفل
                    targetX += length * Math.cos(Math.PI / 6);
                    targetY += length * Math.sin(Math.PI / 6); break;
            }

            ctx.putImageData(snapshot, 0, 0); 
            ctx.strokeStyle = document.getElementById('colorPicker').value;
            ctx.fillStyle = document.getElementById('colorPicker').value;
            ctx.lineWidth = document.getElementById('sizeSlider').value;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';

            if (currentTool === 'pipe') {
                ctx.beginPath(); ctx.moveTo(tapPoint.x, tapPoint.y); ctx.lineTo(targetX, targetY); ctx.stroke();
            } else if (currentTool === 'arrow') {
                drawArrow(tapPoint.x, tapPoint.y, targetX, targetY, ctx.lineWidth);
            } else if (currentTool === 'valve') {
                ctx.beginPath(); ctx.moveTo(tapPoint.x, tapPoint.y); ctx.lineTo(targetX, targetY); ctx.stroke();
                drawValve((tapPoint.x + targetX)/2, (tapPoint.y + targetY)/2);
            } else if (currentTool === 'text') {
                ctx.beginPath(); ctx.moveTo(tapPoint.x, tapPoint.y); ctx.lineTo(targetX, targetY); ctx.stroke();
                const text = prompt("أدخل المقاس المطلوب وضعه فوق هذا الأنبوب:");
                if(text) { 
                    ctx.font = "bold 14px Arial"; 
                    ctx.fillText(text, (tapPoint.x + targetX)/2 - 12, (tapPoint.y + targetY)/2 - 12); 
                }
            }

            // ترحيل تلقائي ذكي لنقطة الصفر لتتبع نهاية الرسم الجديد تلقائياً
            tapPoint.x = targetX;
            tapPoint.y = targetY;

            saveSnapshot();
            drawTapPointMarker();
        }

        // دالة رسم الأسهم
        function drawArrow(x1, y1, x2, y2, width) {
            const headlen = width * 3.5 > 16 ? width * 3.5 : 16;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath(); ctx.fill();
        }

        // دالة هندسة الرموز (المحابس والأقفال)
        function drawValve(x, y) {
            ctx.save(); ctx.translate(x, y); ctx.beginPath();
            ctx.moveTo(-14, -9); ctx.lineTo(14, 9); ctx.lineTo(14, -9); ctx.lineTo(-14, 9);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }

        function clearCanvas() {
            if (confirm("هل تود تنظيف اللوحة وبدء رسمة جديدة؟")) { 
                tapPoint = { x: 650, y: 500 }; 
                init(); 
            }
        }
    </script>
</body>
</html>
