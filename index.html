<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z Quantum OS v15.0 - Full Touch & Drop Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff3366;
            --neon-green: #11ffbd;
            --glass-bg: rgba(10, 10, 25, 0.75);
            --glass-border: rgba(0, 242, 254, 0.25);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0a23 0%, #020205 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            gap: 30px; color: white; padding: 20px; overflow: hidden;
        }

        /* 🛠️ لوحة التحكم الخارجية */
        .admin-panel {
            width: 360px; height: 620px; background: var(--glass-bg);
            backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); gap: 10px;
        }

        @media (max-width: 800px) {
            .admin-panel { display: none; } /* إخفاء لوحة التحكم لو فتحت الرابط من جوال حقيقي عشان تركز ع الشاشة */
        }

        .admin-panel h3 { color: var(--neon-cyan); text-align: center; font-weight: 800; font-size: 1.1rem; text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 0.7rem; color: #8a99ad; margin-bottom: 3px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px; background: rgba(5, 5, 15, 0.9);
            border: 1px solid var(--glass-border); border-radius: 8px; color: white; outline: none; font-size: 0.8rem;
        }

        .action-btn {
            width: 100%; padding: 10px; background: linear-gradient(135deg, var(--neon-cyan), #4facfe);
            border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
        }

        .terminal-box {
            flex-grow: 1; background: #020208; border: 1px solid rgba(17, 255, 189, 0.2);
            border-radius: 8px; padding: 10px; font-family: "Courier New", monospace;
            font-size: 0.65rem; color: var(--neon-green); overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
        }

        /* 📦 هيكل الهاتف */
        .phone-container {
            width: 380px; height: 620px; background: #050510; border-radius: 40px;
            display: flex; justify-content: center; align-items: center; position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
        }

        @media (max-width: 450px) {
            body { padding: 0; }
            .phone-container { width: 100vw; height: 100vh; border-radius: 0; }
            .phone { width: 100% !important; height: 100% !important; border: none !important; border-radius: 0 !important; }
        }

        .phone {
            width: 300px; height: 580px; background: #000; border: 10px solid #2e2e33;
            border-radius: 44px; position: relative; overflow: hidden;
        }

        .dynamic-island {
            width: 100px; height: 26px; background: #000; border-radius: 20px;
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center; font-size: 0.6rem; color: var(--neon-green);
        }
        .dynamic-island.expanded { width: 240px; height: 42px; background: #090915; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .phone-screen {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            padding: 15px 12px; background: linear-gradient(135deg, #10002b, #020514); position: relative;
        }
        
        .phone-screen.drag-over-active {
            border: 3px dashed var(--neon-cyan); background: linear-gradient(135deg, #1a003c, #050b24);
        }

        .lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #060612; z-index: 95; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 25px; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .spotlight-bar {
            margin-top: 35px; width: 100%; padding: 6px 12px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;
            font-size: 0.7rem; outline: none; text-align: center; transition: all 0.3s;
        }

        .home-screen {
            flex-grow: 1; margin-top: 15px; display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: max-content; gap: 15px 10px; overflow-y: auto; align-content: flex-start;
        }
        .home-screen::-webkit-scrollbar { display: none; }

        .app-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; position: relative; }
        .app-icon {
            width: 48px; height: 48px; border-radius: 14px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15); display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem;
        }
        .app-name { font-size: 0.58rem; color: rgba(255, 255, 255, 0.85); text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 🪟 محرك النوافذ المطور باللمس */
        .window-instance {
            position: absolute; width: 92%; height: 65%; background: #04040c;
            border: 1px solid rgba(0, 242, 254, 0.35); border-radius: 18px; z-index: 80;
            top: 20%; left: 4%; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); touch-action: none; /* يمنع المتصفح من سحب الصفحة الأصلية */
        }
        .window-header-bar {
            background: rgba(255,255,255,0.06); padding: 10px 12px; display: flex;
            justify-content: space-between; align-items: center; cursor: grab;
        }
        .window-title { font-size: 0.65rem; color: var(--neon-cyan); font-weight: bold; pointer-events: none; }
        .window-controls { display: flex; gap: 5px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
        .win-close { background: var(--neon-magenta); }
        .window-body { flex-grow: 1; width: 100%; height: 100%; overflow: auto; padding: 10px; background: #020206; }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.65rem; color: white; z-index: 40; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h3>مصفوفة التحكم والأوامر v15.0 🛸</h3>
        <div class="form-group">
            <label>اسم الأبليكيشن الجديد:</label>
            <input type="text" id="appNameInput" placeholder="مثال: آلة حاسبة كوانتوم">
        </div>
        <div class="form-group">
            <label>الأيقونة السحابية:</label>
            <select id="appIconSelect">
                <option value="🧮">🧮 آلة حاسبة سريعة</option>
                <option value="🛍️">🛍️ متجر إلكتروني مصغر</option>
                <option value="🕹️">🕹️ مصفوفة ألعاب جي بي يو</option>
                <option value="🌐">🌐 متصفح ويب داخلي</option>
            </select>
        </div>
        <div class="form-group">
            <label>حقن كود الجافاسكريبت (Safe Sandbox JS):</label>
            <textarea id="appCodeInput" rows="4" placeholder="// اكتب كود الـ JS الخاص بك هنا..."></textarea>
        </div>
        <button class="action-btn" onclick="addNewAppFromPanel()">حقن ورفع إلى سحابة جوجل ☁️🚀</button>
        
        <div class="terminal-box" id="systemTerminal">
            <div>[A0Z Touch Engine: ACTIVE]</div>
            <div>[Multi-Touch Windows Ready]</div>
        </div>
    </div>

    <div class="phone-container">
        <div class="phone">
            <div class="dynamic-island" id="island">A0Z Quantum</div>

            <div class="lock-screen" id="lockScreen">
                <h4 style="color: var(--neon-cyan); margin-bottom: 15px; font-size: 0.9rem;">نظام الدخول السيادي المعزول 🍏</h4>
                <div class="form-group" style="width:100%;">
                    <input type="text" id="loginUser" placeholder="أدخل الإيميل" style="text-align:center;" value="test@a0z.com">
                </div>
                <div class="form-group" style="width:100%;">
                    <input type="password" id="loginPass" placeholder="كلمة المرور" style="text-align:center;" value="123456">
                </div>
                <button class="action-btn" style="margin-top: 5px;" onclick="unlockPhone()">تحقق سحابي وولوج آمن 🔓</button>
            </div>

            <div class="phone-screen" id="phoneScreen" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleFileDrop(event)">
                <div class="status-bar">
                    <div id="liveClock">00:00</div>
                    <div><span id="liveBattery">--%</span> 🔋</div>
                </div>

                <input type="text" class="spotlight-bar" id="spotlightSearch" placeholder="🔍 بحث Spotlight أو ارمِ ملفاً..." oninput="filterCloudApps()">

                <div class="home-screen" id="homeScreen"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
            authDomain: "a0zai-56c3a.firebaseapp.com",
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "a0zai-56c3a",
            storageBucket: "a0zai-56c3a.firebasestorage.app",
            messagingSenderId: "198838438266",
            appId: "1:198838438266:web:379e782653f014a32a2ec3",
            measurementId: "G-85PDXY00J4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let currentUserUID = null; let globalAppsData = {}; 

        function printTerminal(text) {
            const term = document.getElementById('systemTerminal'); if(!term) return;
            const log = document.createElement('div'); log.innerText = `> ${text}`; term.appendChild(log);
            term.scrollTop = term.scrollHeight;
        }

        function unlockPhone() {
            const email = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            auth.signInWithEmailAndPassword(email, pass).then((u) => { execLoginSuccess(u.user.uid); })
            .catch(() => { auth.createUserWithEmailAndPassword(email, pass).then((u) => { execLoginSuccess(u.user.uid); }); });
        }

        function execLoginSuccess(uid) {
            currentUserUID = uid; document.getElementById('lockScreen').style.top = "-100%";
            triggerIslandNotification("تم الولوج! 🔓"); listenToUserApps(uid); 
        }

        // 🧠 محرك السحب باللمس والماوس الموحد (Hybrid Touch Drag Engine)
        let isDragging = false; let currentWin = null;
        let startX, startY, initialLeft, initialTop;

        function initDrag(e, winId) {
            isDragging = true; currentWin = document.getElementById(winId); focusWindow(winId);
            
            // قراءة الإحداثيات سواء كانت من إصبع اللمس (Touch) أو مؤشر الماوس (Mouse)
            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            
            startX = clientX; startY = clientY;
            const style = window.getComputedStyle(currentWin);
            initialLeft = parseInt(style.left, 10) || 0; initialTop = parseInt(style.top, 10) || 0;

            // ربط أحداث الحركة والرفع العالمية للمنصتين
            document.addEventListener('mousemove', processDrag);
            document.addEventListener('touchmove', processDrag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function processDrag(e) {
            if (!isDragging || !currentWin) return;
            if (e.type === 'touchmove') e.preventDefault(); // منع اهتزاز الشاشة في الجوال أثناء السحب

            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;

            currentWin.style.left = (initialLeft + (clientX - startX)) + 'px';
            currentWin.style.top = (initialTop + (clientY - startY)) + 'px';
        }

        function endDrag() {
            isDragging = false; currentWin = null;
            document.removeEventListener('mousemove', processDrag);
            document.removeEventListener('touchmove', processDrag);
        }

        // محرك إسقاط الملفات (Drop Engine)
        function handleDragOver(e) { e.preventDefault(); document.getElementById('phoneScreen').classList.add('drag-over-active'); }
        function handleDragLeave(e) { e.preventDefault(); document.getElementById('phoneScreen').classList.remove('drag-over-active'); }
        function handleFileDrop(e) {
            e.preventDefault(); document.getElementById('phoneScreen').classList.remove('drag-over-active');
            const files = e.dataTransfer.files; if (files.length === 0) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const name = files[0].name.replace(/\.[^/.]+$/, "");
                const newAppRef = database.ref('custom_apps/' + currentUserUID).push();
                newAppRef.set({ name, icon: "⚡", code: event.target.result }).then(() => { createWindowInstance(newAppRef.key); });
            };
            reader.readAsText(files[0]);
        }

        function createWindowInstance(key) {
            const app = globalAppsData[key]; if(!app) return;
            if(document.getElementById(`win_${key}`)) { focusWindow(`win_${key}`); return; }

            const win = document.createElement('div'); win.className = 'window-instance'; win.id = `win_${key}`;
            win.style.zIndex = 80 + document.querySelectorAll('.window-instance').length;
            win.setAttribute('onmousedown', `focusWindow('win_${key}')`);
            win.setAttribute('ontouchstart', `focusWindow('win_${key}')`); // دعم الفوكس باللمس

            // تفعيل السحب باللمس والماوس من شريط الهيدر
            win.innerHTML = `
                <div class="window-header-bar" onmousedown="initDrag(event, 'win_${key}')" ontouchstart="initDrag(event, 'win_${key}')">
                    <div class="window-title">${app.icon} ${app.name}</div>
                    <div class="window-controls"><button class="win-btn win-close" onclick="closeWindowInstance(event, '${key}')"></button></div>
                </div>
                <div class="window-body"><div id="container_${key}" style="width:100%; height:100%;"></div></div>
            `;

            document.getElementById('phoneScreen').appendChild(win);
            try {
                const appContainer = document.getElementById(`container_${key}`);
                const maskedWorkspace = new Function('container', 'window', 'document', 'firebase', 'database', 'auth', app.code);
                maskedWorkspace(appContainer, {}, {}, {}, {}, {});
            } catch (e) { printTerminal(`Error: ${e.message}`); }
        }

        function focusWindow(winId) { document.querySelectorAll('.window-instance').forEach(w => w.style.zIndex = 80); const activeWin = document.getElementById(winId); if(activeWin) activeWin.style.zIndex = 85; }
        function closeWindowInstance(event, key) { event.stopPropagation(); const win = document.getElementById(`win_${key}`); if(win) win.remove(); }
        function listenToUserApps(uid) { database.ref('custom_apps/' + uid).on('value', (s) => { globalAppsData = s.val() || {}; renderHomeScreen(globalAppsData); }); }
        function renderHomeScreen(appsList) { const hs = document.getElementById('homeScreen'); hs.innerHTML = ''; Object.keys(appsList).forEach((k) => { const app = appsList[k]; const item = document.createElement('div'); item.className = 'app-item'; item.setAttribute('onclick', `createWindowInstance('${k}')`); item.innerHTML = `<div class="app-icon">${app.icon}</div><div class="app-name">${app.name}</div>`; hs.appendChild(item); }); }
        function addNewAppFromPanel() { const name = document.getElementById('appNameInput').value.trim(); const icon = document.getElementById('appIconSelect').value; const code = document.getElementById('appCodeInput').value.trim(); if (!name || !code) return; database.ref('custom_apps/' + currentUserUID).push().set({ name, icon, code }); document.getElementById('appNameInput').value = ""; document.getElementById('appCodeInput').value = ""; }
        function filterCloudApps() { const query = document.getElementById('spotlightSearch').value.toLowerCase().trim(); const filtered = {}; Object.keys(globalAppsData).forEach(k => { if(globalAppsData[k].name.toLowerCase().includes(query)) filtered[k] = globalAppsData[k]; }); renderHomeScreen(filtered); }
        function triggerIslandNotification(text) { const island = document.getElementById('island'); island.innerText = text; island.classList.add('expanded'); setTimeout(() => { island.classList.remove('expanded'); island.innerText = "A0Z Quantum"; }, 2500); }
        setInterval(() => { const now = new Date(); let hh = now.getHours(); let mm = now.getMinutes(); document.getElementById('liveClock').innerText = `${hh < 10 ? '0'+hh : hh}:${mm < 10 ? '0'+mm : mm}`; }, 1000);
    </script>
</body>
</html>
