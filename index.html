<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-border { border: 1px solid #1a1a1a; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .glitch-text { text-shadow: 2px 2px #ca8a04; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col justify-center p-6">

    <div class="max-w-lg mx-auto w-full">
        <!-- Header -->
        <div class="mb-10 text-right">
            <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-black">NL.TEAM</h1>
            <p class="text-xs text-yellow-700 mt-2">// ACCESS_LEVEL: GHOST // DOETINCHEM</p>
        </div>

        <!-- Silent Selection -->
        <div class="space-y-2">
            <!-- صنف واحد كبداية -->
            <div class="group flex justify-between items-center p-4 border border-zinc-800 hover:border-yellow-600 cursor-pointer transition-all">
                <span class="text-lg font-bold group-hover:text-yellow-600 transition">01. سناك الطاقة</span>
                <span class="text-yellow-700 font-mono">4.50€</span>
            </div>
            <div class="group flex justify-between items-center p-4 border border-zinc-800 hover:border-yellow-600 cursor-pointer transition-all">
                <span class="text-lg font-bold group-hover:text-yellow-600 transition">02. مشروب الصمت</span>
                <span class="text-yellow-700 font-mono">3.50€</span>
            </div>
        </div>

        <!-- Action Area -->
        <div class="mt-12 flex justify-between items-center border-t border-zinc-900 pt-6">
            <button class="bg-yellow-600 text-black px-8 py-3 font-black text-xl hover:bg-white transition-all">EXECUTE</button>
            <div class="text-right">
                <p class="text-xs text-zinc-600">TOTAL</p>
                <p class="text-2xl font-mono text-yellow-600">8.00 €</p>
            </div>
        </div>
    </div>

</body>
</html>
