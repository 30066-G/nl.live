<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z - FULLSCREEN OPS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --stone-dark: #1a1108;
            --accent: #ff4500;
            --panel-bg: rgba(0, 0, 0, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden; /* يمنع السكرول الخارجي */
        }

        /* تأثير الطبقة السينمائية */
        body::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 5;
        }

        /* شاشة الدخول */
        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        .game-logo {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(50px, 10vw, 80px);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 5px 5px 0 #4a2c0f;
            margin-bottom: 40px; text-align: center;
        }

        .zuma-btn-container {
            display: flex; flex-direction: column; gap: 15px; width: 300px;
        }

        .zuma-input {
            background: rgba(0,0,0,0.9); border: 3px solid #4a2c0f;
            border-radius: 50px; padding: 18px; color: var(--gold);
            font-family: 'Cinzel'; text-align: center; font-size: 18px; outline: none;
        }

        .btn-stone {
            background: linear-gradient(145deg, #8b7355, #4a2c0f);
            border: 4px solid #261a15; border-radius: 10px;
            padding: 18px; color: var(--gold); font-family: 'Cinzel';
            font-weight: 900; font-size: 22px; cursor: pointer;
            text-transform: uppercase; box-shadow: 5px 5px 0px #000;
            transition: 0.1s;
        }

        .btn-stone:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #000; }

        /* واجهة الشات ملء الشاشة */
        #main-ui {
            display: none; position: fixed; inset: 0; z-index: 50;
            flex-direction: column; background: var(--panel-bg);
        }

        .temple-header {
            background: #2a1b0a; padding: 15px; text-align: center;
            border-bottom: 3px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            /* ستايل البردية القديمة */
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .msg-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--accent);
            padding: 15px; border-radius: 0 10px 10px 0;
            animation: fadeIn 0.3s ease; word-break: break-all;
            max-width: 90%;
        }

        .msg-user { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block; }
        .msg-text { color: #f1e5ac; font-size: 18px; line-height: 1.4; }

        /* لوحة التحكم السفلية */
        .control-panel {
            background: #1a1108; padding: 15px; display: flex; gap: 10px;
            border-top: 2px solid #4a2c0f;
        }

        #msg-input {
            flex: 1; background: #000; border: 2px solid #4a2c0f;
            color: #fff; padding: 15px; font-size: 16px; font-family: 'Cinzel';
            border-radius: 5px; outline: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="auth-screen">
        <h1 class="game-logo">A0Z</h1>
        <div class="zuma-btn-container">
            <input id="room-input" class="zuma-input" type="text" placeholder="REALM ID">
            <input id="nick-input" class="zuma-input" type="text" placeholder="WARRIOR NAME">
            <button class="btn-stone" onclick="enterRoom()">ENTER REALM</button>
        </div>
    </div>

    <!-- واجهة الشات الكاملة -->
    <div id="main-ui">
        <div class="temple-header">
            <span style="letter-spacing: 2px;">CHANNEL: <span id="room-display" style="color:white">---</span></span>
        </div>
        
        <div id="chat-container"></div>

        <div class="control-panel">
            <input id="msg-input" type="text" placeholder="Write your message...">
            <button class="btn-stone" style="padding: 10px 25px; font-size: 16px; box-shadow: 2px 2px 0 #000;" onclick="sendMsg()">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            
            if (!roomID || !myNick) return alert("Fill your destiny!");

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex'; // استخدام flex لملء الشاشة
            document.getElementById('room-display').innerText = roomID;
            
            listenForMsgs();
        };

        function listenForMsgs() {
            onChildAdded(ref(db, `rooms/${roomID}/chat`), (snap) => {
                const data = snap.val();
                const container = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `
                    <span class="msg-user">${data.user}</span>
                    <span class="msg-text">${data.text}</span>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/chat`), { 
                user: myNick, 
                text: input.value.trim(),
                time: Date.now()
            });
            input.value = '';
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendMsg();
        });
    </script>
</body>
</html>
