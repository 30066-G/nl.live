<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z - TEMPLE STREAM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --stone: #4a2c0f;
            --accent: #ff4500;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
        }

        /* الفراشات المتحركة */
        .wildlife { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .creature { position: absolute; font-size: 20px; animation: roam 15s linear infinite; opacity: 0.7; }
        @keyframes roam {
            0% { transform: translate(-10vw, 20vh); }
            100% { transform: translate(110vw, 50vh); }
        }
        @keyframes flap { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(0.3); } }
        .butterfly { display: inline-block; animation: flap 0.4s ease-in-out infinite; }

        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
        }

        /* شاشة الفيديو (اللوحة السحرية) */
        #magic-tablet {
            width: 90%; max-width: 400px; margin: 10px auto;
            border: 4px solid var(--stone); background: #000;
            box-shadow: 0 0 15px var(--gold); overflow: hidden;
            display: none; /* تظهر فقط عند وجود فيديو */
        }

        .video-wrapper { position: relative; width: 100%; padding-top: 177%; /* نسبة 9:16 */ }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* واجهة الشات */
        #main-ui { display: none; position: fixed; inset: 0; z-index: 50; flex-direction: column; background: rgba(0, 0, 0, 0.8); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { background: rgba(255, 255, 255, 0.07); border-left: 4px solid var(--accent); padding: 10px; animation: slideIn 0.3s ease; }
        
        .control-panel { background: #1a1108; padding: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 2px solid var(--stone); }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; background: #000; border: 2px solid var(--stone); color: #fff; padding: 12px; font-family: 'Cinzel'; outline: none; }
        
        .btn-stone {
            background: linear-gradient(145deg, #8b7355, #4a2c0f); border: 2px solid #261a15;
            padding: 10px; color: var(--gold); cursor: pointer; font-family: 'Cinzel';
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="wildlife">
        <div class="creature" style="top: 20%;"><span class="butterfly">🦋</span></div>
        <div class="creature" style="animation-delay: 4s; top: 50%;"><span class="butterfly">🦋</span></div>
    </div>

    <div id="auth-screen">
        <h1 style="font-size: 60px; text-shadow: 3px 3px #000;">A0Z</h1>
        <input id="room-input" style="margin-bottom: 10px; text-align: center;" placeholder="REALM ID">
        <input id="nick-input" style="margin-bottom: 10px; text-align: center;" placeholder="WARRIOR NAME">
        <button class="btn-stone" onclick="enterRoom()">ENTER TEMPLE</button>
    </div>

    <div id="main-ui">
        <!-- شاشة عرض الفيديو -->
        <div id="magic-tablet">
            <div class="video-wrapper" id="video-frame">
                <!-- الفيديو سيظهر هنا -->
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="control-panel">
            <div class="input-group">
                <input id="msg-input" placeholder="Write a message...">
                <button class="btn-stone" onclick="sendMsg()">CAST</button>
            </div>
            <div class="input-group">
                <input id="tiktok-input" placeholder="Paste TikTok Link...">
                <button class="btn-stone" style="background: #ff4500;" onclick="sendVideo()">SYNC VIDEO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            if (!roomID || !myNick) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            listenForData();
        };

        function listenForData() {
            // مراقبة الرسائل والفيديوهات
            onChildAdded(ref(db, `rooms/${roomID}/data`), (snap) => {
                const data = snap.val();
                
                if (data.type === "video") {
                    // تحديث شاشة الفيديو للكل
                    document.getElementById('magic-tablet').style.display = 'block';
                    document.getElementById('video-frame').innerHTML = `
                        <iframe src="https://www.tiktok.com/embed/v2/${data.vId}" allowfullscreen></iframe>
                    `;
                } else {
                    // إضافة رسالة عادية
                    const div = document.createElement('div');
                    div.className = 'msg-box';
                    div.innerHTML = `<small>${data.user}</small><br>${data.text}`;
                    document.getElementById('chat-container').appendChild(div);
                    document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
                }
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/data`), { user: myNick, text: input.value, type: "text" });
            input.value = '';
        };

        window.sendVideo = () => {
            const input = document.getElementById('tiktok-input');
            const url = input.value.trim();
            const vId = url.split('/video/')[1]?.split('?')[0];
            if (!vId) return alert("Invalid TikTok Link!");
            
            push(ref(db, `rooms/${roomID}/data`), { user: myNick, vId: vId, type: "video" });
            input.value = '';
        };
    </script>
</body>
</html>
