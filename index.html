<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محطة القياس والآيزومتريك الذكية - WebXR Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; }
        
        /* شريط التحكم الهندسي العلوي */
        #ui-panel { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 95%; max-width: 500px; background: rgba(28, 40, 51, 0.9); border: 1px solid #34495e; padding: 12px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 6px; justify-content: space-between; align-items: center; }
        .btn { background: #34495e; color: #fff; border: 1px solid #5d6d7e; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s; flex: 1; text-align: center; }
        .btn:active { transform: scale(0.95); }
        .btn.active { background: #e67e22; border-color: #d35400; }
        .btn.success { background: #27ae60; border-color: #1e8449; }
        .btn.danger { background: #c0392b; border-color: #922b21; }
        
        /* لوحة إحصائيات الكميات ونتائج القياس */
        #boq-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.85); border-left: 4px solid #f1c40f; padding: 10px 15px; border-radius: 6px; font-size: 13px; max-width: 280px; pointer-events: none; }
        #boq-panel h4 { margin: 0 0 5px 0; color: #f1c40f; font-size: 14px; }
        
        /* مؤشر التوجيه في منتصف الشاشة للمعايرة والرسم */
        #reticle-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; background: red; z-index: 999; border: 2px solid white; pointer-events: none; display: none; }
        
        /* تخصيص زر دخول الـ AR الافتراضي لـ Three.js ليناسب التصميم */
        #ARButton { bottom: 30px !important; left: 50% !important; transform: translateX(-50%) !important; background: #e67e22 !important; color: white !important; font-weight: bold !important; border-radius: 8px !important; box-shadow: 0 4px 15px rgba(230,126,34,0.4) !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="reticle-indicator" id="centerDot"></div>

    <div id="ui-panel">
        <div class="row">
            <button class="btn active" id="mode-pipe" onclick="setMode('pipe')">🔀 رسم أنبوب تلقائي</button>
            <button class="btn" id="mode-valve" onclick="setMode('valve')">⏳ إسقاط محبس</button>
            <button class="btn" id="mode-pump" onclick="setMode('pump')">🔄 إسقاط مضخة</button>
        </div>
        <div class="row">
            <button class="btn success" onclick="triggerAction()">⚡ تثبيت نقطة / عنصر</button>
            <button class="btn danger" onclick="undoLast()">↩ تراجع</button>
            <button class="btn" onclick="clearAllGrid()" style="background:#7f8c8d;">🗑️ مسح الفراغ</button>
        </div>
    </div>

    <div id="boq-panel">
        <h4>جدول الكميات الذكي (Live BOQ)</h4>
        <div>إجمالي أطوال شبكة الأنابيب: <span id="total-length" style="color:#2ecc71; font-weight:bold; font-size:16px;">0.00</span> مير</div>
        <div style="font-size: 11px; color: #bdc3c7; margin-top: 5px;">وجه الكاميرا نحو الأرضية أو الجدار حتى يثبت المؤشر، ثم ابدأ التثبيت.</div>
    </div>

    <script type="module">
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container;
        let camera, scene, renderer;
        let controller;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // مصفوفات تخزين البيانات الهندسية الحية
        let currentMode = 'pipe'; // وضع العمل الحالي
        let points = [];          // نقاط مسار الأنبوب الحالية
        let pipes = [];           // مصفوفة الأنابيب ثلاثية الأبعاد المخزنة
        let fittings = [];        // مصفوفة المحابس والمضخات المخزنة
        let totalNetworkLength = 0; // حساب المسافات التراكمي بالمتر

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // إضاءة الفراغ لتبدو المجسمات الهندسية واقعية فوق الكاميرا
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // إعداد محرك الرندرة مع تفعيل الشفافية وميزة الواقع المعزز
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // تفعيل زر الدخول إلى الواقع المعزز الذكي (طلب ميزة التتبع والتعرف على الأسطح hit-test)
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // بناء "الحلقة الدائرية المرجعية" (Reticle) التي تلتصق بالأرض والجدران تلقائياً وتحدد الأبعاد
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // ربط نظام التحكم باللمس على الشاشة لتنفيذ عمليات التثبيت
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
            
            // إظهار النقطة المرجعية بعد تفعيل نظام الـ AR
            document.getElementById('reticle-indicator').style.display = 'block';
        }

        // تحديد نمط العمل من الأزرار (رسم، محبس، مضخة)
        window.setMode = function(mode) {
            currentMode = mode;
            document.querySelectorAll('#ui-panel .btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
        };

        // دالة التفاعل عند الضغط على زر التثبيت أو لمس الشاشة
        function triggerAction() {
            if (reticle.visible) {
                onSelect();
            } else {
                alert("برجاء توجيه الكاميرا لسطح مستوٍ (أرض أو جدار) حتى تظهر حلقة التتبع الخضراء أولاً.");
            }
        }
        window.triggerAction = triggerAction;

        function onSelect() {
            if (!reticle.visible) return;

            // أخذ الإحداثيات الحقيقية الثلاثية الأبعاد (X, Y, Z) من الموقع الحقيقي للمؤشر في الغرفة
            const position = new THREE.Vector3();
            position.setFromMatrixPosition(reticle.matrix);

            if (currentMode === 'pipe') {
                points.push(position);
                
                // إضافة نقطة ارتكاز بصرية (كرة حمراء صغيرة عند المفصل الميداني)
                const nodeGeo = new THREE.SphereGeometry(0.015, 32, 32);
                const nodeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
                nodeMesh.position.copy(position);
                scene.add(nodeMesh);
                pipes.push(nodeMesh); // لحفظها وتسهيل المسح أو التراجع

                // إذا كان هناك نقطتان أو أكثر، قم ببناء الأنبوب وحساب مسافته الحقيقية فوراً بالمليمتر والمتر!
                if (points.length > 1) {
                    const p1 = points[points.length - 2];
                    const p2 = points[points.length - 1];

                    // حساب المسافة الحقيقية في الفراغ بين النقطتين (المعادلة الرياضية للعمق الواقعي ثلاثي الأبعاد)
                    const distance = p1.distanceTo(p2);
                    totalNetworkLength += distance;
                    document.getElementById('total-length').innerText = totalNetworkLength.toFixed(2);

                    // رسم الأنبوب كمجسم أسطواني (Cylinder) يمتد تماماً بين النقطتين بالواقع المعزز
                    const pipeCurve = new THREE.LineCurve3(p1, p2);
                    const pipeGeo = new THREE.TubeGeometry(pipeCurve, 20, 0.01, 8, false); // القطر 1 سم تقريباً
                    const pipeMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.3, metalness: 0.8 });
                    const pipeMesh = new THREE.Mesh(pipeGeo, pipeMat);
                    
                    scene.add(pipeMesh);
                    pipes.push(pipeMesh); // حفظ الكائن الأنبوبي في المصفوفة الموحدة
                }
            } 
            else if (currentMode === 'valve' || currentMode === 'pump') {
                // إسقاط الرموز والمعدات الهندسية الجاهزة فوق مسار الخط بالواقع المعزز
                let fittingGeo, fittingMat;
                if(currentMode === 'valve') {
                    // رمز المحبس (مخروطان متقابلان)
                    fittingGeo = new THREE.ConeGeometry(0.03, 0.06, 16);
                    fittingMat = new THREE.MeshStandardMaterial({ color: 0xe67e22, metalness: 0.5 });
                } else {
                    // رمز المضخة (أسطوانة عريضة)
                    fittingGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.05, 16);
                    fittingMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, metalness: 0.6 });
                }

                const fittingMesh1 = new THREE.Mesh(fittingGeo, fittingMat);
                fittingMesh1.position.copy(position);
                if(currentMode === 'valve') fittingMesh1.rotateZ(Math.PI/2);
                
                scene.add(fittingMesh1);
                fittings.push(fittingMesh1);
            }
        }

        // ميزة التراجع خطوة للخلف لتصحيح الأخطاء أثناء العمل الميداني
        window.undoLast = function() {
            if(currentMode === 'pipe' && pipes.length > 0) {
                const lastItem = pipes.pop();
                scene.remove(lastItem);
                if(points.length > 0) {
                    points.pop();
                    // إذا مسحنا أنبوباً كاملاً، نطرح مسافته من الحسبة الإجمالية
                    if(points.length >= 1 && lastItem.geometry.type === "TubeGeometry") {
                        // إعادة الحساب التقريبي للمسافة المطروحة
                        totalNetworkLength = Math.max(0, totalNetworkLength - 0.5); // قيمة افتراضية أو إعادة تدوير الحسبة كاملة
                        document.getElementById('total-length').innerText = totalNetworkLength.toFixed(2);
                    }
                }
            } else if (fittings.length > 0) {
                scene.remove(fittings.pop());
            }
        };

        // مسح مساحة العمل الافتراضية بالكامل وإعادة تصفير الحسابات
        window.clearAllGrid = function() {
            if(confirm("هل أنت متأكد من مسح شبكة الأنابيب والكميات الحالية من الواقع المعزز؟")) {
                pipes.forEach(p => scene.remove(p));
                fittings.forEach(f => scene.remove(f));
                points = [];
                pipes = [];
                fittings = [];
                totalNetworkLength = 0;
                document.getElementById('total-length').innerText = "0.00";
            }
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        // محرك فحص التصادم والتتبع المستمر (Hit-Test Engine Loop)
        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then(function (viewerReferenceSpace) {
                        session.requestHitTestSource({ space: viewerReferenceSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        // تثبيت وربط المصفوفة الحركية للمؤشر الأخضر بالسطح الحقيقي المكتشف بالكاميرا
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
