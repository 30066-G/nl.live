<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap');

        :root {
            --neon: #00d4ff;
            --bg: #0a0a0a;
            --panel: rgba(15, 15, 15, 0.98);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); font-family: 'Roboto Mono', monospace;
            color: white; overflow: hidden;
        }

        /* Tech Background */
        .grid {
            position: fixed; inset: 0;
            background-image: radial-gradient(var(--neon) 0.5px, transparent 0.5px);
            background-size: 30px 30px; opacity: 0.1; z-index: -1;
        }

        /* Central Search */
        .main-gateway {
            position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 600px; text-align: center;
        }

        .main-gateway h1 {
            font-family: 'Orbitron'; font-size: 3rem; letter-spacing: 15px;
            color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0;
        }

        .search-bar {
            width: 100%; padding: 18px; margin-top: 30px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--neon);
            border-radius: 5px; color: white; font-size: 1.1rem;
            outline: none; box-shadow: inset 0 0 10px rgba(0,212,255,0.1);
        }

        /* Internal Browser Window (The "No Exit" Logic) */
        #internal-browser {
            position: fixed; inset: 50px; 
            background: #fff; border: 2px solid var(--neon);
            border-radius: 10px; display: none; z-index: 1000;
            box-shadow: 0 0 50px #000;
        }

        .browser-header {
            background: #222; padding: 10px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--neon);
        }

        .close-btn { cursor: pointer; color: #ff4500; font-weight: bold; padding: 0 10px; }

        /* Dock System */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; background: var(--panel);
            padding: 15px 40px; border-radius: 50px; border: 1px solid var(--neon);
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }

        .dock-item { font-size: 24px; cursor: pointer; transition: 0.3s; }
        .dock-item:hover { transform: scale(1.3); text-shadow: 0 0 10px var(--neon); }

        /* Small Side Panels */
        #chat-widget {
            position: fixed; right: 20px; bottom: 100px;
            width: 280px; height: 350px; background: var(--panel);
            border: 1px solid var(--neon); border-radius: 10px;
            display: none; flex-direction: column;
        }

        #video-mini {
            position: fixed; top: 20px; left: 20px;
            width: 180px; height: 300px; border: 1px solid var(--neon);
            display: none; background: #000;
        }

    </style>
</head>
<body>

    <div class="grid"></div>

    <!-- Main Gateway -->
    <div class="main-gateway">
        <h1>A0Z</h1>
        <input type="text" class="search-bar" placeholder="Enter Command or URL..." id="os-search">
    </div>

    <!-- Internal Browser (The Magic Box) -->
    <div id="internal-browser">
        <div class="browser-header">
            <span style="font-size: 10px; color: var(--neon);">ENCRYPTED_STREAM_ACTIVE</span>
            <span class="close-btn" onclick="closeBrowser()">[X] CLOSE</span>
        </div>
        <iframe id="browser-frame" src="" style="width:100%; height:calc(100% - 40px); border:none;"></iframe>
    </div>

    <!-- Video Mini -->
    <div id="video-mini">
        <div id="v-frame" style="width:100%; height:100%;"></div>
    </div>

    <!-- Chat Widget -->
    <div id="chat-widget">
        <div style="padding: 10px; border-bottom: 1px solid #333; font-size: 10px;">COMM_LINK: ACTIVE</div>
        <div id="logs" style="flex:1; overflow:auto; padding:10px; font-size: 12px;"></div>
        <input id="msg" style="background:transparent; border:none; border-top:1px solid #333; color:white; padding:10px;" placeholder="Type message...">
    </div>

    <!-- Navigation Dock -->
    <div class="dock">
        <div class="dock-item" onclick="toggleChat()">📧</div>
        <div class="dock-item" onclick="summonVideo()">📽️</div>
        <div class="dock-item" onclick="openInternalLink('https://www.bing.com')">🌐</div>
        <div class="dock-item" onclick="location.reload()">🔄</div>
    </div>

    <script type="module">
        // Firebase Logic (Same as before)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomID = "GLOBAL_NODE";

        // Internal Browser Control
        window.openInternalLink = (url) => {
            const browser = document.getElementById('internal-browser');
            const frame = document.getElementById('browser-frame');
            frame.src = url;
            browser.style.display = 'block';
        };

        window.closeBrowser = () => {
            document.getElementById('internal-browser').style.display = 'none';
            document.getElementById('browser-frame').src = '';
        };

        // Search Redirect to Internal
        document.getElementById('os-search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const query = e.target.value;
                // Using Bing because it allows Iframe embedding more often than Google
                openInternalLink(`https://www.bing.com/search?q=${encodeURIComponent(query)}`);
            }
        });

        window.toggleChat = () => {
            const c = document.getElementById('chat-widget');
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        };

        window.summonVideo = () => {
            const url = prompt("TikTok URL:");
            const vId = url?.match(/(\d{17,21})/)?.[1];
            if(vId) push(ref(db, `rooms/${roomID}/data`), { user: 'Admin', vId: vId, type: "video" });
        };

        onChildAdded(ref(db, `rooms/${roomID}/data`), (snap) => {
            const data = snap.val();
            if(data.type === 'video') {
                document.getElementById('video-mini').style.display = 'block';
                document.getElementById('v-frame').innerHTML = `<iframe src="https://www.tiktok.com/embed/v2/${data.vId}" style="width:100%; height:100%; border:none;"></iframe>`;
            } else {
                const logs = document.getElementById('logs');
                logs.innerHTML += `<div>> ${data.text}</div>`;
                logs.scrollTop = logs.scrollHeight;
            }
        });

        document.getElementById('msg').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                push(ref(db, `rooms/${roomID}/data`), { text: e.target.value, type: "text" });
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
