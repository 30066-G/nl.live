<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');
        :root {
            --gold: #ffd700;
            --stone-base: #3d2b1f;
            --stone-dark: #1a1108;
            --etch: rgba(0, 0, 0, 0.8);
            --clay: #8b7355;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
        }

        /* --- طبقات الخلفية الحية --- */
        .bg-wrap {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            width: 110%; height: 110%;
            position: absolute; top: -5%; left: -5%;
            background: url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center;
            background-size: cover;
            animation: cinematicMove 25s ease-in-out infinite alternate;
            filter: brightness(0.6) contrast(1.2);
        }

        @keyframes cinematicMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -2%); }
        }

        .fog-layer {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.4;
            animation: fogFlow 40s linear infinite;
            pointer-events: none; z-index: 1;
        }

        @keyframes fogFlow {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 2;
        }

        /* --- تصميم الحجر والفخار --- */
        .stone-surface {
            background-color: var(--stone-base);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            border: 2px solid var(--stone-dark);
            box-shadow: 
                inset 3px 3px 8px var(--etch),
                inset -2px -2px 5px rgba(255,255,255,0.05),
                5px 5px 15px rgba(0,0,0,0.6);
        }

        .btn-etch {
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Cinzel';
            font-weight: 900;
            color: rgba(255, 215, 0, 0.6);
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-etch:active {
            transform: scale(0.97);
            box-shadow: inset 6px 6px 12px #000;
            color: var(--gold);
        }

        .input-clay {
            background: var(--stone-dark);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 1px solid var(--stone-base);
            color: var(--gold);
            padding: 15px;
            outline: none;
            border-radius: 4px;
            font-family: 'Cinzel';
            box-shadow: inset 0 0 10px #000;
        }

        /* --- الشاشات --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(50px, 15vw, 100px);
            color: var(--clay);
            text-shadow: 2px 2px 0px #000, 0 0 20px rgba(255,215,0,0.2);
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #main-ui {
            display: none; position: fixed; inset: 0; z-index: 50;
            flex-direction: column;
        }

        .header {
            padding: 15px; text-align: center;
            background: rgba(26, 17, 8, 0.9);
            border-bottom: 3px solid var(--clay);
            position: relative;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.3);
        }

        /* رسالة كأنها نقش حجري */
        .msg-tablet {
            background: rgba(61, 43, 31, 0.8);
            background-image: url('https://www.transparenttextures.com/patterns/p6-dark.png');
            padding: 15px;
            border-left: 4px solid var(--clay);
            max-width: 85%;
            animation: slideIn 0.4s ease;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .footer {
            padding: 15px;
            background: var(--stone-dark);
            display: flex; gap: 10px;
            border-top: 2px solid var(--clay);
        }

    </style>
</head>
<body>

    <div class="bg-wrap">
        <div class="bg-image"></div>
        <div class="fog-layer"></div>
        <div class="vignette"></div>
    </div>

    <div id="auth-screen">
        <div class="logo">A0Z LIVE</div>
        <div style="display:flex; flex-direction:column; gap:15px; width:85%; max-width:320px;">
            <input id="room-input" class="input-clay" placeholder="ETCH ROOM ID">
            <input id="nick-input" class="input-clay" placeholder="WARRIOR NAME">
            <button class="stone-surface btn-etch" style="height:60px; font-size:20px;" onclick="enterRoom()">UNSEAL GATE</button>
        </div>
    </div>

    <!-- واجهة الدردشة -->
    <div id="main-ui">
        <div class="header">
            <button class="stone-surface btn-etch" style="position:absolute; left:10px; top:10px; padding:8px 15px; font-size:12px;" onclick="exitRoom()">EXIT</button>
            <div id="room-display" style="letter-spacing:5px; color:var(--clay); font-weight:bold;">---</div>
        </div>

        <div id="chat-container"></div>

        <div class="footer">
            <input id="msg-input" class="input-clay" style="flex:1;" placeholder="Etch your message...">
            <button class="stone-surface btn-etch" style="padding:0 25px;" onclick="sendMsg()">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        // إعدادات القاعدة
        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID, chatRef;

        // الدخول للمهمة
        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            if (!roomID || !myNick) return;

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('room-display').innerText = `REALM: ${roomID.toUpperCase()}`;
            
            listenForMsgs();
        };

        // الخروج
        window.exitRoom = () => {
            if (chatRef) off(chatRef);
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        };

        // استقبال الرسائل لايف
        function listenForMsgs() {
            chatRef = ref(db, `rooms/${roomID}/chat`);
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const container = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = 'msg-tablet';
                div.innerHTML = `
                    <div style="font-size:10px; color:var(--clay); margin-bottom:5px;">${data.user}</div>
                    <div style="color:#f1e5ac; font-size:16px; line-height:1.4;">${data.text}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        // إرسال الرسالة
        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/chat`), { 
                user: myNick, 
                text: input.value.trim(),
                timestamp: Date.now()
            });
            input.value = '';
        };

        // دعم زر Enter
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendMsg();
        });
    </script>
</body>
</html>
