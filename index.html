<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NL | Pro Radar V7</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #00ffa3;
            --danger: #ff4d4d;
            --bg: #000000;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }

        /* ستايل الخريطة المحترف */
        #map {
            width: 100%;
            height: 380px;
            border-radius: 28px;
            margin-bottom: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 25px rgba(0, 255, 163, 0.15);
        }

        .box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--glass-border);
        }

        h2 {
            text-align: center;
            background: linear-gradient(45deg, #00ffa3, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin-top: 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        .sos-btn { background: rgba(255, 77, 77, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .sos-btn:active { background: var(--danger); color: white; }

        #chat-box {
            height: 250px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
        }

        .msg { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; margin-bottom: 8px; border-bottom-left-radius: 2px; }
        .msg b { color: var(--primary); font-size: 10px; display: block; margin-bottom: 3px; }

        .user-dot {
            width: 12px; height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 163, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(0, 255, 163, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 163, 0); }
        }

        .input-area { display: flex; gap: 8px; }
        .send-btn { background: var(--primary); color: black; width: 80px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-ui" class="box">
        <h2>NL RADAR</h2>
        <input id="email-input" type="email" placeholder="E-MAIL">
        <input id="pass-input" type="password" placeholder="WACHTWOORD">
        <input id="nick-input" placeholder="DISPLAY NAME (NL-000)" maxlength="12">
        <button onclick="window.handleAuth('login')" style="background:var(--primary); margin-bottom:10px;">INLOGGEN</button>
        <button onclick="window.handleAuth('reg')" style="background:transparent; color:white; border:1px solid var(--glass-border);">REGISTREREN</button>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="status-bar">
            <span id="zone-txt" style="color:var(--primary)">ZONE: SCANNING...</span>
            <span id="dist-txt">OFFLINE</span>
        </div>

        <div id="map"></div>

        <div class="action-btns">
            <button class="sos-btn" onclick="window.sendSOS()">🆘 SOS</button>
            <button style="background:rgba(0, 212, 255, 0.1); color:#00d4ff; border:1px solid #00d4ff;" onclick="window.reCenter()">📍 MY LOCATION</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input id="msg-input" placeholder="Bericht sturen...">
            <button class="send-btn" onclick="window.sendMsg()">SEND</button>
        </div>
        
        <button onclick="window.logout()" style="margin-top:20px; background:transparent; color:gray; font-size:10px; border:none;">UITLOGGEN</button>
    </div>
</div>

onAuthStateChanged(auth, (user) => {
    if (user) {
        myUID = user.uid;
        myNick = user.displayName || "GUEST";
        document.getElementById("login-ui").style.display = "none";
        document.getElementById("app-ui").style.display = "block";
        initSystem();
    } else {
        document.getElementById("login-ui").style.display = "block";
        document.getElementById("app-ui").style.display = "none";
    }
});

function initSystem() {
    if (!map) {
        map = L.map('map').setView([52.1326, 5.2913], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        for(let city in streetData) {
            for(let street in streetData[city]) {
                L.circle([streetData[city][street].lat, streetData[city][street].lon], {
                    color: '#00d4ff', weight: 1, fillOpacity: 0.1, radius: 309
                }).addTo(map);
            }
        }
    }

    navigator.geolocation.watchPosition((p) => {
        currentPos.lat = p.coords.latitude;
        currentPos.lon = p.coords.longitude;
        const coords = [currentPos.lat, currentPos.lon];

        if (!userMarker) {
            userMarker = L.marker(coords, { icon: L.divIcon({className: 'user-dot'}) }).addTo(map);
            map.setView(coords, 15);
        } else {
            userMarker.setLatLng(coords);
        }

        checkZone();

        const locRef = ref(db, `v7/locations/${myUID}`);
        set(locRef, { n: myNick, lat: currentPos.lat, lon: currentPos.lon, t: Date.now() });
        onDisconnect(locRef).remove();

    }, null, { enableHighAccuracy: true });
    onValue(ref(db, `v7/locations`), (snap) => {
        const users = snap.val() || {};
        for (let id in otherMarkers) { if (!users[id]) { map.removeLayer(otherMarkers[id]); delete otherMarkers[id]; } }
        for (let id in users) {
            if (id === myUID) continue;
            const u = users[id];
            if (otherMarkers[id]) {
                otherMarkers[id].setLatLng([u.lat, u.lon]);
            } else {
                otherMarkers[id] = L.marker([u.lat, u.lon], {
                    icon: L.divIcon({ className: 'user-dot', html: `<b style="position:absolute; top:-20px; color:white; font-size:9px;">${u.n}</b>` })
                }).addTo(map);
            }
        }
    });

    onChildAdded(ref(db, `v7/global_chat`), (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.n}:</b> ${d.m}`;
        const box = document.getElementById("chat-box");
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
}

function checkZone() {
    let minD = Infinity;
    let found = null;

    for(let city in streetData) {
        for(let street in streetData[city]) {
            const d = calcDist(currentPos.lat, currentPos.lon, streetData[city][street].lat, streetData[city][street].lon);
            if(d < minD) { minD = d; found = street; }
        }
    }

    if (minD <= 309) {
        activeStreet = found;
        document.getElementById("zone-txt").textContent = `ZONE: ${found}`;
        document.getElementById("dist-txt").textContent = `📡 ACTIVE`;
    } else {
        activeStreet = null;
        document.getElementById("zone-txt").textContent = `OUTSIDE ZONE`;
        document.getElementById("dist-txt").textContent = `${Math.round(minD)}m AWAY`;
    }
}

window.sendMsg = () => {
    if (!activeStreet) return alert("Je bent te ver weg! (أنت بعيد جداً عن الشوارع المدعومة)");
    const input = document.getElementById("msg-input");
    if (input.value.trim()) {
        push(ref(db, `v7/global_chat`), { n: myNick, m: input.value, t: Date.now() });
        input.value = "";
    }
};

window.sendSOS = () => {
    push(ref(db, `v7/global_chat`), { n: "🚨 " + myNick, m: "HELP! I need assistance at my location!", t: Date.now() });
};

window.reCenter = () => map.setView([currentPos.lat, currentPos.lon], 16);

window.handleAuth = async (m) => {
    const e = document.getElementById("email-input").value;
    const p = document.getElementById("pass-input").value;
    const n = document.getElementById("nick-input").value;
    try {
        if(m==='reg') {
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await updateProfile(r.user, { displayName: n });
        } else await signInWithEmailAndPassword(auth, e, p);
    } catch(err) { alert(err.message); }
};

window.logout = () => { remove(ref(db, `v7/locations/${myUID}`)); signOut(auth); };

function calcDist(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
