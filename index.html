<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهندس الواقع المعزز AR Pro - النسخة الذهبية</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background-color: #000; color: white; -webkit-user-select: none; user-select: none; }

        /* شريط الأدوات العلوي */
        #toolbar { position: absolute; top: 0; width: 100%; z-index: 200; background: rgba(44, 62, 80, 0.95); padding: 10px; display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tool-btn { background: #34495e; color: white; border: 1px solid #7f8c8d; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .tool-btn.active { background: #e67e22; border-color: #d35400; }
        .tool-btn.camera-on { background: #27ae60; }
        .tool-btn.stamp { background: #2ecc71; border-color: #27ae60; }
        .tool-btn.danger { background: #e74c3c; border-color: #c0392b; }

        .control-group { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 8px; }
        label { color: #fff; font-size: 12px; }
        input[type="range"] { width: 60px; accent-color: #3498db; }

        /* حاوية الكاميرا والرسم */
        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background-color: #2c3e50; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; width: 100%; height: 100%; touch-action: none; background: transparent; }

        /* لوحة D-Pad */
        #dpad { position: fixed; bottom: 30px; right: 20px; z-index: 300; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 24px; backdrop-filter: blur(5px); }
        .dpad-grid { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 8px; }
        .dpad-btn { background: #3498db; color: white; border: none; border-radius: 14px; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dpad-btn:active { background: #e67e22; }
        .dpad-btn.center { background: #e74c3c; font-size: 12px; }

        /* ملخص الحسابات */
        #stats { position: fixed; top: 70px; left: 15px; z-index: 100; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="tool-btn camera-on" onclick="toggleCam()" id="btn-cam">📷 تشغيل الكاميرا</button>
        <button class="tool-btn active" onclick="setTool('pipe')" id="btn-pipe">🖊️ خط</button>
        <button class="tool-btn" onclick="setTool('text')" id="btn-text">🔤 نص</button>
        <button class="tool-btn stamp" onclick="stamp('cube')">📦 مكعب</button>
        <button class="tool-btn stamp" onclick="stamp('rhombus-top')">🔷 معين أفقي</button>
        <button class="tool-btn stamp" onclick="stamp('valve')">⏳ محبس</button>
        
        <div class="control-group">
            <label>🎨 <input type="color" id="colorPicker" value="#F1C40F" style="width:25px; height:25px; border:none;"></label>
            <label>📐 <input type="range" id="sizeSlider" min="2" max="10" value="6"></label>
            <label>↔ الطول <input type="range" id="lengthSlider" min="40" max="150" value="80"></label>
        </div>
        
        <button class="tool-btn danger" onclick="clearAll()" style="margin-right: auto;">🗑️ مسح الكل</button>
        <button class="tool-btn" onclick="exportData()" style="background:#27ae60">💾 حفظ وتصدير</button>
    </div>

    <div id="stats">مجموع الأطوال (Bill of Quantities): <span id="total">0</span> مم</div>

    <div id="canvas-container">
        <video id="v" autoplay playsinline></video>
        <canvas id="c"></canvas>
    </div>

    <div id="dpad">
        <div class="dpad-grid">
            <button class="dpad-btn" style="visibility:hidden"></button>
            <button class="dpad-btn" onclick="draw('o')">↑</button>
            <button class="dpad-btn" style="visibility:hidden"></button>
            
            <button class="dpad-btn" onclick="draw('h')">↖</button>
            <button class="dpad-btn center">●</button>
            <button class="dpad-btn" onclick="draw('r')">↗</button>
            
            <button class="dpad-btn" onclick="draw('l')">↙</button>
            <button class="dpad-btn" onclick="draw('u')">↓</button>
            <button class="dpad-btn" onclick="draw('v')">↘</button>
        </div>
    </div>

    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d'), v = document.getElementById('v');
        let currentTool = 'pipe';
        let elements = [];
        let tap = {x: window.innerWidth/2, y: window.innerHeight/2}; // نقطة الارتكاز الحمراء
        let totalLen = 0;

        function resize() { c.width = window.innerWidth; c.height = window.innerHeight; render(); }
        window.onresize = resize; resize();

        async function toggleCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                v.srcObject = stream;
            } catch(e) { alert("يجب السماح للكاميرا للعمل"); }
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${tool}`).classList.add('active');
        }

        function draw(dir) {
            const lengthSlider = document.getElementById('lengthSlider').value;
            let target = {...tap};
            const angle = 30 * Math.PI / 180;
            
            if(dir=='o') target.y -= lengthSlider;
            else if(dir=='u') target.y += lengthSlider;
            else if(dir=='r') { target.x += lengthSlider * Math.cos(angle); target.y -= lengthSlider * Math.sin(angle); }
            else if(dir=='l') { target.x -= lengthSlider * Math.cos(angle); target.y += lengthSlider * Math.sin(angle); }
            else if(dir=='h') { target.x -= lengthSlider * Math.cos(angle); target.y -= lengthSlider * Math.sin(angle); }
            else if(dir=='v') { target.x += lengthSlider * Math.cos(angle); target.y += lengthSlider * Math.sin(angle); }
            
            // إضافة عنصر جديد إلى المصفوفة الموحدة
            elements.push({
                type: 'pipe',
                from: {...tap}, to: {...target},
                length: lengthSlider,
                color: document.getElementById('colorPicker').value,
                size: parseInt(document.getElementById('sizeSlider').value),
                textData: currentTool === 'text' ? prompt("أدخل القياس الهندسي:") : null
            });
            
            if (currentTool === 'pipe' || currentTool === 'text') {
                totalLen += parseInt(lengthSlider);
                document.getElementById('total').innerText = totalLen;
            }

            // ترحيل تلقائي لنقطة الصفر
            tap = target;
            render();
        }

        function stamp(shapeType) {
            const size = document.getElementById('lengthSlider').value * 0.8;
            elements.push({
                type: 'shape',
                shapeType: shapeType,
                x: tap.x,
                y: tap.y,
                size: size,
                color: document.getElementById('colorPicker').value,
                lineWidth: parseInt(document.getElementById('sizeSlider').value)
            });
            render();
        }

        function render() {
            ctx.clearRect(0,0, c.width, c.height);
            // رسم كل العناصر المخزنة في المصفوفة
            elements.forEach(el => {
                ctx.strokeStyle = el.color; ctx.fillStyle = el.color; ctx.lineWidth = el.size || el.lineWidth;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';

                if (el.type === 'pipe') {
                    ctx.beginPath(); ctx.moveTo(el.from.x, el.from.y); ctx.lineTo(el.to.x, el.to.y); ctx.stroke();
                    if(el.textData) {
                        ctx.font = "bold 16px Arial";
                        ctx.fillText(el.textData, (el.from.x + el.to.x)/2 + 10, (el.from.y + el.to.y)/2 - 10);
                    }
                } else if (el.type === 'shape') {
                    renderGeometryShapes(el);
                }
            });
            // رسم نقطة الارتكاز الحمراء
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(tap.x, tap.y, 12, 0, 7); ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        }

        function renderGeometryShapes(el) {
            const s = el.size; const cos30 = Math.cos(Math.PI / 6); const sin30 = Math.sin(Math.PI / 6);
            ctx.save(); ctx.translate(el.x, el.y); ctx.strokeStyle = el.color; ctx.lineWidth = el.lineWidth;

            if (el.shapeType === 'cube') {
                ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s * cos30, -s + s * sin30); ctx.lineTo(0, 0); ctx.lineTo(-s * cos30, -s + s * sin30); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s * cos30, -s + s * sin30); ctx.lineTo(-s * cos30, s * sin30); ctx.lineTo(0, s); ctx.lineTo(0, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(s * cos30, -s + s * sin30); ctx.lineTo(s * cos30, s * sin30); ctx.lineTo(0, s); ctx.stroke();
            } else if (el.shapeType === 'rhombus-top') {
                ctx.beginPath(); ctx.moveTo(0, -s/2); ctx.lineTo(s * cos30, 0); ctx.lineTo(0, s/2); ctx.lineTo(-s * cos30, 0); ctx.closePath(); ctx.stroke();
            } else if (el.shapeType === 'valve') {
                ctx.beginPath(); ctx.moveTo(-16, -10); ctx.lineTo(16, 10); ctx.lineTo(16, -10); ctx.lineTo(-16, 10); ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        }

        function exportData() {
            const tempC = document.createElement('canvas'); tempC.width = c.width; tempC.height = c.height;
            const tCtx = tempC.getContext('2d');
            tCtx.drawImage(v, 0, 0); tCtx.drawImage(c, 0, 0);
            const link = document.createElement('a'); link.download = 'AR_Project.png'; link.href = tempC.toDataURL(); link.click();
        }

        function clearAll() { if (confirm("مسح الكل والبدء من جديد؟")) { elements = []; totalLen = 0; document.getElementById('total').innerText = 0; tap = {x: window.innerWidth/2, y: window.innerHeight/2}; render(); } }
        c.addEventListener('pointerdown', (e) => { tap = {x: e.clientX, y: e.clientY}; render(); });
    </script>
</body>
</html>
