<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الرسم الميداني - ISO PRO</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }

        /* شريط الأدوات */
        #toolbar { position: absolute; top: 0; width: 100%; height: 80px; background: #2c3e50; padding: 10px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        .btn { background: #34495e; border: 1px solid #7f8c8d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* منطقة الورقة */
        #container { width: 100vw; height: 100vh; position: relative; background: white; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* جدول المواصفات السفلي */
        #footer-table { position: absolute; bottom: 0; width: 100%; height: 120px; background: #f9f9f9; border-top: 2px solid #333; z-index: 500; padding: 10px; color: #333; font-size: 10px; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button class="btn" onclick="drawMode()">رسم خط</button>
        <button class="btn" onclick="addLabel()">إضافة نص</button>
        <button class="btn" style="background:#27ae60" onclick="savePlan()">تصدير كـ PNG</button>
    </div>

    <div id="container">
        <canvas id="gridCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
    </div>

    <div id="footer-table">
        <strong>FUTUR-STAHL SPEZIFIKATION</strong>
        <div style="display:flex; gap:10px; margin-top:5px;">
            <div>اسم المشروع: <input type="text" value="Rentschler"></div>
            <div>نوع العزل: <input type="text" value="K-Flex"></div>
        </div>
    </div>

    <script>
        const gc = document.getElementById('gridCanvas');
        const dc = document.getElementById('drawCanvas');
        const gCtx = gc.getContext('2d');
        const dCtx = dc.getContext('2d');

        function init() {
            gc.width = dc.width = window.innerWidth;
            gc.height = dc.height = window.innerHeight;
            drawIsometricGrid();
        }

        function drawIsometricGrid() {
            gCtx.strokeStyle = "#d1d1d1";
            for(let i=0; i<gc.width; i+=25) {
                gCtx.beginPath(); gCtx.moveTo(i,0); gCtx.lineTo(i, gc.height); gCtx.stroke();
            }
            // رسم خطوط مائلة للآيزومتريك (بسيط للتمثيل)
            gCtx.beginPath(); gCtx.moveTo(0,0); gCtx.lineTo(gc.width, gc.height); gCtx.stroke();
        }

        function drawMode() { alert("وضع الرسم: اضغط على الورقة لرسم المسار."); }
        function addLabel() { prompt("اكتب القياس:"); }
        
        function savePlan() {
            const dataURL = dc.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = "Isometric_Plan.png";
            link.href = dataURL;
            link.click();
        }

        window.onload = init;
    </script>
</body>
</html>
