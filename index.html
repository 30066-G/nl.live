<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z - LIVING TEMPLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --magic: #8a2be2;
            --fire: #ff4500;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
        }

        .temple-bg {
            position: fixed; inset: 0;
            background: url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center;
            background-size: cover;
            animation: templeBreath 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes templeBreath {
            0%, 100% { transform: scale(1.0); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        .wildlife { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        
        .butterfly {
            position: absolute;
            font-size: 25px;
            animation: flyAround 12s linear infinite, wings 0.3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        @keyframes flyAround {
            0% { left: -10%; top: 20%; transform: rotate(0deg); }
            25% { left: 30%; top: 80%; transform: rotate(45deg); }
            50% { left: 60%; top: 10%; transform: rotate(-20deg); }
            75% { left: 90%; top: 50%; transform: rotate(10deg); }
            100% { left: 110%; top: 20%; transform: rotate(0deg); }
        }

        @keyframes wings {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(0.2); }
        }

        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
        }

        #magic-tablet {
            width: 85%; max-width: 320px; margin: 20px auto;
            border: 3px solid var(--magic);
            border-radius: 15px;
            display: none;
            position: relative;
            animation: pulseMagic 3s ease-in-out infinite;
            background: #000;
        }

        @keyframes pulseMagic {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 20px var(--magic); }
            50% { transform: translateY(-10px); box-shadow: 0 0 40px var(--fire); }
        }

        .video-wrapper { position: relative; width: 100%; padding-top: 177%; overflow: hidden; border-radius: 12px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #main-ui { display: none; position: fixed; inset: 0; z-index: 50; flex-direction: column; background: rgba(0,0,0,0.6); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-box { 
            background: rgba(138, 43, 226, 0.2); 
            border-left: 4px solid var(--gold); 
            padding: 12px; 
            border-radius: 0 10px 10px 0;
            animation: emerge 0.5s ease-out;
        }

        @keyframes emerge {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .control-panel { padding: 20px; background: rgba(20, 10, 30, 0.95); border-top: 2px solid var(--gold); }
        
        input { 
            width: 100%; background: transparent; border: 1px solid var(--gold); 
            color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 5px;
            font-family: 'Cinzel'; box-sizing: border-box;
        }

        .btn-mystic {
            width: 100%; padding: 15px; border: none; 
            background: linear-gradient(45deg, var(--magic), var(--fire));
            color: #fff; font-family: 'Cinzel'; font-weight: bold;
            cursor: pointer; border-radius: 5px; transition: 0.3s;
        }

        .screen-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            75% { transform: translate(5px, -5px); }
        }
    </style>
</head>
<body>

    <div class="temple-bg"></div>

    <div class="wildlife">
        <div class="butterfly" style="animation-duration: 15s; color: cyan;">🦋</div>
        <div class="butterfly" style="animation-delay: -5s; animation-duration: 18s; color: magenta;">✨</div>
        <div class="butterfly" style="animation-delay: -2s; animation-duration: 12s; color: gold;">🦋</div>
    </div>

    <div id="auth-screen">
        <h1 style="font-size: 50px; margin-bottom: 20px;">A0Z</h1>
        <input id="room-input" placeholder="REALM ID">
        <input id="nick-input" placeholder="WARRIOR NAME">
        <button class="btn-mystic" onclick="enterRoom()">AWAKEN THE SPIRIT</button>
    </div>

    <div id="main-ui">
        <div id="magic-tablet">
            <div class="video-wrapper" id="video-frame"></div>
        </div>
        <div id="chat-container"></div>
        <div class="control-panel">
            <input id="msg-input" placeholder="Whisper to the forest...">
            <button class="btn-mystic" onclick="sendMsg()">CAST SPELL</button>
            <input id="tiktok-input" placeholder="Summon vision (Link)..." style="margin-top: 10px;">
            <button class="btn-mystic" style="background: var(--gold); color: #000;" onclick="sendVideo()">SUMMON</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            if (!roomID || !myNick) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            listenForData();
        };

        function triggerShake() {
            const ui = document.getElementById('main-ui');
            ui.classList.add('screen-shake');
            setTimeout(() => ui.classList.remove('screen-shake'), 400);
        }

        function listenForData() {
            onChildAdded(ref(db, `rooms/${roomID}/data`), (snap) => {
                const data = snap.val();
                const chat = document.getElementById('chat-container');
                triggerShake();

                if (data.type === "video") {
                    document.getElementById('magic-tablet').style.display = 'block';
                    document.getElementById('video-frame').innerHTML = `<iframe src="https://www.tiktok.com/embed/v2/${data.vId}" allowfullscreen></iframe>`;
                } else {
                    const div = document.createElement('div');
                    div.className = 'msg-box';
                    div.innerHTML = `<small>${data.user}</small><br>${data.text}`;
                    chat.appendChild(div);
                }
                chat.scrollTop = chat.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/data`), { user: myNick, text: input.value, type: "text" });
            input.value = '';
        };

        window.sendVideo = () => {
            const input = document.getElementById('tiktok-input');
            const match = input.value.match(/(\d{17,21})/);
            if (!match) return alert("Vision failed! Need full link.");
            push(ref(db, `rooms/${roomID}/data`), { user: myNick, vId: match[1], type: "video" });
            input.value = '';
        };
    </script>
</body>
</html>
