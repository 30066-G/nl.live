<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A0Z</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@900&display=swap');

        :root {
            --gold: #ffd700;
            --stone: #4a2c0f;
            --accent: #ff4500;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('https://img.freepik.com/free-photo/ancient-temple-ruins-jungle-generative-ai_188544-12595.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            overflow: hidden;
        }

        /* الفراشات المتحركة */
        .wildlife {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        .creature {
            position: absolute;
            font-size: 20px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            animation: roam 15s linear infinite;
            opacity: 0.7;
        }

        @keyframes roam {
            0% { transform: translate(-10vw, 20vh) rotate(0deg); }
            25% { transform: translate(30vw, 10vh) rotate(20deg); }
            50% { transform: translate(60vw, 40vh) rotate(-10deg); }
            75% { transform: translate(90vw, 20vh) rotate(15deg); }
            100% { transform: translate(110vw, 50vh) rotate(0deg); }
        }

        /* زر العودة الصخري */
        .btn-back {
            position: absolute; top: 10px; left: 10px;
            background: linear-gradient(to bottom, #555, #222);
            border: 2px solid #000; border-radius: 5px;
            color: #ccc; padding: 5px 12px; font-size: 12px;
            cursor: pointer; z-index: 100; font-family: 'Cinzel';
        }

        /* الطبقة السينمائية والضباب */
        body::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 5;
        }

        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
        }

        .game-logo {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(60px, 12vw, 90px);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 6px 6px 0 #000;
            margin-bottom: 40px; animation: float 3s ease-in-out infinite;
        }

        .zuma-btn-container { display: flex; flex-direction: column; gap: 15px; width: 300px; }

        .zuma-input {
            background: rgba(0,0,0,0.8); border: 3px solid var(--stone);
            border-radius: 50px; padding: 18px; color: var(--gold);
            font-family: 'Cinzel'; text-align: center; font-size: 18px; outline: none;
        }

        .btn-stone {
            background: linear-gradient(145deg, #8b7355, #4a2c0f);
            border: 4px solid #261a15; border-radius: 8px;
            padding: 18px; color: var(--gold); font-family: 'Cinzel';
            font-weight: 900; font-size: 20px; cursor: pointer;
            text-transform: uppercase; box-shadow: 4px 4px 0px #000; transition: 0.1s;
        }

        .btn-stone:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }

        /* واجهة الشات ملء الشاشة */
        #main-ui {
            display: none; position: fixed; inset: 0; z-index: 50;
            flex-direction: column; background: rgba(0, 0, 0, 0.8);
        }

        .temple-header {
            background: #2a1b0a; padding: 20px; text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .msg-box {
            background: rgba(255, 255, 255, 0.07); border-left: 4px solid var(--accent);
            padding: 12px; border-radius: 0 8px 8px 0; animation: slideIn 0.3s ease;
        }

        .msg-user { color: var(--gold); font-size: 11px; margin-bottom: 4px; display: block; }
        .msg-text { color: #f1e5ac; font-size: 17px; }

        .control-panel { background: #1a1108; padding: 15px; display: flex; gap: 8px; border-top: 2px solid var(--stone); }

        #msg-input { flex: 1; background: #000; border: 2px solid var(--stone); color: #fff; padding: 15px; font-family: 'Cinzel'; border-radius: 5px; outline: none; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- عناصر الحياة البرية (الحيوانات) -->
    <div class="wildlife">
        <div class="creature" style="animation-delay: 0s; top: 20%;">🦋</div>
        <div class="creature" style="animation-delay: 5s; top: 40%; font-size: 25px;">🦜</div>
        <div class="creature" style="animation-delay: 2s; top: 70%;">🦋</div>
        <div class="creature" style="animation-delay: 8s; top: 10%; font-size: 30px;">🦅</div>
    </div>

    <!-- شاشة الدخول -->
    <div id="auth-screen">
        <h1 class="game-logo">A0Z</h1>
        <div class="zuma-btn-container">
            <input id="room-input" class="zuma-input" type="text" placeholder="REALM ID">
            <input id="nick-input" class="zuma-input" type="text" placeholder="WARRIOR NAME">
            <button class="btn-stone" onclick="enterRoom()">ADVENTURE</button>
        </div>
    </div>

    <div id="main-ui">
        <button class="btn-back" onclick="exitRoom()">EXIT REALM</button>
        
        <div class="temple-header">
            <span id="room-display" style="letter-spacing: 5px; font-size: 20px;">---</span>
        </div>
        
        <div id="chat-container"></div>

        <div class="control-panel">
            <input id="msg-input" type="text" placeholder="Write spell...">
            <button class="btn-stone" style="padding: 10px 20px; font-size: 14px;" onclick="sendMsg()">CAST</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
            projectId: "a0zai-56c3a", 
            databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myNick, roomID, chatRef;

        window.enterRoom = () => {
            roomID = document.getElementById('room-input').value.trim();
            myNick = document.getElementById('nick-input').value.trim();
            if (!roomID || !myNick) return;

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('room-display').innerText = roomID.toUpperCase();
            
            listenForMsgs();
        };

        window.exitRoom = () => {
            if (chatRef) off(chatRef);
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        };

        function listenForMsgs() {
            chatRef = ref(db, `rooms/${roomID}/chat`);
            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const container = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = 'msg-box';
                div.innerHTML = `
                    <span class="msg-user">${data.user}</span>
                    <span class="msg-text">${data.text}</span>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomID}/chat`), { user: myNick, text: input.value.trim() });
            input.value = '';
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendMsg();
        });
    </script>
</body>
</html>
