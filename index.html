<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO FIELD PRO X</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-user-select:none;
user-select:none
}

body{
overflow:hidden;
background:#1b1b1b
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#top{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:#232323;
border-bottom:2px solid #444;
padding:7px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center
}

.btn{
background:#303030;
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
font-size:12px;
font-weight:700;
cursor:pointer
}

.btn:active{
background:#ff9800
}

.box{
background:#2e2e2e;
padding:6px 10px;
border-radius:10px;
display:flex;
gap:6px;
align-items:center;
color:#fff;
font-size:12px
}

input{
background:#111;
border:1px solid #555;
border-radius:6px;
padding:5px;
color:#fff
}

input[type=text]{
width:100px;
text-align:center
}

input[type=range]{
width:90px
}

#side{
position:fixed;
right:10px;
top:95px;
display:flex;
flex-direction:column;
gap:6px;
z-index:1000;
max-height:80vh;
overflow:auto;
padding-right:2px
}

.sym{
background:#303030;
border:none;
color:#fff;
padding:9px;
border-radius:10px;
font-size:11px;
font-weight:700;
cursor:pointer;
min-width:110px
}

.sym:active{
background:#ff9800
}

#panel{
position:fixed;
left:10px;
top:95px;
background:rgba(20,20,20,.94);
border:2px solid #ff9800;
border-radius:16px;
padding:15px;
width:260px;
color:#fff;
z-index:1000;
backdrop-filter:blur(8px)
}

#panel h3{
color:#ff9800;
margin-bottom:10px
}

#panel div{
margin-top:8px;
font-size:13px
}

#zoom{
position:fixed;
bottom:18px;
left:18px;
background:rgba(0,0,0,.75);
padding:8px 12px;
border-radius:12px;
color:#fff;
z-index:1000
}

#tools{
position:fixed;
bottom:20px;
right:20px;
display:grid;
grid-template-columns:repeat(3,55px);
grid-template-rows:repeat(3,55px);
gap:6px;
z-index:1000
}

.nav{
border:none;
border-radius:12px;
background:#2d89ef;
color:#fff;
font-size:22px;
font-weight:bold
}

.nav:active{
background:#ff9800
}

.center{
background:#d84315;
font-size:11px
}

#cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:14px;
height:14px;
border:2px solid red;
border-radius:50%;
z-index:999;
pointer-events:none
}

</style>
</head>

<body>

<div id="top">

<button class="btn" onclick="resetCam()">Zentrieren</button>
<button class="btn" onclick="undo()">Undo</button>
<button class="btn" onclick="redo()">Redo</button>
<button class="btn" onclick="clearAll()">Löschen</button>
<button class="btn" onclick="exportPNG()">Export</button>

<div class="box">
<span>Projekt</span>
<input type="text" id="project" value="Rentschler">
</div>

<div class="box">
<span>Isolierung</span>
<input type="text" id="iso" value="K-Flex">
</div>

<div class="box">
<span>Rohr</span>
<input type="text" id="pipe" value="Ø220">
</div>

<div class="box">
<span>Länge</span>
<input type="range" id="len" min="20" max="250" value="60">
<span id="lenText">350 mm</span>
</div>

<div class="box">
<span>Text</span>
<input type="range" id="font" min="10" max="28" value="15">
</div>

</div>

<div id="side">

<button class="sym" onclick="pick('valve')">Ventil</button>
<button class="sym" onclick="pick('pump')">Pumpe</button>
<button class="sym" onclick="pick('flange')">Flansch</button>
<button class="sym" onclick="pick('gauge')">Messgerät</button>
<button class="sym" onclick="pick('elbow')">Bogen</button>
<button class="sym" onclick="pick('tee')">T-Stück</button>
<button class="sym" onclick="pick('filter')">Filter</button>
<button class="sym" onclick="pick('fan')">Lüfter</button>
<button class="sym" onclick="pick('tank')">Tank</button>
<button class="sym" onclick="pick('arrow')">Pfeil</button>

</div>

<div id="panel">

<h3>Technische Daten</h3>

<div>Gesamtlänge: <span id="sum">0</span> mm</div>
<div>Rohr: <span id="pipeInfo">Ø220</span></div>
<div>Projekt: <span id="projectInfo">Rentschler</span></div>
<div>Zoom: <span id="zoomInfo">100%</span></div>

</div>

<div id="zoom">
Zoom: <span id="zoomText">100%</span>
</div>

<div id="cross"></div>

<div id="tools">

<div></div>
<button class="nav" onclick="manual('up')">↑</button>
<div></div>

<button class="nav" onclick="manual('lu')">↖</button>
<button class="nav center" onclick="resetCam()">ISO</button>
<button class="nav" onclick="manual('ru')">↗</button>

<button class="nav" onclick="manual('ld')">↙</button>
<button class="nav" onclick="manual('down')">↓</button>
<button class="nav" onclick="manual('rd')">↘</button>

</div>

<canvas id="bg"></canvas>
<canvas id="cv"></canvas>

<script>

const bg=document.getElementById("bg")
const cv=document.getElementById("cv")

const g=bg.getContext("2d")
const ctx=cv.getContext("2d")

let w=innerWidth
let h=innerHeight

const dpr=devicePixelRatio||1

function setup(c,x){

c.width=w*dpr
c.height=h*dpr

c.style.width=w+"px"
c.style.height=h+"px"

x.scale(dpr,dpr)

}

setup(bg,g)
setup(cv,ctx)

let cam={
x:0,
y:0,
z:1
}

let current={
x:w/2,
y:h/2-50
}

let objects=[]
let redoStack=[]

let total=0

let selected=null

const ratio=5.833

function resize(){

w=innerWidth
h=innerHeight

setup(bg,g)
setup(cv,ctx)

render()

}

onresize=resize

function drawPaper(){

g.clearRect(0,0,w,h)

g.fillStyle="#ffffff"
g.fillRect(0,0,w,h)

g.save()

g.translate(cam.x,cam.y)
g.scale(cam.z,cam.z)

const step=24
const a=Math.PI/6

g.strokeStyle="rgba(110,160,190,.28)"
g.lineWidth=.7

for(let i=-7000;i<7000;i+=step){

g.beginPath()
g.moveTo(i,-7000)
g.lineTo(i+7000*Math.tan(a),7000)
g.stroke()

g.beginPath()
g.moveTo(i,-7000)
g.lineTo(i-7000*Math.tan(a),7000)
g.stroke()

}

for(let y=-7000;y<7000;y+=step){

g.beginPath()
g.moveTo(-7000,y)
g.lineTo(7000,y)
g.stroke()

}

g.restore()

footer()

}

function footer(){

const fy=h-120

g.fillStyle="#fafafa"
g.fillRect(0,fy,w,120)

g.strokeStyle="#222"
g.lineWidth=2

g.beginPath()
g.moveTo(0,fy)
g.lineTo(w,fy)
g.stroke()

const cols=[21,27,33,42,48,60,76,89,114,140,168,219,273,324,457]

const cw=w/(cols.length+2)

g.font="10px Segoe UI"
g.fillStyle="#111"

for(let i=0;i<cols.length;i++){

const x=(i+1)*cw

g.beginPath()
g.moveTo(x,fy)
g.lineTo(x,fy+40)
g.stroke()

g.fillText(cols[i],x+7,fy+15)
g.fillText(Math.round(cols[i]*1.37),x+4,fy+33)

}

g.beginPath()
g.moveTo(0,fy+20)
g.lineTo(w,fy+20)
g.stroke()

g.beginPath()
g.moveTo(0,fy+40)
g.lineTo(w,fy+40)
g.stroke()

g.fillStyle="#ff9800"
g.font="bold 13px Segoe UI"

g.fillText("Frech Dämmtechnik",w-210,fy+65)

g.fillStyle="#111"
g.font="11px Segoe UI"

g.fillText("Projekt: "+project.value,w-210,fy+87)
g.fillText("Isolierung: "+iso.value,w-210,fy+104)

}

function render(){

drawPaper()

ctx.clearRect(0,0,w,h)

ctx.save()

ctx.translate(cam.x,cam.y)
ctx.scale(cam.z,cam.z)

objects.forEach(o=>{

ctx.strokeStyle="#1f1f1f"
ctx.lineWidth=3
ctx.lineCap="round"

ctx.beginPath()
ctx.moveTo(o.a.x,o.a.y)
ctx.lineTo(o.b.x,o.b.y)
ctx.stroke()

const mx=(o.a.x+o.b.x)/2
const my=(o.a.y+o.b.y)/2

ctx.save()

ctx.translate(mx,my)
ctx.rotate(o.angle)

ctx.font="bold "+font.value+"px Segoe UI"
ctx.textAlign="center"

ctx.strokeStyle="#fff"
ctx.lineWidth=5

ctx.strokeText(o.len,0,-10)

ctx.fillStyle="#111"
ctx.fillText(o.len,0,-10)

ctx.restore()

if(o.sym){

drawSymbol(o.sym,o.b.x,o.b.y)

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,6,0,Math.PI*2)
ctx.fill()

ctx.restore()

pipeInfo.innerText=pipe.value
projectInfo.innerText=project.value

}

function drawSymbol(type,x,y){

ctx.save()

ctx.translate(x,y)

ctx.strokeStyle="#0c8b4f"
ctx.fillStyle="#0c8b4f"
ctx.lineWidth=2.5

const s=14

if(type==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(type==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(type==="flange"){

ctx.beginPath()
ctx.moveTo(0,-s)
ctx.lineTo(s,0)
ctx.lineTo(0,s)
ctx.lineTo(-s,0)
ctx.closePath()
ctx.stroke()

}

if(type==="gauge"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(s/2,-s/2)
ctx.stroke()

}

if(type==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

if(type==="tee"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,0)
ctx.moveTo(0,0)
ctx.lineTo(0,-s)
ctx.stroke()

}

if(type==="filter"){

ctx.strokeRect(-s,-s,s*2,s*2)

ctx.beginPath()
ctx.moveTo(-s,-s)
ctx.lineTo(s,s)
ctx.stroke()

}

if(type==="fan"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

for(let i=0;i<3;i++){

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(
Math.cos(i*2*Math.PI/3)*s,
Math.sin(i*2*Math.PI/3)*s
)
ctx.stroke()

}

}

if(type==="tank"){

ctx.strokeRect(-s,-s,s*2,s*2)

}

if(type==="arrow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,0)
ctx.lineTo(s-5,-5)
ctx.moveTo(s,0)
ctx.lineTo(s-5,5)
ctx.stroke()

}

ctx.restore()

}

function addPipe(angle){

const len=parseFloat(document.getElementById("len").value)

const nx=current.x+Math.cos(angle)*len
const ny=current.y+Math.sin(angle)*len

const mm=Math.round(len*ratio)

objects.push({

a:{x:current.x,y:current.y},
b:{x:nx,y:ny},
len:mm,
angle:angle,
sym:selected

})

redoStack=[]

selected=null

current.x=nx
current.y=ny

total+=mm

sum.innerText=total

render()

}

function manual(d){

if(d==="up")addPipe(-Math.PI/2)
if(d==="down")addPipe(Math.PI/2)
if(d==="ru")addPipe(-Math.PI/6)
if(d==="lu")addPipe(-5*Math.PI/6)
if(d==="rd")addPipe(Math.PI/6)
if(d==="ld")addPipe(5*Math.PI/6)

}

function pick(s){

selected=s

}

function undo(){

if(objects.length===0)return

redoStack.push(objects.pop())

total=0

objects.forEach(o=>total+=o.len)

sum.innerText=total

render()

}

function redo(){

if(redoStack.length===0)return

objects.push(redoStack.pop())

total=0

objects.forEach(o=>total+=o.len)

sum.innerText=total

render()

}

function clearAll(){

objects=[]
redoStack=[]

total=0

sum.innerText=0

render()

}

function resetCam(){

cam={
x:0,
y:0,
z:1
}

zoomText.innerText="100%"
zoomInfo.innerText="100%"

render()

}

function exportPNG(){

const out=document.createElement("canvas")

out.width=bg.width
out.height=bg.height

const o=out.getContext("2d")

o.drawImage(bg,0,0)
o.drawImage(cv,0,0)

const a=document.createElement("a")

a.download="ISO_FIELD_PRO.png"

a.href=out.toDataURL()

a.click()

}

len.oninput=function(){

lenText.innerText=
Math.round(this.value*ratio)+" mm"

}

let pointers={}
let startDist=0
let startZoom=1

let startX=0
let startY=0

let baseX=0
let baseY=0

cv.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=cam.z

}

if(ids.length===1){

startX=e.clientX
startY=e.clientY

baseX=cam.x
baseY=cam.y

}

})

cv.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

const nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

const target=Math.min(
Math.max(startZoom*(nd/startDist),.35),
7
)

cam.z+=((target-cam.z)*0.18)

zoomText.innerText=Math.round(cam.z*100)+"%"
zoomInfo.innerText=Math.round(cam.z*100)+"%"

render()

}

if(ids.length===1){

cam.x=baseX+(e.clientX-startX)
cam.y=baseY+(e.clientY-startY)

render()

}

})

cv.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

})

cv.addEventListener("wheel",e=>{

e.preventDefault()

const delta=e.deltaY<0?1.08:.92

cam.z*=delta

cam.z=Math.min(Math.max(cam.z,.35),7)

zoomText.innerText=Math.round(cam.z*100)+"%"
zoomInfo.innerText=Math.round(cam.z*100)+"%"

render()

},{passive:false})

render()

</script>

</body>
</html>
