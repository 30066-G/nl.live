<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ISO Basic</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-user-select:none;
user-select:none
}

body{
overflow:hidden;
background:#111
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none
}

#top{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
gap:6px;
padding:8px;
background:#222;
z-index:10;
flex-wrap:wrap
}

button,input{
height:38px;
border:none;
border-radius:8px;
padding:0 12px;
font-size:13px
}

button{
background:#333;
color:#fff
}

button:active{
background:#ff9800
}

input[type=range]{
padding:0;
width:120px
}

#info{
position:fixed;
left:10px;
top:70px;
background:rgba(0,0,0,.8);
color:#fff;
padding:12px;
border-radius:12px;
z-index:10;
font-size:13px
}

#info div{
margin-top:5px
}

</style>
</head>

<body>

<div id="top">

<button onclick="undo()">Undo</button>
<button onclick="clearAll()">Löschen</button>
<button onclick="resetView()">Reset</button>

<input type="range" id="len" min="20" max="200" value="60">

<button onclick="setSymbol('valve')">Ventil</button>
<button onclick="setSymbol('pump')">Pumpe</button>
<button onclick="setSymbol('elbow')">Bogen</button>

</div>

<div id="info">
<div>Gesamt: <span id="sum">0</span> mm</div>
<div>Zoom: <span id="zoom">100%</span></div>
</div>

<canvas id="bg"></canvas>
<canvas id="cv"></canvas>

<script>

const bg=document.getElementById("bg")
const cv=document.getElementById("cv")

const g=bg.getContext("2d")
const ctx=cv.getContext("2d")

let w=innerWidth
let h=innerHeight

function size(){

bg.width=cv.width=w
bg.height=cv.height=h

drawPaper()
render()

}

addEventListener("resize",size)

let cam={
x:0,
y:0,
z:1
}

let objects=[]

let current={
x:w/2,
y:h/2
}

let total=0

let selected=null

function drawPaper(){

g.clearRect(0,0,w,h)

g.fillStyle="#fff"
g.fillRect(0,0,w,h)

g.save()

g.translate(cam.x,cam.y)
g.scale(cam.z,cam.z)

g.strokeStyle="rgba(120,160,180,.25)"
g.lineWidth=1

const a=Math.PI/6

for(let i=-4000;i<4000;i+=30){

g.beginPath()
g.moveTo(i,-4000)
g.lineTo(i+4000*Math.tan(a),4000)
g.stroke()

g.beginPath()
g.moveTo(i,-4000)
g.lineTo(i-4000*Math.tan(a),4000)
g.stroke()

}

g.restore()

}

function render(){

drawPaper()

ctx.clearRect(0,0,w,h)

ctx.save()

ctx.translate(cam.x,cam.y)
ctx.scale(cam.z,cam.z)

objects.forEach(o=>{

if(o.type==="pipe"){

ctx.strokeStyle="#222"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(o.a.x,o.a.y)
ctx.lineTo(o.b.x,o.b.y)
ctx.stroke()

ctx.font="bold 14px Arial"
ctx.textAlign="center"

const mx=(o.a.x+o.b.x)/2
const my=(o.a.y+o.b.y)/2

ctx.fillStyle="#111"
ctx.fillText(o.mm,mx,my-10)

}

if(o.type==="symbol"){

drawSymbol(o.name,o.x,o.y)

}

})

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(current.x,current.y,5,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

function drawSymbol(t,x,y){

ctx.save()

ctx.translate(x,y)

ctx.strokeStyle="#1b8d4d"
ctx.fillStyle="#1b8d4d"
ctx.lineWidth=2

const s=12

if(t==="valve"){

ctx.beginPath()
ctx.moveTo(-s,-s/2)
ctx.lineTo(s,s/2)
ctx.lineTo(s,-s/2)
ctx.lineTo(-s,s/2)
ctx.closePath()
ctx.stroke()

}

if(t==="pump"){

ctx.beginPath()
ctx.arc(0,0,s,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(s,-s/2)
ctx.lineTo(s,s/2)
ctx.closePath()
ctx.fill()

}

if(t==="elbow"){

ctx.beginPath()
ctx.moveTo(-s,0)
ctx.lineTo(0,0)
ctx.lineTo(0,s)
ctx.stroke()

}

ctx.restore()

}

function angle(dx,dy){

const a=Math.atan2(dy,dx)

const dirs=[
0,
Math.PI/3,
2*Math.PI/3,
Math.PI,
-2*Math.PI/3,
-Math.PI/3
]

let best=dirs[0]
let diff=999

dirs.forEach(d=>{

let n=Math.abs(a-d)

if(n<diff){

diff=n
best=d

}

})

return best

}

let sx=0
let sy=0

cv.addEventListener("touchstart",e=>{

if(e.touches.length===1){

sx=e.touches[0].clientX
sy=e.touches[0].clientY

}

})

cv.addEventListener("touchend",e=>{

if(e.changedTouches.length!==1)return

const ex=e.changedTouches[0].clientX
const ey=e.changedTouches[0].clientY

const dx=ex-sx
const dy=ey-sy

if(Math.hypot(dx,dy)<10)return

const a=angle(dx,dy)

const len=parseFloat(document.getElementById("len").value)

const nx=current.x+Math.cos(a)*len
const ny=current.y+Math.sin(a)*len

const mm=Math.round(len*5.833)

objects.push({
type:"pipe",
a:{x:current.x,y:current.y},
b:{x:nx,y:ny},
mm:mm
})

current.x=nx
current.y=ny

total+=mm

sum.innerText=total

if(selected){

objects.push({
type:"symbol",
name:selected,
x:nx,
y:ny
})

selected=null

}

render()

})

function setSymbol(s){

selected=s

}

function undo(){

objects.pop()

render()

}

function clearAll(){

objects=[]
total=0

sum.innerText=0

render()

}

function resetView(){

cam={
x:0,
y:0,
z:1
}

zoom.innerText="100%"

render()

}

let pointers={}
let startDist=0
let startZoom=1

let startX=0
let startY=0

let camX=0
let camY=0

cv.addEventListener("pointerdown",e=>{

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

startDist=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

startZoom=cam.z

}

if(ids.length===1){

startX=e.clientX
startY=e.clientY

camX=cam.x
camY=cam.y

}

})

cv.addEventListener("pointermove",e=>{

if(!pointers[e.pointerId])return

pointers[e.pointerId]=e

const ids=Object.keys(pointers)

if(ids.length===2){

const p1=pointers[ids[0]]
const p2=pointers[ids[1]]

const nd=Math.hypot(
p2.clientX-p1.clientX,
p2.clientY-p1.clientY
)

cam.z=Math.min(
Math.max(startZoom*(nd/startDist),0.5),
4
)

zoom.innerText=Math.round(cam.z*100)+"%"

render()

}

if(ids.length===1){

cam.x=camX+(e.clientX-startX)
cam.y=camY+(e.clientY-startY)

render()

}

})

cv.addEventListener("pointerup",e=>{

delete pointers[e.pointerId]

})

size()

</script>

</body>
</html>
