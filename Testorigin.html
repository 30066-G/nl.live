<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A0Z ULTIMATE COMMAND CENTER</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .container { border: 2px solid #00ff41; border-radius: 15px; padding: 30px; display: inline-block; background: #000; box-shadow: 0 0 20px #00ff41; }
        input { width: 80%; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; border-radius: 5px; }
        .section-title { font-size: 0.9em; color: #888; text-transform: uppercase; margin: 15px 0; border-bottom: 1px dashed #444; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 10px; background: transparent; border: 1px solid #00ff41; color: #00ff41; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        .danger { border-color: #ff003c; color: #ff003c; }
        .danger:hover { background: #ff003c; color: white; box-shadow: 0 0 10px #ff003c; }
        #status { margin-top: 20px; font-size: 0.8em; color: yellow; }
    </style>
</head>
<body>

<div class="container">
    <h1>A0Z CORE V4.0</h1>
    <input type="text" id="mainInput" placeholder="Type text or command here...">
    
    <div class="section-title">Communication</div>
    <div class="grid">
        <button onclick="send('/say ' + document.getElementById('mainInput').value)">SAY VOICE</button>
        <button onclick="send(document.getElementById('mainInput').value)">SEND TEXT</button>
        <button onclick="send('/clear')">CLEAR SCREEN</button>
    </div>

    <div class="section-title">Fun & Trolling</div>
    <div class="grid">
        <button onclick="send('/cmd start https://www.youtube.com/watch?v=dQw4w9WgXcQ')">NEVER GONNA GIVE</button>
        <button onclick="send('/cmd start chrome https://www.google.com')">OPEN GOOGLE</button>
        <button onclick="send('/cmd notepad')">OPEN NOTEPAD</button>
    </div>

    <div class="section-title">System Control</div>
    <div class="grid">
        <button class="danger" onclick="send('/cmd taskkill /f /im chrome.exe')">KILL CHROME</button>
        <button class="danger" onclick="send('/cmd rundll32.exe user32.dll,LockWorkStation')">LOCK PC</button>
        <button class="danger" onclick="send('/cmd shutdown /s /t 30')">SHUTDOWN (30s)</button>
    </div>

    <p id="status">READY FOR COMMANDS</p>
</div>

<script>
    const DB_URL = "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app/A0Z_CORE/current_command.json";

    async function send(msg) {
        if(!msg) return;
        document.getElementById('status').innerText = "EXECUTING: " + msg;
        await fetch(DB_URL, {
            method: 'PUT',
            body: JSON.stringify({ text: msg, timestamp: Date.now() })
        });
        setTimeout(() => { document.getElementById('status').innerText = "COMMAND SENT"; }, 1500);
    }
</script>

</body>
</html>
