<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 2px solid #00ff41; padding: 20px; background: rgba(0, 40, 0, 0.2); box-shadow: 0 0 15px #00ff41; width: 400px; border-radius: 10px; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 5px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; background: #00ff41; border: none; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #008f11; color: #fff; }
        .status { margin-top: 15px; font-size: 0.8em; text-align: center; color: #888; }
        .special-btn { background: #ff003c; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="panel">
    <h2>A0Z CORE</h2>
    <input type="text" id="commandInput" placeholder="Enter Message or /Command...">
    
    <div class="btn-group">
        <button onclick="sendCommand()">SEND MSG</button>
        <button onclick="quickCommand('/clear')">CLEAR UI</button>
        <button onclick="voiceCommand()">SAY VOICE</button>
        <button onclick="quickCommand('/cmd start calc')">OPEN CALC</button>
        <button class="special-btn" onclick="quickCommand('/cmd shutdown /s /t 60')">EMERGENCY SHUTDOWN</button>
    </div>

    <div class="status" id="statusMsg">SYSTEM READY - WAITING FOR ADMIN...</div>
</div>

<script>
    // ضع هنا رابط الـ Firebase الخاص بك
    const DB_URL = "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app/A0Z_CORE/current_command.json";

    async function sendData(payload) {
        document.getElementById('statusMsg').innerText = "SENDING...";
        try {
            const response = await fetch(DB_URL, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                document.getElementById('statusMsg').innerText = "SENT SUCCESSFULLY";
                document.getElementById('commandInput').value = "";
                setTimeout(() => { document.getElementById('statusMsg').innerText = "SYSTEM ONLINE"; }, 2000);
            }
        } catch (error) {
            document.getElementById('statusMsg').innerText = "CONNECTION ERROR!";
        }
    }

    function sendCommand() {
        const text = document.getElementById('commandInput').value;
        if (!text) return;
        const payload = {
            text: text,
            timestamp: Date.now()
        };
        sendData(payload);
    }

    function quickCommand(cmd) {
        const payload = {
            text: cmd,
            timestamp: Date.now()
        };
        sendData(payload);
    }

    function voiceCommand() {
        const text = document.getElementById('commandInput').value;
        if (!text) return alert("Type something first!");
        quickCommand("/say " + text);
    }
</script>

</body>
</html>
